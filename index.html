    const current = adRatioThresholds[brandId];
    const input = window.prompt(
      `設定「${brandName}」的廣告費佔比過高標準——廣告費佔營收的比例超過這個百分比,會用黃字提醒;超過 30% 不管有沒有設定,一律用紅字提醒,比黃字更嚴重(只要輸入數字,例如想設 25%,輸入 25 就好,不用打 % 符號)。\n留空白可以清除這個品牌的標準(但超過 30% 紅字提醒不受影響,一定會顯示)。`,
      current != null ? String(current) : ""
    );
    if (input === null) return;
    const trimmed = input.trim();
    const updated = { ...adRatioThresholds };
    if (!trimmed) {
      delete updated[brandId];
    } else {
      const num = parseFloat(trimmed);
      if (isNaN(num) || num <= 0 || num > 100) {
        setApiError("廣告費佔比標準請輸入 0~100 之間的數字(百分比)。");
        return;
      }
      updated[brandId] = num;

    setAdRatioThresholds(updated);
    storage.set("meta-api-adratio-thresholds", JSON.stringify(updated)).catch(() => {});
  }

  // 跟 editAdRatioThreshold 同一套模式:「投放成效報告」(週報表卡片+長條圖+分級表格)

  // 產品代號本身沒辦法自動對應到「水光直播/水晶萃」這種中文名稱(廣告活動命名不夠固定,

  async function fetchOneBrandMonth(token, accountId, month) {
    const [y, m] = month.split("-").map(Number);
    const since = `${month}-01`;
    const lastDay = new Date(y, m, 0).getDate();
    const until = `${month}-${String(lastDay).padStart(2, "0")}`;
    return fetchInsightsForRange(token, accountId, since, until);
  }

  const MIN_FETCH_SPEND = 500;
  const MIN_API_GAP_MS = 1200; // 任兩次 Meta Graph API 請求之間的最小間隔(毫秒)

  // 所有打 Meta Graph API 的地方都要改叫這個,不要直接用 fetch()。
  // 它會確保「這一次要打的請求」跟「上一次真正打出去的請求」之間至少間隔 MIN_API_GAP_MS,
  // 不管上一次請求是來自周報表、月報表、批次、自動同步、或縮圖抓取,全部共用同一個計時器,
  // 所以就算使用者用兩個不同按鈕(先抓上週、再抓月報表)手動連續觸發,也一樣會被這裡擋下來排隊等待。
  async function throttledFetch(url, context) {
    const now = Date.now();
    const wait = lastApiCallRef.current + MIN_API_GAP_MS - now;
    if (wait > 0) await new Promise((r) => setTimeout(r, wait));
    lastApiCallRef.current = Date.now();
    try {
      return await fetch(url);
    } catch (e) {
      throw new Error(`${context || "呼叫 Meta API"}時網路請求失敗:${e.message}`);
    }
  }

  async function parseApiResponse(res, context) {
    let json;
    try {
      json = await res.json();
    } catch {
      throw new Error(`${context}回傳的內容無法解析(可能是網路中斷或 Meta 伺服器異常)。`);
    }
    if (!res.ok || json.error) {
      const code = json.error && json.error.code;
      const sub = json.error && json.error.error_subcode;
      const msg = (json.error && json.error.message) || `HTTP ${res.status}`;
      const err = new Error(`${context}失敗(錯誤代碼 ${code || res.status}${sub ? "/" + sub : ""}):${msg}`);
      err.code = code;
      err.subcode = sub;
      throw err;
    }
    return json;
  }

  // 統一包裝「打 API + 解析回應」,遇到 Meta 那邊回傳的暫時性錯誤時,自動等一下重試,不用使用者手動再按一次。
  // 錯誤代碼 1(含各種 subcode,例如 1/99)跟 2 都是 Meta 官方文件裡列為「建議直接重試」的暫時性錯誤,
  // 跟權杖/帳號 ID/權限完全無關,常見原因是短時間內打太多次 API(不管是你自己、同事,或自動同步同時在跑)。
  async function fetchGraphApi(url, context, retriesLeft = 2) {
    const res = await throttledFetch(url, context);
    try {
      return await parseApiResponse(res, context);
    } catch (e) {
      if ((e.code === 1 || e.code === 2) && retriesLeft > 0) {
        const waitMs = retriesLeft === 2 ? 3000 : 6000; // 重試間隔逐次拉長,給 Meta 那邊更多喘息時間
        await new Promise((r) => setTimeout(r, waitMs));
        return fetchGraphApi(url, context, retriesLeft - 1);
      }
      throw e;
    }
  }

  // 查廣告帳號自己的時區(跟 UTC 差幾小時),讓「上週一~週日」的日期範圍照這個帳號自己的時區去算,
  // 而不是照瀏覽器所在的時區——不然帳號時區跟瀏覽器不同的話,算出來的週報表區間會跟 Meta 後台的「上週」對不起來,
  // 花費、轉單數、CPA、ROAS 就會整批兜不起來(尤其是靠近週一/週日交界的那幾筆資料)。
  // 抓不到時區也不讓它卡住整個流程,直接退回用瀏覽器時區。
  async function fetchAccountUtcOffset(token, accountId) {
    try {
      const json = await fetchGraphApi(
        `https://graph.facebook.com/v19.0/act_${accountId}?fields=timezone_offset_hours_utc&access_token=${encodeURIComponent(token)}`,
        "讀取帳號時區"
      );
      return typeof json.timezone_offset_hours_utc === "number" ? json.timezone_offset_hours_utc : null;
    } catch {
      return null;
    }
  }

  function apiErrorHint(e) {
    const msg = (e && e.message) || "";
    if (e && (e.code === 1 || e.code === 2)) {
      return (
        "。這不是你的權杖或帳號 ID 設定錯誤——Meta 官方把這種錯誤歸類為「暫時性問題,建議直接重試」," +
        "常見原因是短時間內對同一個廣告帳號打太多次 API(可能是你自己連續按了好幾次、同事剛好也在同時間抓同一個品牌、" +
        "或自動同步跟手動抓取撞在一起),系統已經自動重試過,如果還是失敗,等 1~2 分鐘再試一次通常就會恢復。"
      );
    }
    if (/too many calls/i.test(msg) || /80004/.test(msg) || /error_subcode 2446079/i.test(msg)) {
      return "。這是 Meta 廣告帳號的呼叫頻率限制,不是設定錯誤——通常等 5~15 分鐘再試一次就會恢復,批次抓多個品牌時建議一次不要抓太多個。";
    }
    return "。請確認權杖沒過期、廣告帳號 ID 正確,且已授權 ads_read 權限。";
  }

  // relaxThreshold=true(目前只有「上週報表」會用到):篩選階段不會排除掉「目前還在投放中」的廣告,
  // 就算這支廣告這段期間花費還沒到 500,只要現在仍在投放,一樣會保留下來,方便看到剛起步/學習中的廣告。
  // 月報表(fetchOneBrandMonth)沒有帶這個參數,維持原本花費 ≥ 500 才留下的嚴格門檻。
  async function fetchInsightsForRange(token, accountId, since, until, relaxThreshold = false) {
    const encToken = encodeURIComponent(token);
    const timeRange = encodeURIComponent(JSON.stringify({ since, until }));

    // 0) account currency
    let currency = "TWD";
    try {
      const curJson = await fetchGraphApi(`https://graph.facebook.com/v19.0/act_${accountId}?fields=currency&access_token=${encToken}`, "讀取帳號幣別");
      if (curJson.currency) currency = curJson.currency;
    } catch { /* fall back to TWD, this call isn't critical */ }

    // 1) per-ad performance for the month
    // 關鍵參數 use_account_attribution_setting=true:讓這次 API 呼叫套用「這個廣告帳號自己在 Meta 後台設定的歸因窗口」,
    // 而不是 API 預設的歸因窗口。如果沒有這個參數,API 預設的歸因窗口通常比後台顯示用的寬(例如把 7 天內的點擊、
    // 甚至瀏覽後很久才發生的購買都算進來),會導致轉單數比 Meta 後台顯示的「結果」多出好幾倍,CPA 被嚴重低估、
    // ROAS 被嚴重高估——這正是造成轉單數跟後台數字差非常多倍的根本原因,不是重複計算的問題。
    let insightsUrl =
      `https://graph.facebook.com/v19.0/act_${accountId}/insights?level=ad&use_account_attribution_setting=true` +
      `&fields=ad_id,ad_name,spend,actions,action_values&time_range=${timeRange}&limit=500&access_token=${encToken}`;
    let rows = [];
    let page = 0;
    while (insightsUrl && page < 20) {
      const json = await fetchGraphApi(insightsUrl, "讀取成效資料");
      rows = rows.concat(json.data || []);
      insightsUrl = json.paging && json.paging.next ? json.paging.next : null;
      page++;
    }

    if (!rows.length) {
      return { spend: 0, conversions: 0, revenue: 0, campaigns: 0, currency, accountId, ads: [], syncedAt: new Date().toISOString() };
    }

    // 2) thumbnails + UTM tags + 投放狀態 + 所屬行銷活動,matched by ad_id (more reliable than name)
    // 這一步要放在篩選門檻「之前」,因為 relaxThreshold 模式需要用投放狀態來決定要不要放行低花費的廣告。
    // 只查「這段期間真的有花費紀錄」的廣告 ID,不要掃整個帳號的歷史廣告,避免觸發 Meta 帳號層級的頻率限制。
    const periodAdIds = [...new Set(rows.map((r) => r.ad_id).filter(Boolean))];
    let thumbMap = {};
    let utmMap = {};
    let statusMap = {};
    let campaignMap = {};
    let startDateMap = {};
    let postIdMap = {};
    const ID_CHUNK_SIZE = 50;
    for (let i = 0; i < periodAdIds.length; i += ID_CHUNK_SIZE) {
      const chunk = periodAdIds.slice(i, i + ID_CHUNK_SIZE);
      const filtering = encodeURIComponent(JSON.stringify([{ field: "id", operator: "IN", value: chunk }]));
      let adsUrl =
        `https://graph.facebook.com/v19.0/act_${accountId}/ads?fields=id,name,url_tags,effective_status,created_time,campaign{name},adset{start_time},creative{thumbnail_url,image_url,url_tags,effective_object_story_id}` +
        `&filtering=${filtering}&limit=500&access_token=${encToken}`;
      let page2 = 0;
      while (adsUrl && page2 < 5) {
        const json = await fetchGraphApi(adsUrl, "讀取廣告清單");
        (json.data || []).forEach((ad) => {
          const thumb = ad.creative && (ad.creative.thumbnail_url || ad.creative.image_url);
          if (thumb) thumbMap[ad.id] = thumb;
          // effective_object_story_id = 「粉專ID_貼文ID」,用來組出貼文本身的前台連結。
          const storyId = ad.creative && ad.creative.effective_object_story_id;
          if (storyId) postIdMap[ad.id] = storyId;
          // 有些廣告(例如動態素材/型錄類廣告)的追蹤參數是設在「創意」層級,不是廣告本身,
          // 所以廣告本身的 url_tags 抓不到值時,再退回去看創意底下的 url_tags。
          const tags = ad.url_tags || (ad.creative && ad.creative.url_tags) || "";
          if (tags) utmMap[ad.id] = extractUtmValue(tags);
          statusMap[ad.id] = ad.effective_status || "UNKNOWN";
          if (ad.campaign && ad.campaign.name) campaignMap[ad.id] = ad.campaign.name;
          // 投放起始時間:優先用廣告組合(adset)排定的開始時間,最貼近實際開始投放的日期;
          // 抓不到的話(例如舊資料、權限限制)退回用廣告本身的建立時間,當作大概的參考。
          const startRaw = (ad.adset && ad.adset.start_time) || ad.created_time || "";
          if (startRaw) startDateMap[ad.id] = startRaw;
        });
        adsUrl = json.paging && json.paging.next ? json.paging.next : null;
        page2++;
      }
    }

    // 3) 先用「完整、未篩選」的資料算總計——這樣廣告費/轉單數/轉單金額才會跟 Meta 後台的帳號總覽數字完全一致。
    // 後台的總計是把該期間「所有」廣告都算進去,不會因為某支廣告花費很小就不計入;
    // 如果只加總「花費 ≥ 500」的廣告,總計就會比後台實際數字少,CPA/ROAS 也會跟著失真。
    let totalSpend = 0, totalConv = 0, totalRev = 0;
    rows.forEach((row) => {
      totalSpend += parseFloat(row.spend) || 0;
      totalConv += pickPurchaseValue(row.actions);
      totalRev += pickPurchaseValue(row.action_values);
    });

    // 花費門檻只用來決定「廣告明細列表」要不要顯示這支廣告(避免清單被大量花費很少的測試廣告洗版),
    // 不會再影響上面的總計數字。
    const detailRows = rows.filter((row) => {
      const spend = parseFloat(row.spend) || 0;
      if (spend >= MIN_FETCH_SPEND) return true;
      if (relaxThreshold && statusMap[row.ad_id] === "ACTIVE") return true;
      return false;
    });

    // 4) aggregate, merging ads that share the same UTM tag —— 但「投放中」跟「已停止」的廣告絕對不會合併在一起,
    // 即使 UTM 追蹤代碼相同,只要目前的投放狀態不一樣,就會拆成不同的兩列,避免誤把已經停掉的舊數字跟現在還在跑的混在一起看。
    const grouped = {};
    detailRows.forEach((row) => {
      const spend = parseFloat(row.spend) || 0;
      const conversions = pickPurchaseValue(row.actions);
      const revenue = pickPurchaseValue(row.action_values);

      const adName = row.ad_name || "(未命名廣告)";
      const utm = utmMap[row.ad_id] || "";
      const isActive = statusMap[row.ad_id] === "ACTIVE";
      // 跟shopline-proxy後端同一個bug、同一套修法。
      const campaignName = campaignMap[row.ad_id] || "(未分類活動)";
      const groupKey = (utm ? "utm:" + utm : "ad:" + row.ad_id) + "::campaign:" + campaignName + "::" + (isActive ? "on" : "off");
      if (!grouped[groupKey]) {
        grouped[groupKey] = { utm, names: new Set(), image: "", postId: "", spend: 0, conversions: 0, revenue: 0, active: isActive, campaigns: new Set(), adIds: new Set(), startDate: null };
      }
      const g = grouped[groupKey];
      g.names.add(adName);
      g.spend += spend; g.conversions += conversions; g.revenue += revenue;
      if (!g.image && thumbMap[row.ad_id]) g.image = thumbMap[row.ad_id];
      if (!g.postId && postIdMap[row.ad_id]) g.postId = postIdMap[row.ad_id];
      if (campaignMap[row.ad_id]) g.campaigns.add(campaignMap[row.ad_id]);
      if (row.ad_id) g.adIds.add(row.ad_id);
      // 如果這個群組是合併了好幾支廣告(同一個 UTM 追蹤代碼),投放起始時間取「最早」的那個,
      // 代表這個素材/追蹤代碼最初是什麼時候開始投放的。
      const rowStart = startDateMap[row.ad_id];
      if (rowStart && (!g.startDate || rowStart < g.startDate)) g.startDate = rowStart;
    });

    const ads = Object.values(grouped)
      .map((g) => {
        const nameList = [...g.names];
        const adCount = nameList.length || 1;
        const name =
          nameList.length === 0
            ? g.utm || "未命名廣告"
            : nameList.length === 1
            ? nameList[0]
            : `${nameList[0]} 等 ${nameList.length} 支廣告`;
        const campaignList = [...g.campaigns];
        // 跟 shopline-proxy 後端同一個bug、同一個修法。
        const campaign =
          campaignList.length === 0
            ? "(未分類活動)"
            : campaignList.length === 1
            ? campaignList[0]
            : `${campaignList[0]} 等 ${campaignList.length} 個活動`;
        return {
          name, utm: g.utm, image: g.image, postId: g.postId, spend: g.spend, conversions: g.conversions, revenue: g.revenue,
          adCount, rawNames: nameList, active: g.active, campaign, adIds: [...g.adIds], startDate: g.startDate,
        };
      })
      .sort((a, b) => b.spend - a.spend);

    return { spend: totalSpend, conversions: totalConv, revenue: totalRev, campaigns: 0, currency, accountId, ads, syncedAt: new Date().toISOString() };
  }

  async function fetchLastWeekData() {
    if (!apiToken.trim() || !apiAccountId.trim()) {
      setApiError("請填入存取權杖跟廣告帳號 ID。");
      return;
    }
    setApiError(null);
    setApiNotice(null);
    setWeekLoading(true);
    try {
      const cleanId = apiAccountId.trim().replace(/^act_/, "");
      const tzOffset = await fetchAccountUtcOffset(apiToken.trim(), cleanId);
      const info = getLastWeekRange(tzOffset);
      const record = await fetchInsightsForRange(apiToken.trim(), cleanId, info.since, info.until, true);
      const brandIdToUse = await ensureBrandRegistered(cleanId);
      await storage.set(weekKeyFor(brandIdToUse, info.weekStart), JSON.stringify(record));
      setActiveBrandId(brandIdToUse);
      setWeekInfo(info);
      await loadAllWeeks(brandIdToUse);
      setFocusWeek(info.weekStart);
      setViewMode("week");
      setApiNotice(`已抓到上週(${info.since} ~ ${info.until})的資料,共 ${record.ads.length} 支廣告。`);
      setShowApiPanel(false);
    } catch (e) {
      setApiError("抓取失敗:" + e.message + apiErrorHint(e));
    } finally {
      setWeekLoading(false);
    }
  }

  // 自動回溯抓取過去 N 週(週一~週日),依序一週一週抓、中間間隔 4 秒避免觸發 Meta 頻率限制。
  // 每一週都是獨立呼叫 fetchInsightsForRange,所以就算某一週失敗,也不會影響其他週的結果。
  async function fetchRecentWeeksFromApi(weeksCount) {
    if (!apiToken.trim() || !apiAccountId.trim()) {
      setApiError("請填入存取權杖跟廣告帳號 ID。");
      return;
    }
    setApiError(null);
    setApiNotice(null);
    setWeekLoading(true);
    setShowApiPanel(false);
    try {
      const cleanId = apiAccountId.trim().replace(/^act_/, "");
      const brandIdToUse = await ensureBrandRegistered(cleanId);
      const tzOffset = await fetchAccountUtcOffset(apiToken.trim(), cleanId);

      const progress = [];
      for (let w = 1; w <= weeksCount; w++) {
        const info = getLastWeekRange(tzOffset, w);
        progress.push({ id: "w" + w, name: `${info.since} ~ ${info.until}`, status: "pending", message: "" });
      }
      setBatchProgress(progress);

      let lastInfo = null, successCount = 0, errorCount = 0;
      for (let w = 1; w <= weeksCount; w++) {
        setBatchProgress((prev) => prev.map((p, idx) => (idx === w - 1 ? { ...p, status: "running" } : p)));
        try {
          const info = getLastWeekRange(tzOffset, w);
          const record = await fetchInsightsForRange(apiToken.trim(), cleanId, info.since, info.until, true);
          await storage.set(weekKeyFor(brandIdToUse, info.weekStart), JSON.stringify(record));
          lastInfo = info;
          successCount++;
          setBatchProgress((prev) =>
            prev.map((p, idx) => (idx === w - 1 ? { ...p, status: record.ads.length ? "done" : "empty", message: `${record.ads.length} 支廣告` } : p))
          );
        } catch (e) {
          errorCount++;
          setBatchProgress((prev) => prev.map((p, idx) => (idx === w - 1 ? { ...p, status: "error", message: e.message } : p)));
        }
        if (w < weeksCount) await new Promise((r) => setTimeout(r, 4000));
      }

      setActiveBrandId(brandIdToUse);
      if (lastInfo) setWeekInfo(lastInfo);
      await loadAllWeeks(brandIdToUse);
      setViewMode("week");
      setApiNotice(`已抓取過去 ${weeksCount} 週的資料:成功 ${successCount} 週${errorCount > 0 ? `,失敗 ${errorCount} 週(可以之後單獨用「上週報表」模式補抓)` : ""}。`);
    } catch (e) {
      setApiError("抓取失敗:" + e.message + apiErrorHint(e));
    } finally {
      setWeekLoading(false);
    }
  }

  function computeWeekAnalysis(record) {
    if (!record) return [];
    const insights = [];
    const cpa = record.conversions > 0 ? record.spend / record.conversions : null;
    const roas = record.spend > 0 && record.revenue > 0 ? record.revenue / record.spend : null;

    if (roas !== null) {
      if (roas >= 3) insights.push(`ROAS ${roas.toFixed(2)}x,表現不錯,廣告花費有換回明顯的營收。`);
      else if (roas >= 1.5) insights.push(`ROAS ${roas.toFixed(2)}x,表現普通,還有優化空間。`);
      else insights.push(`ROAS ${roas.toFixed(2)}x,偏低,建議檢視這週表現差的廣告是否該關掉或調整素材。`);
    } else {
      insights.push("這週沒有轉換金額資料,無法計算 ROAS。");
    }

    if (cpa !== null) {
      insights.push(`平均每筆訂單成本(CPA)是 ${fmtMoney(cpa, record.currency)},轉單數共 ${fmtInt(record.conversions)} 筆。`);
    } else {
      insights.push("這週沒有任何轉單,檢查一下廣告是否正常投放中。");
    }

    const spendyAds = record.ads.filter((a) => a.spend >= 500);
    if (spendyAds.length) {
      const bestRoas = spendyAds
        .map((a) => ({ ...a, roasVal: a.spend > 0 && a.revenue > 0 ? a.revenue / a.spend : null }))
        .filter((a) => a.roasVal !== null)
        .sort((a, b) => b.roasVal - a.roasVal)[0];
      if (bestRoas) insights.push(`這週表現最好的廣告是「${bestRoas.name}」,ROAS 有 ${bestRoas.roasVal.toFixed(2)}x。`);

      const badOnes = spendyAds.filter((a) => a.spend > 0 && (a.revenue <= 0 || a.revenue / a.spend < 1));
      if (badOnes.length) {
        insights.push(`有 ${badOnes.length} 支花費超過 500 的廣告 ROAS 低於 1x(等於虧錢),建議優先檢查這些廣告。`);
      }
    }

    return insights;
  }

  // ---------- 投放中廣告成效分類(成效好 / 成效正常 / 成效不好 / 學習中) ----------
  const LEARNING_MIN_CONVERSIONS = 10; // 轉單數不足,還看不出真實成效,先歸類為「學習中」
  const PERF_LABELS = { good: "成效好", normal: "成效正常", poor: "成效不好", learning: "學習中" };
  const PERF_COLORS = { good: "var(--green)", normal: "var(--blue)", poor: "var(--red)", learning: "var(--amber)" };
  const PERF_ORDER = ["good", "normal", "poor", "learning"];

  function classifyAdPerformance(ad) {
    if (ad.conversions < LEARNING_MIN_CONVERSIONS) return "learning";
    const roas = ad.spend > 0 && ad.revenue > 0 ? ad.revenue / ad.spend : null;
    if (roas === null) return "poor";
    if (roas >= 3) return "good";
    if (roas >= 1.5) return "normal";
    return "poor";
  }

  function groupAdsByPerformance(ads) {
    // 這裡故意不只看「目前投放中」的廣告——花費超過門檻、已經停止但表現不好的廣告,
    // 也應該讓你看得到(不然「成效不好」分類永遠是空的,容易誤以為沒有表現差的廣告)。
    const qualifyingAds = (ads || []).filter((a) => a.spend >= MIN_AD_SPEND);
    const buckets = { good: [], normal: [], poor: [], learning: [] };
    qualifyingAds.forEach((ad) => {
      buckets[classifyAdPerformance(ad)].push(ad);
    });
    PERF_ORDER.forEach((k) => buckets[k].sort((a, b) => b.spend - a.spend));
    return { qualifyingAds, buckets };
  }

  // ---------- 行銷活動(campaign)整體成效分析 ----------
  function computeCampaignStats(ads) {
    const activeAds = (ads || []).filter((a) => a.active);
    const campaignMap = {};
    activeAds.forEach((ad) => {
      const key = ad.campaign || "(未分類活動)";
      if (!campaignMap[key]) campaignMap[key] = { name: key, spend: 0, conversions: 0, revenue: 0, adCount: 0 };
      const c = campaignMap[key];
      c.spend += ad.spend;
      c.conversions += ad.conversions;
      c.revenue += ad.revenue;
      c.adCount += 1;
    });
    return Object.values(campaignMap)
      .map((c) => ({
        ...c,
        cpa: c.conversions > 0 ? c.spend / c.conversions : null,
        roas: c.spend > 0 && c.revenue > 0 ? c.revenue / c.spend : null,
      }))
      .sort((a, b) => b.spend - a.spend);
  }

  function computeCampaignInsights(campaignStats, currencyCode) {
    if (!campaignStats.length) return ["目前沒有偵測到任何投放中的廣告,無法進行行銷活動分析。"];
    const insights = [];
    const totalSpend = campaignStats.reduce((s, c) => s + c.spend, 0);
    const totalConv = campaignStats.reduce((s, c) => s + c.conversions, 0);
    const totalRev = campaignStats.reduce((s, c) => s + c.revenue, 0);
    const overallRoas = totalSpend > 0 && totalRev > 0 ? totalRev / totalSpend : null;
    insights.push(
      `目前投放中的活動共 ${campaignStats.length} 個,總花費 ${fmtMoney(totalSpend, currencyCode)},轉單 ${fmtInt(totalConv)} 筆${overallRoas !== null ? `,整體 ROAS ${overallRoas.toFixed(2)}x` : ""}。`
    );
    const withRoas = campaignStats.filter((c) => c.roas !== null);
    if (withRoas.length) {
      const best = withRoas.slice().sort((a, b) => b.roas - a.roas)[0];
      insights.push(`表現最好的活動是「${best.name}」,ROAS 有 ${best.roas.toFixed(2)}x。`);
      const worst = withRoas.slice().sort((a, b) => a.roas - b.roas)[0];
      if (worst.name !== best.name && worst.roas < 1.5) {
        insights.push(`表現較弱的活動是「${worst.name}」,ROAS 只有 ${worst.roas.toFixed(2)}x,建議檢視受眾或素材。`);
      }
    } else {
      insights.push("目前投放中的活動都還沒有足夠的轉換金額資料,先持續觀察。");
    }
    const noDataCampaigns = campaignStats.filter((c) => c.conversions < LEARNING_MIN_CONVERSIONS);
    if (noDataCampaigns.length) {
      insights.push(`有 ${noDataCampaigns.length} 個活動轉單數還不到 ${LEARNING_MIN_CONVERSIONS} 筆,屬於學習中階段,建議再觀察一段時間再下結論。`);
    }
    return insights;
  }

  // 依「行銷活動名稱」最前面的括號(例如「【RS】」「【AP】」)自動歸類,統計各產品的營業額/廣告費佔比與利潤。
  // 產品代號完全依實際行銷活動名稱動態產生——新增產品時只要照同一套命名規則建立行銷活動,
  // 不需要在系統裡手動登記新產品,代號就會自動出現在分析裡。
  function LedgerVsMetaComparison({ ads, currencyCode, ledgerAgg, onOpenImport, periodLabel }) {
    if (!ledgerAgg) {
      return (
        <div className="mal-empty">
          {onOpenImport ? (
            <>
              <p>這個{periodLabel}還沒有匯入後台的「每日收益表」,沒辦法比對後台實際業績跟 Meta 回報的落差。</p>
              <button className="mal-btn mal-btn-primary" onClick={onOpenImport}>📥 匯入後台每日收益表</button>
            </>
          ) : (
            <p>這個{periodLabel}的後台業績資料還沒同步完成,稍後重新整理再看一次。</p>
          )}
        </div>
      );
    }
    const metaBreak = buildProductBreakdown(ads || [], MIN_AD_SPEND);
    const metaByCode = {};
    metaBreak.rows.forEach((r) => { metaByCode[r.code] = r; });
    const codes = Array.from(new Set([...Object.keys(ledgerAgg.byCode), ...Object.keys(metaByCode)])).sort();
    let totalBackendRevenue = 0, totalMetaRevenue = 0, totalBackendSpend = 0, totalMetaSpend = 0;
    const rows = codes.map((code) => {
      const b = ledgerAgg.byCode[code];
      const m = metaByCode[code];
      const backendRevenue = b ? b.revenue : 0;
      const metaRevenue = m ? m.revenue : 0;
      const backendSpend = b ? b.spend : 0;
      const metaSpend = m ? m.spend : 0;
      totalBackendRevenue += backendRevenue; totalMetaRevenue += metaRevenue;
      totalBackendSpend += backendSpend; totalMetaSpend += metaSpend;
      const revGap = metaRevenue - backendRevenue;
      const revGapPct = backendRevenue > 0 ? (revGap / backendRevenue) * 100 : null;
      const spendGap = metaSpend - backendSpend;
      const spendGapPct = backendSpend > 0 ? (spendGap / backendSpend) * 100 : null;
      return { code, backendRevenue, metaRevenue, revGap, revGapPct, backendSpend, metaSpend, spendGap, spendGapPct, onlyBackend: !!b && !m, onlyMeta: !!m && !b };
    });
    const totalRevGap = totalMetaRevenue - totalBackendRevenue;
    const totalRevGapPct = totalBackendRevenue > 0 ? (totalRevGap / totalBackendRevenue) * 100 : null;
    const totalSpendGap = totalMetaSpend - totalBackendSpend;
    const totalSpendGapPct = totalBackendSpend > 0 ? (totalSpendGap / totalBackendSpend) * 100 : null;
    const onlyBackendCodes = rows.filter((r) => r.onlyBackend).map((r) => r.code);
    const onlyMetaCodes = rows.filter((r) => r.onlyMeta).map((r) => r.code);
    return (
      <>
        <div className="mal-cards" style={{ marginBottom: 18 }}>
          <div className="mal-card">
            <div className="mal-card-label">後台實際營收</div>
            <div className="mal-card-value">{fmtMoney(totalBackendRevenue, currencyCode)}</div>
          </div>
          <div className="mal-card">
            <div className="mal-card-label">Meta 回報營收</div>
            <div className="mal-card-value">{fmtMoney(totalMetaRevenue, currencyCode)}</div>
          </div>
          <div className="mal-card">
            <div className="mal-card-label">營收落差</div>
            <div className="mal-card-value">{fmtMoney(totalRevGap, currencyCode)}</div>
            {totalRevGapPct !== null && <DeltaBadge value={totalRevGapPct} />}
          </div>
          <div className="mal-card">
            <div className="mal-card-label">廣告費落差</div>
            <div className="mal-card-value">{fmtMoney(totalSpendGap, currencyCode)}</div>
            {totalSpendGapPct !== null && <DeltaBadge value={totalSpendGapPct} invert />}
          </div>
        </div>
        <div className="mal-scroll-wrap" style={{ overflowX: "auto" }}>
          <table className="mal-table mal-ledger-table">
            <thead>
              <tr>
                <th rowSpan={2} style={{ verticalAlign: "bottom" }}>產品代號</th>
                <th colSpan={3} className="mal-ledger-group-backend mal-ledger-group-label-backend" style={{ textAlign: "center" }}>🟩 後台實際業績</th>
                <th colSpan={2} className="mal-ledger-group-meta mal-ledger-group-label-meta" style={{ textAlign: "center" }}>🟧 Meta 回報業績</th>
                <th colSpan={2} className="mal-ledger-group-gap" style={{ textAlign: "center" }}>落差</th>
              </tr>
              <tr>
                <th className="mal-ledger-group-backend">營收</th>
                <th className="mal-ledger-group-backend">廣告費</th>
                <th className="mal-ledger-group-backend">廣告費佔比</th>
                <th className="mal-ledger-group-meta">營收</th>
                <th className="mal-ledger-group-meta">廣告費</th>
                <th className="mal-ledger-group-gap">營收落差%</th>
                <th className="mal-ledger-group-gap">廣告費落差%</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r) => (
                <tr key={r.code}>
                  <td>
                    {r.code}
                    {r.onlyBackend && <span style={{ fontSize: 10, color: "var(--red)", marginLeft: 4 }}>僅後台</span>}
                    {r.onlyMeta && <span style={{ fontSize: 10, color: "var(--red)", marginLeft: 4 }}>僅Meta</span>}
                  </td>
                  <td className="mal-ledger-group-backend">{fmtMoney(r.backendRevenue, currencyCode)}</td>
                  <td className="mal-ledger-group-backend">{fmtMoney(r.backendSpend, currencyCode)}</td>
                  <td className="mal-ledger-group-backend">{adPct(r.backendSpend, r.backendRevenue, adRatioThresholds[activeBrandId])}</td>
                  <td className="mal-ledger-group-meta">{fmtMoney(r.metaRevenue, currencyCode)}</td>
                  <td className="mal-ledger-group-meta">{fmtMoney(r.metaSpend, currencyCode)}</td>
                  <td className="mal-ledger-group-gap">{r.revGapPct !== null ? <DeltaBadge value={r.revGapPct} /> : "—"}</td>
                  <td className="mal-ledger-group-gap">{r.spendGapPct !== null ? `${r.spendGapPct >= 0 ? "+" : ""}${r.spendGapPct.toFixed(0)}%` : "—"}</td>
                </tr>
              ))}
              <tr>
                <td className="mal-row-month">合計</td>
                <td className="mal-ledger-group-backend mal-row-month">{fmtMoney(totalBackendRevenue, currencyCode)}</td>
                <td className="mal-ledger-group-backend mal-row-month">{fmtMoney(totalBackendSpend, currencyCode)}</td>
                <td className="mal-ledger-group-backend mal-row-month">{adPct(totalBackendSpend, totalBackendRevenue, adRatioThresholds[activeBrandId])}</td>
                <td className="mal-ledger-group-meta mal-row-month">{fmtMoney(totalMetaRevenue, currencyCode)}</td>
                <td className="mal-ledger-group-meta mal-row-month">{fmtMoney(totalMetaSpend, currencyCode)}</td>
                <td className="mal-ledger-group-gap mal-row-month">{totalRevGapPct !== null ? <DeltaBadge value={totalRevGapPct} /> : "—"}</td>
                <td className="mal-ledger-group-gap mal-row-month">{totalSpendGapPct !== null ? `${totalSpendGapPct >= 0 ? "+" : ""}${totalSpendGapPct.toFixed(0)}%` : "—"}</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p style={{ fontSize: 11, color: "var(--ink-soft)", margin: "8px 0 0" }}>
          🟩 後台實際業績 = 匯入的每日收益表(以下單日期為準,已扣退換貨);🟧 Meta 回報業績 = Meta 廣告後台回報的轉換金額(以歸因時間為準)。落差% = (Meta − 後台) ÷ 後台。
        </p>
        <div className="mal-week-analysis">
          <div className="mal-week-analysis-title">基礎分析:為什麼會有落差</div>
          <ul>
            <li>歸因時間差:Meta 依廣告帳戶時區、點擊或瀏覽後 1~7 天內成立的轉換計算,後台則依「實際下單日期」計算,同一筆訂單可能被算進不同天,尤其影響跨月/跨週邊界。</li>
            <li>非 Meta 廣告帶來的訂單:自然流量、Google、社團、業配連結等其他渠道的訂單只會出現在後台,不會算進 Meta 回報的營收。</li>
            <li>退換貨與訂單取消:後台營收通常已扣除退貨/取消,Meta 的轉換數字多半不會事後修正,會讓 Meta 端顯示比實際偏高。</li>
            <li>轉換去重估算方式不同:Meta 用像素/CAPI 綜合估算轉換金額,與後台實際成立訂單金額本來就存在估算誤差。</li>
            {onlyBackendCodes.length > 0 && (
              <li>「{onlyBackendCodes.join("、")}」只有後台資料、Meta 端找不到對應代號,可能是這些商品目前沒有投放 Meta 廣告,或廣告活動命名沒有加上一致的產品代號。</li>
            )}
            {onlyMetaCodes.length > 0 && (
              <li>「{onlyMetaCodes.join("、")}」只有 Meta 資料、後台找不到對應,請確認是否已匯入這個{periodLabel}的後台報表,或後台的產品代號拼法是否一致。</li>
            )}
            {metaBreak.unresolved > 0 && (
              <li>Meta 端另有 {metaBreak.unresolved} 支廣告的行銷活動名稱沒有加上「【產品代號】」,沒有被算進上表,可能讓 Meta 端的營收被低估。</li>
            )}
          </ul>
        </div>
      </>
    );
  }

  function PerformanceBreakdown({ ads, currencyCode, accountId }) {
    const { qualifyingAds, buckets } = groupAdsByPerformance(ads);
    const brandPageId = derivePageIdFromAds(ads);
    // 預設先把每一組收起來(不然「成效好」動輒上百支廣告,頁面會很長),
    // 點卡片跳過去的時候,才把該組展開,同時捲動過去。
    const [collapsed, setCollapsed] = useState({ good: true, normal: true, poor: true, learning: true });

    useEffect(() => {
      function handleExpandAll() {
        setCollapsed({ good: false, normal: false, poor: false, learning: false });
      }
      window.addEventListener(PERF_EXPAND_ALL_EVENT, handleExpandAll);
      return () => window.removeEventListener(PERF_EXPAND_ALL_EVENT, handleExpandAll);
    }, []);

    if (!qualifyingAds.length) return null;

    function jumpToBucket(k) {
      if (!buckets[k].length) return;
      setCollapsed((prev) => ({ ...prev, [k]: false }));
      // 等展開後 DOM 高度更新,再捲動,位置才會準——不然可能捲到展開前的舊位置。
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const el = document.getElementById(`mal-perf-bucket-${k}`);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });
    }

    function toggleBucket(k) {
      setCollapsed((prev) => ({ ...prev, [k]: !prev[k] }));
    }

    return (
      <>
        <h2 className="mal-section-title">
          廣告成效分類<span className="mal-section-count">(花費 ≥ {MIN_AD_SPEND} 的廣告共 {qualifyingAds.length} 支,含已停止)</span>

  async function fetchFullMonthFromApi() {
    if (!apiMonth) {
      setApiError("請選擇月份。");
      return;
    }
    if (!activeBrandId) {
      setApiError("請先在上方選擇一個品牌。");
      return;
    }
    setApiError(null);
    setApiNotice(null);
    setApiLoading(true);
    try {
      const [y, m] = apiMonth.split("-").map(Number);
      const since = `${apiMonth}-01`;
      const lastDay = new Date(y, m, 0).getDate();
      const until = `${apiMonth}-${String(lastDay).padStart(2, "0")}`;
      const record = await callMetaWorker("/api/meta/insights", { accountId: activeBrandId, since, until, relax: "false" });
      await storage.set(monthKeyFor(activeBrandId, apiMonth), JSON.stringify(record));
      await loadAll(activeBrandId);
      setFocusMonth(apiMonth);
      setViewMode("month");
      setApiNotice(`已抓到 ${monthLabel(apiMonth)} 的資料,共 ${record.ads.length} 支廣告。`);
      setShowApiPanel(false);
    } catch (e) {
      setApiError("抓取失敗:" + e.message + apiErrorHint(e));
    } finally {
      setApiLoading(false);
    }
  }

  async function fetchBatchFromApi() {
    if (!apiToken.trim() || (batchGranularity === "month" && !apiMonth)) {
      setApiError("請填入存取權杖" + (batchGranularity === "month" ? "並選擇月份。" : "。"));
      return;
    }
    const targets = brands.filter((b) => selectedBatchBrandIds.includes(b.id));
    if (!targets.length) {
      setApiError("請至少勾選一個品牌。");
      return;
    }
    setApiError(null);
    setApiNotice(null);
    setApiLoading(true);
    const progress = targets.map((b) => ({ id: b.id, name: b.name, status: "pending", message: "" }));
    setBatchProgress(progress);
    let lastWeekRangeUsed = null;
    for (let i = 0; i < targets.length; i++) {
      const b = targets[i];
      setBatchProgress((prev) => prev.map((p, idx) => (idx === i ? { ...p, status: "running" } : p)));
      try {
        if (batchGranularity === "week") {
          // 每個品牌的廣告帳號時區可能不一樣,「上週」要分別依各自帳號的時區去算,
          // 不能整批共用同一組日期,不然時區跟瀏覽器不同的帳號會抓錯週次、數字對不起來。
          const tzOffset = await fetchAccountUtcOffset(apiToken.trim(), b.id);
          const weekRangeForThisBrand = getLastWeekRange(tzOffset);
          lastWeekRangeUsed = weekRangeForThisBrand;
          const record = await fetchInsightsForRange(apiToken.trim(), b.id, weekRangeForThisBrand.since, weekRangeForThisBrand.until, true);
          await storage.set(weekKeyFor(b.id, weekRangeForThisBrand.weekStart), JSON.stringify(record));
          setBatchProgress((prev) =>
            prev.map((p, idx) => (idx === i ? { ...p, status: record.ads.length ? "done" : "empty", message: `${record.ads.length} 支廣告` } : p))
          );
        } else {
          const record = await fetchOneBrandMonth(apiToken.trim(), b.id, apiMonth);
          await storage.set(monthKeyFor(b.id, apiMonth), JSON.stringify(record));
          setBatchProgress((prev) =>
            prev.map((p, idx) => (idx === i ? { ...p, status: record.ads.length ? "done" : "empty", message: `${record.ads.length} 支廣告` } : p))
          );
        }
      } catch (e) {
        setBatchProgress((prev) => prev.map((p, idx) => (idx === i ? { ...p, status: "error", message: e.message } : p)));
      }
      if (i < targets.length - 1) await new Promise((r) => setTimeout(r, 4000));
    }
    setApiLoading(false);
    if (batchGranularity === "week" && lastWeekRangeUsed) setWeekInfo(lastWeekRangeUsed);
    setApiNotice("批次抓取完成,上方可以切換品牌查看結果。");
    await loadAll(activeBrandId);
    await loadAllWeeks(activeBrandId);
  }

  // 自動更新前3個月月報表:計算當月和前2個月,依次抓取每個月的資料
  async function fetchRecentMonthsFromApi(monthsCount) {
    if (!apiToken.trim() || !apiAccountId.trim()) {
      setApiError("請填入存取權杖跟廣告帳號 ID。");
      return;
    }
    setApiError(null);
    setApiNotice(null);
    setApiLoading(true);
    setShowApiPanel(false);
    try {
      const cleanId = apiAccountId.trim().replace(/^act_/, "");
      const brandIdToUse = await ensureBrandRegistered(cleanId);

      // 計算前 N 個月(包含當月)
      const monthsToFetch = [];
      const now = new Date();
      for (let m = 0; m < monthsCount; m++) {
        const d = new Date(now.getFullYear(), now.getMonth() - m, 1);
        const monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
        monthsToFetch.push(monthKey);
      }
      monthsToFetch.reverse(); // 反轉,從最早的月開始抓

      const progress = monthsToFetch.map((mk) => ({ id: mk, name: monthLabel(mk), status: "pending", message: "" }));
      setBatchProgress(progress);

      let successCount = 0, errorCount = 0;
      for (let m = 0; m < monthsToFetch.length; m++) {
        const monthKey = monthsToFetch[m];
        setBatchProgress((prev) => prev.map((p, idx) => (idx === m ? { ...p, status: "running" } : p)));
        try {
          const record = await fetchOneBrandMonth(apiToken.trim(), cleanId, monthKey);
          await storage.set(monthKeyFor(brandIdToUse, monthKey), JSON.stringify(record));
          successCount++;
          setBatchProgress((prev) =>
            prev.map((p, idx) => (idx === m ? { ...p, status: record.ads.length ? "done" : "empty", message: `${record.ads.length} 支廣告` } : p))
          );
        } catch (e) {
          errorCount++;
          setBatchProgress((prev) => prev.map((p, idx) => (idx === m ? { ...p, status: "error", message: e.message } : p)));
        }
        if (m < monthsToFetch.length - 1) await new Promise((r) => setTimeout(r, 4000));
      }

      setActiveBrandId(brandIdToUse);
      await loadAll(brandIdToUse);
      setFocusMonth(monthsToFetch[monthsToFetch.length - 1]); // 聚焦到最新月份
      setApiNotice(`已自動更新前 ${monthsCount} 個月:成功 ${successCount} 個月${errorCount > 0 ? `,失敗 ${errorCount} 個月` : ""}。`);
    } catch (e) {
      setApiError("抓取失敗:" + e.message + apiErrorHint(e));
    } finally {
      setApiLoading(false);
    }
  }

  // 自動同步(網頁打開時背景觸發):改用跟「快速補3月」「快速補4週」同一套不需要貼權杖的 Worker 代理(callMetaWorker),
  // 不再依賴使用者手動貼的 apiToken——這是之前「自動同步」實際上一直沒有真的在跑的原因(舊寫法一定要有 token 才會動,
  // 但這個工具平常都是用免貼權杖的按鈕在抓資料,token 從來沒被設定過,自動同步一開始就直接返回)。
  // 涵蓋範圍比照「快速補3月/快速補4週」的既有定義:近3個月 = 當月 + 前2個月;近4週 = 上週起算的前4週。
  // 當月、當週還在累積中,所以每次都重新抓最新的(不然「更新到前一天」不會真的發生);
  // 已經結束的月份/週,只在缺資料時才補,已經抓過的歷史資料不重複打 API,避免浪費 Meta 額度。
  // 一天只會真的觸發一次(用本機記錄的日期比對),不管同一天內重新整理頁面幾次都不會重複抓。
  const AUTO_SYNC_DATE_KEY = "meta-auto-sync-last-date";
  async function runAutoSyncWith(brandsList, force = false) {
    const targets = (brandsList && brandsList.length) ? brandsList : HARDCODED_BRANDS;
    if (!targets.length) return;

    const todayStr = new Date().toISOString().slice(0, 10);
    if (!force) {
      const lastRunRes = await storage.get(AUTO_SYNC_DATE_KEY).catch(() => null);
      if (lastRunRes && lastRunRes.value === todayStr) return; // 今天已經自動同步過了(手動按「刷新全部」不受這個限制)
    }

    const RECENT_MONTHS = 3; // 當月 + 前2個月,定義跟「快速補3月」一致
    const RECENT_WEEKS = 4; // 上週起算的前4週,定義跟「快速補4週」一致
    let successCount = 0, errorCount = 0;
    setAutoSyncStatus(`自動同步中… 更新近 ${RECENT_MONTHS} 個月與近 ${RECENT_WEEKS} 週資料`);

    for (const t of targets) {
      try {
        const tz = await callMetaWorker("/api/meta/timezone", { accountId: t.id });

        // 月份:m=0 是當月,每次都重新抓;m=1、m=2 是已結束的月份,缺了才補。
        const now = new Date();
        for (let m = 0; m < RECENT_MONTHS; m++) {
          const d = new Date(now.getFullYear(), now.getMonth() - m, 1);
          const monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
          if (m > 0) {
            const existing = await storage.get(monthKeyFor(t.id, monthKey)).catch(() => null);
            if (existing) continue; // 已結束的月份,已經抓過就跳過
          }
          try {
            const since = `${monthKey}-01`;
            const lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
            const until = `${monthKey}-${String(lastDay).padStart(2, "0")}`;
            const record = await callMetaWorker("/api/meta/insights", { accountId: t.id, since, until, relax: "false" });
            await storage.set(monthKeyFor(t.id, monthKey), JSON.stringify(record));
            successCount++;
          } catch { errorCount++; }
          await new Promise((r) => setTimeout(r, 4000));
        }

        // 週:w=1 是上週,每次都重新抓(上週如果剛結束沒幾天,數字可能還在微調);w=2~4 缺了才補。
        for (let w = 1; w <= RECENT_WEEKS; w++) {
          const info = getLastWeekRange(tz.utcOffsetHours, w);
          if (w > 1) {
            const existing = await storage.get(weekKeyFor(t.id, info.weekStart)).catch(() => null);
            if (existing) continue;
          }
          try {
            const record = await callMetaWorker("/api/meta/insights", { accountId: t.id, since: info.since, until: info.until, relax: "true" });
            await storage.set(weekKeyFor(t.id, info.weekStart), JSON.stringify(record));
            successCount++;
          } catch { errorCount++; }
          await new Promise((r) => setTimeout(r, 4000));
        }
      } catch { errorCount++; }
    }

    await storage.set(AUTO_SYNC_DATE_KEY, todayStr);
    setAutoSyncStatus(null);
    await loadAll(activeBrandId);
    await loadAllWeeks(activeBrandId);
    if (successCount > 0) {
      setMetaUpdateNotice(`已自動同步完成:成功更新 ${successCount} 筆資料${errorCount > 0 ? `,${errorCount} 筆失敗(可能是頻率限制,之後再手動抓一次即可)` : ""}。`);
    }
  }

  // 手動觸發同步(例如面板裡的「立即同步」按鈕)
  function runAutoSync() {
    return runAutoSyncWith(brands.length ? brands : HARDCODED_BRANDS);
  }

  // 直接呼叫 /api/sheets/sync(不是 /api/sheets/auto),指定明確的 accountId——
  // 跟登入自動觸發的每日同步用同一支後端 API,但這支沒有「一天一次」的限制,手動按永遠會真的去抓一次最新的。
  // sheetId 留空,後端會自動沿用這個品牌上次記住的試算表 ID,不用重新貼一次。
  async function syncLedgerForAccount(accountId) {
    const res = await fetch(`/api/sheets/sync`, {
      method: "POST",
      headers: { ...teamKeyHeaders(), "Content-Type": "application/json" },
      body: JSON.stringify({ accountId, sheetId: "", year: Number(ledgerYear) }),
    });
    const json = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
    if (accountId === activeBrandId) await loadLedger(activeBrandId);
    return json;
  }

  // 一鍵刷新全部資料來源:①官網+一頁廣告成效(Meta,近3個月+近4週)②Shopline 訂單(近3個月+近4週)
  // ③一頁業績的每日收益表(Google 試算表)。依序執行(不是同時打,避免太多請求一起打向 Meta/Shopline 觸發頻率限制),
  // 手動點的動作,不受背景自動同步「一天一次」的限制,想刷新隨時可以按。任一項目失敗不會擋住其他項目繼續執行。
  // force=true(手動按「刷新全部」):不管今天有沒有跑過,一定重新整理一次。
  // force=false(網頁打開時自動觸發):先檢查今天是否已經自動刷新過,跑過就直接跳過,避免同一天開好幾次網頁重複打一堆 API。
  async function refreshAllData(force = true) {
    if (!force) {
      const todayStr = new Date().toISOString().slice(0, 10);
      const lastRunRes = await storage.get(AUTO_SYNC_DATE_KEY).catch(() => null);
      if (lastRunRes && lastRunRes.value === todayStr) return;
    }
    setRefreshAllStatus("整理中… 官網 / 一頁廣告成效");
    let metaOk = true;
    try {
      await runAutoSyncWith(HARDCODED_BRANDS, force);
    } catch { metaOk = false; }

    setRefreshAllStatus("整理中… Shopline 訂單");
    let shoplineOk = true;
    try {
      const RECENT_MONTHS = 3;
      const RECENT_WEEKS = 4;
      const now = new Date();
      for (let m = 0; m < RECENT_MONTHS; m++) {
        const d = new Date(now.getFullYear(), now.getMonth() - m, 1);
        const monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
        if (m > 0 && shoplineMonthsData[monthKey]) continue; // 已結束的月份,之前抓過就不重抓
        try { await fetchShoplineForMonth(monthKey); } catch {}
        await new Promise((r) => setTimeout(r, 1500));
      }
      for (let w = 1; w <= RECENT_WEEKS; w++) {
        const { weekStart } = getLastWeekRange(8, w); // Shopline 不分品牌,固定用台灣時區(UTC+8)算週界
        if (w > 1 && shoplineWeeksData[weekStart]) continue; // 已結束的週,之前抓過就不重抓
        try { await fetchShoplineForWeek(weekStart); } catch {}
        await new Promise((r) => setTimeout(r, 1500));
      }
    } catch { shoplineOk = false; }

    setRefreshAllStatus("整理中… 每日收益表(Google 試算表)");
    let ledgerOk = true;
    try {
      await syncLedgerForAccount(ONEPAGE_BRAND_ID); // H&J 一頁業績
    } catch { ledgerOk = false; }

    setRefreshAllStatus(null);
    const failedParts = [!metaOk && "廣告成效", !shoplineOk && "Shopline 訂單", !ledgerOk && "每日收益表"].filter(Boolean);
    setApiNotice(
      failedParts.length
        ? `刷新完成,但有部分失敗(${failedParts.join("、")}),可以再按一次或個別手動重試。`
        : "已完成刷新全部資料:官網/一頁廣告成效、Shopline 訂單、每日收益表都是最新的。"
    );
  }

  const sortedKeys = useMemo(() => Object.keys(months).sort(), [months]);
  const enriched = useMemo(() => { const out = {}; for (const mk of sortedKeys) out[mk] = deriveMetrics(months[mk]); return out; }, [months, sortedKeys]);
  const chartData = useMemo(() => sortedKeys.map((mk) => ({
    month: monthLabel(mk), 廣告費: Math.round(enriched[mk].spend), 轉單: enriched[mk].conversions,
    CPA: enriched[mk].cpa !== null ? Number(enriched[mk].cpa.toFixed(1)) : null,
    ROAS: enriched[mk].roas !== null ? Number(enriched[mk].roas.toFixed(2)) : null,
  })), [sortedKeys, enriched]);
  const currency = sortedKeys.length ? months[sortedKeys[sortedKeys.length - 1]].currency : "TWD";
  const focusIdx = sortedKeys.indexOf(focusMonth);
  const focusData = focusMonth ? enriched[focusMonth] : null;
  const prevData = focusIdx > 0 ? enriched[sortedKeys[focusIdx - 1]] : null;
  const MIN_AD_SPEND = 500;
  const spendFilteredAds = focusData && focusData.ads ? focusData.ads.filter((ad) => ad.spend >= MIN_AD_SPEND) : [];
  const visibleAds = filterAdsByStatus(spendFilteredAds, adStatusFilter, adSearchKeyword);
  const hiddenAdCount = focusData && focusData.ads ? focusData.ads.length - spendFilteredAds.length : 0;

  // ---------- 每日營收報表:直接呈現後台每日收益表(ledgerByMonth)裡「每一天 x 每個產品代號」的明細,不用另外彙總 ----------
  // 選單月份/選單日,優先順序是:①使用者自己手動點過的(dailyMonth/focusDay,只要那筆資料還在就沿用,尊重手動導覽)
  // ②今天實際的月份/日期(如果那個月/那一天剛好有資料的話)③都沒有的話,退回資料裡最後一筆(例如試算表只匯到某個過去的月份)。
  const ledgerMonthKeys = useMemo(() => Object.keys(ledgerByMonth).sort(), [ledgerByMonth]);
  const todayParts = useMemo(() => {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const d = String(now.getDate()).padStart(2, "0");
    return { monthKey: `${y}-${m}`, dateKey: `${y}-${m}-${d}` };
  }, []);
  const activeDailyMonth = (dailyMonth && ledgerByMonth[dailyMonth])
    ? dailyMonth
    : ledgerByMonth[todayParts.monthKey]
    ? todayParts.monthKey
    : (ledgerMonthKeys.length ? ledgerMonthKeys[ledgerMonthKeys.length - 1] : null);
  const dailyMonthRecord = activeDailyMonth ? ledgerByMonth[activeDailyMonth] : null;
  const sortedDailyDays = useMemo(
    () => (dailyMonthRecord ? dailyMonthRecord.days.slice().sort((a, b) => (a.date < b.date ? -1 : 1)) : []),
    [dailyMonthRecord]
  );
  const activeFocusDay = (focusDay && sortedDailyDays.some((d) => d.date === focusDay))
    ? focusDay
    : sortedDailyDays.some((d) => d.date === todayParts.dateKey)
    ? todayParts.dateKey
    : (sortedDailyDays.length ? sortedDailyDays[sortedDailyDays.length - 1].date : null);
  const focusDayRecord = activeFocusDay ? sortedDailyDays.find((d) => d.date === activeFocusDay) : null;
  // 前一天的紀錄,用來做「業績比例分析」的日對日比較——只在同一個月份分頁裡往前找,
  // 不跨月(如果focusDay是這個月第一天,就沒有前一天可比,這跟月報表/週報表比不到「上一期」是同樣的道理)。
  const focusDayIdx = activeFocusDay ? sortedDailyDays.findIndex((d) => d.date === activeFocusDay) : -1;
  const prevDayRecord = focusDayIdx > 0 ? sortedDailyDays[focusDayIdx - 1] : null;
  const dailyMatrixCodes = dailyMonthRecord ? dailyMonthRecord.productCodes : [];

  // 官網業績「每日報表」用:邏輯跟上面一頁業績那套完全一樣(月份分頁 → 選一天/矩陣總覽,自動帶入今天或最新一天有資料的日期),
  // 只是資料源換成 shoplineMonthsData(Shopline 訂單),不是 ledgerByMonth(Google 試算表帳本)。
  // dailyMonth/focusDay/dailySubMode 兩個品牌共用同一組 state——切換品牌時,如果原本選的月份/日期對新資料源無效,
  // 下面的 fallback 邏輯會自動退回「今天」或「最新一筆有資料的日期」,不需要另外開一組獨立的 state。
  const officialDailyMonthKeys = useMemo(() => Object.keys(shoplineMonthsData).sort(), [shoplineMonthsData]);
  const activeOfficialDailyMonth = (dailyMonth && shoplineMonthsData[dailyMonth])
    ? dailyMonth
    : shoplineMonthsData[todayParts.monthKey]
    ? todayParts.monthKey
    : (officialDailyMonthKeys.length ? officialDailyMonthKeys[officialDailyMonthKeys.length - 1] : null);
  const officialDailyMonthRecord = activeOfficialDailyMonth ? shoplineMonthsData[activeOfficialDailyMonth] : null;
  const officialDailyRows = useMemo(
    () => groupShoplineOrdersByDay(officialDailyMonthRecord ? officialDailyMonthRecord.orders : null),
    [officialDailyMonthRecord]
  );
  // groupShoplineOrdersByDay 回傳的是新到舊排序,這裡另外存一份舊到新的,跟 sortedDailyDays(一頁業績那邊)排序方向一致,
  // 這樣「選一天」的日期分頁、矩陣總覽的逐日列表,兩個品牌看起來的排列順序才會一樣。
  const sortedOfficialDailyRows = useMemo(() => officialDailyRows.slice().sort((a, b) => (a.date < b.date ? -1 : 1)), [officialDailyRows]);
  const activeOfficialFocusDay = (focusDay && sortedOfficialDailyRows.some((d) => d.date === focusDay))
    ? focusDay
    : sortedOfficialDailyRows.some((d) => d.date === todayParts.dateKey)
    ? todayParts.dateKey
    : (sortedOfficialDailyRows.length ? sortedOfficialDailyRows[sortedOfficialDailyRows.length - 1].date : null);
  const officialFocusDayRecord = activeOfficialFocusDay ? sortedOfficialDailyRows.find((d) => d.date === activeOfficialFocusDay) : null;
  const officialDailyMonthTotal = useMemo(() => {
    return officialDailyRows.reduce(
      (acc, d) => ({
        orderCount: acc.orderCount + d.orderCount,
        grossRevenue: acc.grossRevenue + d.grossRevenue,
        discountAmount: acc.discountAmount + d.discountAmount,
        netRevenue: acc.netRevenue + d.netRevenue,
      }),
      { orderCount: 0, grossRevenue: 0, discountAmount: 0, netRevenue: 0 }
    );
  }, [officialDailyRows]);
  // 基礎分析用:當月哪一天實收營收最高。
  const officialHighestRevenueDay = useMemo(() => {
    if (!officialDailyRows.length) return null;
    return officialDailyRows.reduce((best, d) => (!best || d.netRevenue > best.netRevenue ? d : best), null);
  }, [officialDailyRows]);
  // threshold 有給且超過時,回傳標紅、加驚嘆號的樣式;沒給 threshold 或沒超過,就是原本的樣式。
  // adPct / AD_RATIO_CRITICAL_PCT 已經移到檔案最上面的頂層,這裡不用重複定義。
  const netProfitCell = (value) => {
    if (value < 0) {
      return (
        <span style={{ color: "#8B1E2B", fontWeight: 700, background: "#FBE4E4", padding: "1px 6px", borderRadius: 4 }}>
          {fmtMoney(value)}
        </span>
      );
    }
    return fmtMoney(value);
  };
  // 基礎分析用:當月每一天的廣告費佔比,抓出佔比最高的一天,以及(如果有設定門檻)超過門檻的天數清單。
  const dailyRatioStats = useMemo(() => {
    let highestDay = null;
    const overThresholdDays = [];
    const threshold = adRatioThresholds[activeBrandId];
    sortedDailyDays.forEach((d) => {
      if (d.overall.revenue > 0) {
        const pct = (d.overall.adSpend / d.overall.revenue) * 100;
        if (!highestDay || pct > highestDay.pct) highestDay = { date: d.date, pct };
        if (threshold != null && pct > threshold) overThresholdDays.push({ date: d.date, pct });
      }
    });
    return { highestDay, overThresholdDays };
  }, [sortedDailyDays, adRatioThresholds, activeBrandId]);

  // 目前這個月裡,淨利潤是負的那幾天——比廣告費佔比超標更嚴重,所以不是放在下面的「基礎分析」裡,
  // 是顯示在每日報表最上面,一打開就看得到,不用往下滑或切分頁去找。
  const negativeProfitDays = useMemo(
    () => sortedDailyDays.filter((d) => d.overall && d.overall.netProfit < 0),
    [sortedDailyDays]
  );

  // ---------- 業配廣告長線分析:把名稱或行銷活動裡含「業配」兩個字的廣告單獨拉出來,依月份累計趨勢 ----------
  const SPONSOR_KEYWORD = "業配";
  const sponsorMonthlyStats = useMemo(() => sortedKeys.map((mk) => {
    const rec = months[mk];
    const sponsorAds = (rec.ads || []).filter(
      (ad) => (ad.name && ad.name.includes(SPONSOR_KEYWORD)) || (ad.campaign && ad.campaign.includes(SPONSOR_KEYWORD))
    );
    const spend = sponsorAds.reduce((s, a) => s + a.spend, 0);
    const conversions = sponsorAds.reduce((s, a) => s + a.conversions, 0);
    const revenue = sponsorAds.reduce((s, a) => s + a.revenue, 0);
    return {
      monthKey: mk, month: monthLabel(mk), ads: sponsorAds, spend, conversions, revenue,
      cpa: conversions > 0 ? spend / conversions : null,
      roas: spend > 0 && revenue > 0 ? revenue / spend : null,
    };
  }), [sortedKeys, months]);
  const sponsorChartData = useMemo(() => sponsorMonthlyStats.map((s) => ({
    month: s.month, 廣告費: Math.round(s.spend), 轉單: s.conversions,
    CPA: s.cpa !== null ? Number(s.cpa.toFixed(1)) : null,
    ROAS: s.roas !== null ? Number(s.roas.toFixed(2)) : null,
  })), [sponsorMonthlyStats]);
  const sponsorTotal = useMemo(() => {
    const spend = sponsorMonthlyStats.reduce((s, m) => s + m.spend, 0);
    const conversions = sponsorMonthlyStats.reduce((s, m) => s + m.conversions, 0);
    const revenue = sponsorMonthlyStats.reduce((s, m) => s + m.revenue, 0);
    return { spend, conversions, revenue, cpa: conversions > 0 ? spend / conversions : null, roas: spend > 0 && revenue > 0 ? revenue / spend : null };
  }, [sponsorMonthlyStats]);
  const sponsorMonthsWithData = sponsorMonthlyStats.filter((m) => m.ads.length > 0);

  const sortedWeekKeys = useMemo(() => Object.keys(weeksData).sort(), [weeksData]);
  const focusWeekData = focusWeek ? weeksData[focusWeek] : null;
  const focusWeekIdx = sortedWeekKeys.indexOf(focusWeek);
  const prevWeekData = focusWeekIdx > 0 ? weeksData[sortedWeekKeys[focusWeekIdx - 1]] : null;
  function weekLabel(weekStart) {
    if (!weekStart) return "";
    const [y, m, d] = weekStart.split("-").map(Number);
    const start = new Date(y, m - 1, d);
    const end = new Date(y, m - 1, d + 6);
    const fmt2 = (dt) => `${String(dt.getMonth() + 1).padStart(2, "0")}/${String(dt.getDate()).padStart(2, "0")}`;
    return `${fmt2(start)}~${fmt2(end)}`;
  }

  const sortedVisibleAds = useMemo(() => {
    const withMetrics = visibleAds.map((ad) => ({
      ad,
      cpa: ad.conversions > 0 ? ad.spend / ad.conversions : null,
      roas: ad.spend > 0 && ad.revenue > 0 ? ad.revenue / ad.spend : null,
    }));
    if (adSortMode === "cpa") {
      return withMetrics
        .slice()
        .sort((a, b) => {
          if (a.cpa === null) return 1;
          if (b.cpa === null) return -1;
          return a.cpa - b.cpa;
        })
        .map((x) => x.ad);
    }
    if (adSortMode === "roas") {
      return withMetrics
        .slice()
        .sort((a, b) => {
          if (a.roas === null) return 1;
          if (b.roas === null) return -1;
          return b.roas - a.roas;
        })
        .map((x) => x.ad);
    }
    if (adSortMode === "composite") {
      // rank-based composite: best CPA (lowest) and best ROAS (highest) each contribute a rank;
      // lower combined rank = better overall performance. Ads missing a metric get the worst rank.
      const n = withMetrics.length;
      const byCpa = withMetrics
        .map((x, i) => i)
        .sort((i, j) => {
          const a = withMetrics[i].cpa, b = withMetrics[j].cpa;
          if (a === null) return 1;
          if (b === null) return -1;
          return a - b;
        });
      const byRoas = withMetrics
        .map((x, i) => i)
        .sort((i, j) => {
          const a = withMetrics[i].roas, b = withMetrics[j].roas;
          if (a === null) return 1;
          if (b === null) return -1;
          return b - a;
        });
      const cpaRank = new Array(n), roasRank = new Array(n);
      byCpa.forEach((idx, rank) => { cpaRank[idx] = rank; });
      byRoas.forEach((idx, rank) => { roasRank[idx] = rank; });
      return withMetrics
        .map((x, i) => ({ ad: x.ad, score: cpaRank[i] + roasRank[i] }))
        .sort((a, b) => a.score - b.score)
        .map((x) => x.ad);
    }
    if (adSortMode === "startDate") {
      return withMetrics
        .slice()
        .sort((a, b) => {
          if (!a.ad.startDate) return 1;
          if (!b.ad.startDate) return -1;
          return a.ad.startDate < b.ad.startDate ? 1 : a.ad.startDate > b.ad.startDate ? -1 : 0;
        })
        .map((x) => x.ad);
    }
    // default: by spend, high to low
    return withMetrics.map((x) => x.ad).sort((a, b) => b.spend - a.spend);
  }, [visibleAds, adSortMode]);

  // 折價券查詢:依目前選中/搜尋的折價券代碼,從查詢結果的原始訂單裡篩出用過這組代碼的所有訂單(不分大小寫比對)。
  const couponFocusOrders = useMemo(() => {
    if (!couponFocusCode || !couponQueryData) return [];
    const target = couponFocusCode.trim().toUpperCase();
    return (couponQueryData.orders || [])
      .filter((o) => (o.discountCodes || []).some((c) => String(c).toUpperCase() === target))
      .sort((a, b) => (a.createdAt < b.createdAt ? 1 : -1));
  }, [couponFocusCode, couponQueryData]);
  const couponFocusSummary = useMemo(() => {
    if (!couponFocusCode || !couponQueryData) return null;
    const target = couponFocusCode.trim().toUpperCase();
    return (couponQueryData.discountSummary || []).find((d) => String(d.code).toUpperCase() === target) || null;
  }, [couponFocusCode, couponQueryData]);

  // ---------- 密碼閘:還沒驗證通過就不顯示任何報表內容 ----------
  if (isUnlocked === null) {
    return null; // 還在檢查瀏覽器有沒有記住解鎖狀態,先不顯示任何畫面,避免閃一下
  }
  if (!isUnlocked) {
    return (
      <div className="mal-gate-shell">
        <form className="mal-gate-card" onSubmit={handleUnlock}>
          <div className="mal-gate-icon">🔒</div>
          <h1 className="mal-gate-title">H&J業績總表</h1>
          <p className="mal-gate-sub">請輸入密碼才能查看報表內容</p>
          <input
            type="password"
            autoFocus
            value={gatePasswordInput}
            onChange={(e) => setGatePasswordInput(e.target.value)}
            placeholder="請輸入密碼"
            className="mal-gate-input"
          />
          {gateError && <p className="mal-gate-error">{gateError}</p>}
          <button type="submit" className="mal-btn mal-btn-primary mal-gate-submit">進入</button>
        </form>
      </div>
    );
  }

  return (
    <div className="mal-shell">

                    </h3>
                    <div className="mal-scroll-wrap" style={{ overflowX: "auto" }}>
                      <table className="mal-table">
                        <thead>
                          <tr><th>訂單編號</th><th>下單時間</th><th>轉單金額</th><th>轉單來源</th></tr>
                        </thead>
                        <tbody>
                          {couponFocusOrders.map((o) => (
                            <tr key={o.orderId}>
                              <td>{o.orderNumber || o.orderId}</td>
                              <td>{(o.createdAt || "").replace("T", " ").slice(0, 16)}</td>
                              <td>{fmtMoney(o.amount)}</td>
                              <td style={{ textAlign: "left" }}>{formatOrderSource(o.utm)}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </>
                )
              )}
            </>
          )}
        </>
      )}

      {showTeamKeyModal && (
        <div className="mal-modal-overlay">
          <div className="mal-modal">
            <h3>每日收益表密碼</h3>
            <p className="mal-modal-sub">
              「後台每日收益表」共用資料庫部署在 Cloudflare 上,後台設定了 <code>TEAM_CREDENTIALS</code>(多組密碼,各自綁定能看的品牌)。
              輸入你自己那組密碼,系統會自動判斷你能看哪些品牌的每日收益表。密碼只存在你自己的瀏覽器裡,不會被同步出去。
              廣告成效資料(月報表/週報表)不受這組密碼影響,一直都是存在本機瀏覽器。
            </p>
            <div className="mal-field">
              <label>密碼</label>
              <input
                type="password"
                value={teamKeyInput}
                onChange={(e) => setTeamKeyInput(e.target.value)}
                placeholder="輸入你的登入密碼"
                style={{ width: "100%", padding: "8px 10px", border: "1px solid var(--rule)", borderRadius: "10px", fontFamily: "IBM Plex Mono, monospace", fontSize: "13px" }}
              />
            </div>
            <p style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 6, lineHeight: 1.5 }}>
              目前狀態:
              {cloudStatus === "connected" && ` ☁️ 已連上共用資料庫${credentialName ? `(身份:${credentialName})` : ""}`}
              {cloudStatus === "unauthorized" && " ⚠️ 有連上,但密碼不對"}
              {cloudStatus === "unavailable" && " ⚠️ 連不到 /api/kv,請確認 Cloudflare Functions 已經跟這個網站一起部署"}
              {cloudStatus === "unknown" && " 尚未測試"}
            </p>
            <div className="mal-modal-actions">
              <button className="mal-btn" onClick={() => setShowTeamKeyModal(false)}>關閉</button>
              <button className="mal-btn mal-btn-primary" onClick={saveTeamKey}>儲存並測試連線</button>
            </div>
          </div>
        </div>
      )}

      {confirmReset && (
        <div className="mal-modal-overlay">
          <div className="mal-modal mal-modal-small">
            <h3>重置「{activeBrandId ? (brands.find((b) => b.id === activeBrandId) || {}).name || activeBrandId : "此帳本"}」?</h3>
            <p className="mal-modal-sub">這會刪除目前這個品牌底下所有已儲存的月份資料,無法復原。其他品牌的資料不受影響。</p>
            <div className="mal-modal-actions">
              <button className="mal-btn" onClick={() => setConfirmReset(false)}>取消</button>
              <button className="mal-btn mal-btn-danger" onClick={resetAll}>確認重置</button>
            </div>
          </div>
        </div>
      )}

      {confirmDelete && (
        <div className="mal-modal-overlay">
          <div className="mal-modal mal-modal-small">
            <h3>刪除 {monthLabel(confirmDelete)} 的資料?</h3>
            <p className="mal-modal-sub">刪除後可重新上傳該月報表補回。</p>
            <div className="mal-modal-actions">
              <button className="mal-btn" onClick={() => setConfirmDelete(null)}>取消</button>
              <button className="mal-btn mal-btn-danger" onClick={() => deleteMonth(confirmDelete)}>確認刪除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MetaAdsLedger />);
</script>
</body>
</html>

<!-- touch: 觸發重新部署,套用新的 TEAM_CREDENTIALS(品牌B部) -->
