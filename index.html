          {PERF_ORDER.map((k) => (
            <button
              type="button"
              key={k}
              className="mal-card mal-perf-card"
              disabled={!buckets[k].length}
              onClick={() => jumpToBucket(k)}
            >
              <div className="mal-perf-card-label" style={{ color: PERF_COLORS[k] }}>{PERF_LABELS[k]}</div>
              <div className="mal-card-value">{buckets[k].length}</div>
              {buckets[k].length > 0 && <div className="mal-perf-card-hint">вҶ“ й»һж“ҠжҹҘзңӢе»Је‘ҠжҳҺзҙ°</div>}
            </button>
          ))}
        </div>
        {PERF_ORDER.filter((k) => buckets[k].length > 0).map((k) => (
          <div key={k} id={`mal-perf-bucket-${k}`} className="mal-perf-section">
            <button type="button" className="mal-perf-section-header" onClick={() => toggleBucket(k)}>
              <span className="mal-perf-section-title" style={{ color: PERF_COLORS[k] }}>
                {PERF_LABELS[k]}<span className="mal-section-count">({buckets[k].length})</span>
              </span>
              <span className="mal-perf-section-chevron" style={{ transform: collapsed[k] ? "rotate(-90deg)" : "rotate(0deg)" }}>в–ҫ</span>
            </button>
            {!collapsed[k] && (
              <div className="mal-perf-section-body">
                <div className="mal-ad-list">
                  {buckets[k].map((ad, i) => {
                    const adCpa = ad.conversions > 0 ? ad.spend / ad.conversions : null;
                    const adRoas = ad.spend > 0 && ad.revenue > 0 ? ad.revenue / ad.spend : null;
                    const fbLink = fbAdsManagerLink(accountId, ad.adIds);
                    const fbLibLink = ad.active !== false ? fbAdLibraryLink(ad.adIds) : null;
                    return (
                      <div className={`mal-ad-row ${ad.active === false ? "mal-ad-row-inactive" : ""}`} key={ad.name + i}>
                        <AdThumb src={ad.image} alt={ad.name} />

                          <div className="mal-ad-name" title={ad.name}>
                            {ad.name}

  async function fetchBatchFromApi() {
    if (!apiToken.trim() || (batchGranularity === "month" && !apiMonth)) {
      setApiError("и«ӢеЎ«е…ҘеӯҳеҸ–ж¬Ҡжқ–" + (batchGranularity === "month" ? "дёҰйҒёж“ҮжңҲд»ҪгҖӮ" : "гҖӮ"));
      return;
    }
    const targets = brands.filter((b) => selectedBatchBrandIds.includes(b.id));
    if (!targets.length) {
      setApiError("и«ӢиҮіе°‘еӢҫйҒёдёҖеҖӢе“ҒзүҢгҖӮ");
      return;
    }
    setApiError(null);
    setApiNotice(null);
    setApiLoading(true);
    const progress = targets.map((b) => ({ id: b.id, name: b.name, status: "pending", message: "" }));
    setBatchProgress(progress);
    let lastWeekRangeUsed = null;
    for (let i = 0; i < targets.length; i++) {
      const b = targets[i];
      setBatchProgress((prev) => prev.map((p, idx) => (idx === i ? { ...p, status: "running" } : p)));
      try {
        if (batchGranularity === "week") {
          // жҜҸеҖӢе“ҒзүҢзҡ„е»Је‘ҠеёіиҷҹжҷӮеҚҖеҸҜиғҪдёҚдёҖжЁЈ,гҖҢдёҠйҖұгҖҚиҰҒеҲҶеҲҘдҫқеҗ„иҮӘеёіиҷҹзҡ„жҷӮеҚҖеҺ»з®—,
          // дёҚиғҪж•ҙжү№е…ұз”ЁеҗҢдёҖзө„ж—Ҙжңҹ,дёҚз„¶жҷӮеҚҖи·ҹзҖҸиҰҪеҷЁдёҚеҗҢзҡ„еёіиҷҹжңғжҠ“йҢҜйҖұж¬ЎгҖҒж•ёеӯ—е°ҚдёҚиө·дҫҶгҖӮ
          const tzOffset = await fetchAccountUtcOffset(apiToken.trim(), b.id);
          const weekRangeForThisBrand = getLastWeekRange(tzOffset);
          lastWeekRangeUsed = weekRangeForThisBrand;
          const record = await fetchInsightsForRange(apiToken.trim(), b.id, weekRangeForThisBrand.since, weekRangeForThisBrand.until, true);
          await storage.set(weekKeyFor(b.id, weekRangeForThisBrand.weekStart), JSON.stringify(record));
          setBatchProgress((prev) =>
            prev.map((p, idx) => (idx === i ? { ...p, status: record.ads.length ? "done" : "empty", message: `${record.ads.length} ж”Ҝе»Је‘Ҡ` } : p))
          );
        } else {
          const record = await fetchOneBrandMonth(apiToken.trim(), b.id, apiMonth);
          await storage.set(monthKeyFor(b.id, apiMonth), JSON.stringify(record));
          setBatchProgress((prev) =>
            prev.map((p, idx) => (idx === i ? { ...p, status: record.ads.length ? "done" : "empty", message: `${record.ads.length} ж”Ҝе»Је‘Ҡ` } : p))
          );
        }
      } catch (e) {
        setBatchProgress((prev) => prev.map((p, idx) => (idx === i ? { ...p, status: "error", message: e.message } : p)));
      }
      if (i < targets.length - 1) await new Promise((r) => setTimeout(r, 4000));
    }
    setApiLoading(false);
    if (batchGranularity === "week" && lastWeekRangeUsed) setWeekInfo(lastWeekRangeUsed);
    setApiNotice("жү№ж¬ЎжҠ“еҸ–е®ҢжҲҗ,дёҠж–№еҸҜд»ҘеҲҮжҸӣе“ҒзүҢжҹҘзңӢзөҗжһңгҖӮ");
    await loadAll(activeBrandId);
    await loadAllWeeks(activeBrandId);
  }

  // иҮӘеӢ•жӣҙж–°еүҚ3еҖӢжңҲжңҲе ұиЎЁ:иЁҲз®—з•¶жңҲе’ҢеүҚ2еҖӢжңҲ,дҫқж¬ЎжҠ“еҸ–жҜҸеҖӢжңҲзҡ„иіҮж–ҷ
  async function fetchRecentMonthsFromApi(monthsCount) {
    if (!apiToken.trim() || !apiAccountId.trim()) {
      setApiError("и«ӢеЎ«е…ҘеӯҳеҸ–ж¬Ҡжқ–и·ҹе»Је‘Ҡеёіиҷҹ IDгҖӮ");
      return;
    }
    setApiError(null);
    setApiNotice(null);
    setApiLoading(true);
    setShowApiPanel(false);
    try {
      const cleanId = apiAccountId.trim().replace(/^act_/, "");
      const brandIdToUse = await ensureBrandRegistered(cleanId);

      // иЁҲз®—еүҚ N еҖӢжңҲ(еҢ…еҗ«з•¶жңҲ)
      const monthsToFetch = [];
      const now = new Date();
      for (let m = 0; m < monthsCount; m++) {
        const d = new Date(now.getFullYear(), now.getMonth() - m, 1);
        const monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
        monthsToFetch.push(monthKey);
      }
      monthsToFetch.reverse(); // еҸҚиҪү,еҫһжңҖж—©зҡ„жңҲй–Ӣе§ӢжҠ“

      const progress = monthsToFetch.map((mk) => ({ id: mk, name: monthLabel(mk), status: "pending", message: "" }));
      setBatchProgress(progress);

      let successCount = 0, errorCount = 0;
      for (let m = 0; m < monthsToFetch.length; m++) {
        const monthKey = monthsToFetch[m];
        setBatchProgress((prev) => prev.map((p, idx) => (idx === m ? { ...p, status: "running" } : p)));
        try {
          const record = await fetchOneBrandMonth(apiToken.trim(), cleanId, monthKey);
          await storage.set(monthKeyFor(brandIdToUse, monthKey), JSON.stringify(record));
          successCount++;
          setBatchProgress((prev) =>
            prev.map((p, idx) => (idx === m ? { ...p, status: record.ads.length ? "done" : "empty", message: `${record.ads.length} ж”Ҝе»Је‘Ҡ` } : p))
          );
        } catch (e) {
          errorCount++;
          setBatchProgress((prev) => prev.map((p, idx) => (idx === m ? { ...p, status: "error", message: e.message } : p)));
        }
        if (m < monthsToFetch.length - 1) await new Promise((r) => setTimeout(r, 4000));
      }

      setActiveBrandId(brandIdToUse);
      await loadAll(brandIdToUse);
      setFocusMonth(monthsToFetch[monthsToFetch.length - 1]); // иҒҡз„ҰеҲ°жңҖж–°жңҲд»Ҫ
      setApiNotice(`е·ІиҮӘеӢ•жӣҙж–°еүҚ ${monthsCount} еҖӢжңҲ:жҲҗеҠҹ ${successCount} еҖӢжңҲ${errorCount > 0 ? `,еӨұж•— ${errorCount} еҖӢжңҲ` : ""}гҖӮ`);
    } catch (e) {
      setApiError("жҠ“еҸ–еӨұж•—:" + e.message + apiErrorHint(e));
    } finally {
      setApiLoading(false);
    }
  }

  // й–Ӣе•ҹз¶Ій ҒжҷӮзҡ„иҮӘеӢ•еҗҢжӯҘ:жӘўжҹҘдёҠйҖұ(йҖұдёҖ~йҖұж—Ҙ)и·ҹдёҠеҖӢжңҲзҡ„иіҮж–ҷжҳҜеҗҰе·Із¶“еӯҳеңЁ,
  // жІ’жңүзҡ„и©ұе°ұиҮӘеӢ•з”ЁиЁҳдҪҸзҡ„ж¬Ҡжқ–жҠ“дёҖж¬Ў,дҫқеәҸжҠ“жҜҸеҖӢеёёз”Ёе“ҒзүҢ(жҲ–й җиЁӯеёіиҷҹ),дёӯй–“й–“йҡ” 4 з§’йҒҝе…Қи§ёзҷј Meta й »зҺҮйҷҗеҲ¶гҖӮ
  async function runAutoSyncWith(token, brandsList, defaultAccountId) {
    if (!token || !token.trim()) return;
    const cleanDefaultId = (defaultAccountId || "").trim().replace(/^act_/, "");
    const targets = (brandsList && brandsList.length)
      ? brandsList.map((b) => ({ apiId: b.id, storageId: b.id, name: b.name }))
      : cleanDefaultId
      // е·Із¶“жӢҝжҺүгҖҢй җиЁӯеёіжң¬гҖҚ,жүҖд»ҘйҖҷиЈЎд№ҹдёҚиғҪеҶҚжҠҠиіҮж–ҷеӯҳйҖІзңӢдёҚеҲ°зҡ„ең°ж–№вҖ”вҖ”
      // жІ’жңүд»»дҪ•еёёз”Ёе“ҒзүҢжҷӮ,зӣҙжҺҘз”Ёеёіиҷҹ ID жң¬иә«з•¶дҪңе“ҒзүҢ ID дҫҶеӯҳ,дёҰзҷ»иЁҳйҖІе“ҒзүҢжё…е–®гҖӮ
      ? [{ apiId: cleanDefaultId, storageId: cleanDefaultId, name: cleanDefaultId }]
      : [];
    if (!targets.length) return;

    if (!brandsList || !brandsList.length) {
      const autoBrand = { name: cleanDefaultId, id: cleanDefaultId };
      const updatedBrands = [autoBrand];
      setBrands(updatedBrands);
      await storage.set("meta-api-brands", JSON.stringify(updatedBrands)).catch(() => {});
    }

    const now = new Date();
    const lastMonthDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const lastMonthKey = `${lastMonthDate.getFullYear()}-${String(lastMonthDate.getMonth() + 1).padStart(2, "0")}`;

    const weekListRes = await storage.list(WEEK_STORAGE_PREFIX).catch(() => ({ keys: [] }));
    const monthListRes = await storage.list(STORAGE_PREFIX).catch(() => ({ keys: [] }));
    const existingWeekKeys = new Set(weekListRes.keys || []);
    const existingMonthKeys = new Set(monthListRes.keys || []);

    // й–Ӣе•ҹз¶Ій ҒиҮӘеӢ•еҗҢжӯҘжҷӮ,дёҚжҳҜеҸӘиЈңгҖҢдёҠйҖұгҖҚдёҖйҖұ,иҖҢжҳҜиҮӘеӢ•жӘўжҹҘдёҰиЈңйҪҠгҖҢжңҖиҝ‘ 4 йҖұгҖҚиЈЎзјәе°‘зҡ„жҜҸдёҖйҖұвҖ”вҖ”
    // йҖҷжЁЈдёҚз”ЁжүӢеӢ•й–ӢгҖҢйҖЈжҺҘ Meta APIгҖҚйҒёгҖҢеӣһжәҜжҠ“еҸ–гҖҚ,е№іеёёиҮӘеӢ•еҗҢжӯҘе°ұжңғиҮӘеӢ•е№«дҪ жҠҠжңҖиҝ‘е№ҫйҖұиЈңйҪҠгҖӮ
    // жҜҸеҖӢе“ҒзүҢзҡ„е»Је‘ҠеёіиҷҹжҷӮеҚҖеҸҜиғҪдёҚдёҖжЁЈ,жүҖд»ҘжҜҸдёҖйҖұзҡ„ж—ҘжңҹзҜ„еңҚйғҪеҲҶеҲҘдҫқеҗ„иҮӘеёіиҷҹзҡ„жҷӮеҚҖеҺ»з®—гҖӮ
    const AUTO_SYNC_WEEKS_BACK = 4;
    const needsWeek = [];
    for (const t of targets) {
      const tzOffset = await fetchAccountUtcOffset(token.trim(), t.apiId);
      for (let w = 1; w <= AUTO_SYNC_WEEKS_BACK; w++) {
        const weekRange = getLastWeekRange(tzOffset, w);
        if (!existingWeekKeys.has(weekKeyFor(t.storageId, weekRange.weekStart))) {
          needsWeek.push({ apiId: t.apiId, storageId: t.storageId, name: t.name, weekRange });
        }
      }
    }
    const needsMonth = targets.filter((t) => !existingMonthKeys.has(monthKeyFor(t.storageId, lastMonthKey)));
    if (!needsWeek.length && !needsMonth.length) return; // иіҮж–ҷйғҪжҳҜж–°зҡ„,дёҚз”ЁеҒҡд»»дҪ•дәӢ

    setAutoSyncStatus(`иҮӘеӢ•еҗҢжӯҘдёӯвҖҰ иЈңйҪҠжңҖиҝ‘ ${AUTO_SYNC_WEEKS_BACK} йҖұиҲҮ ${monthLabel(lastMonthKey)} иіҮж–ҷ`);
    let successCount = 0, errorCount = 0;

    for (let i = 0; i < needsWeek.length; i++) {
      const t = needsWeek[i];
      try {
        const record = await fetchInsightsForRange(token.trim(), t.apiId, t.weekRange.since, t.weekRange.until, true);
        await storage.set(weekKeyFor(t.storageId, t.weekRange.weekStart), JSON.stringify(record));
        successCount++;
      } catch { errorCount++; }
      if (i < needsWeek.length - 1 || needsMonth.length) await new Promise((r) => setTimeout(r, 4000));
    }
    for (let i = 0; i < needsMonth.length; i++) {
      const t = needsMonth[i];
      try {
        const record = await fetchOneBrandMonth(token.trim(), t.apiId, lastMonthKey);
        await storage.set(monthKeyFor(t.storageId, lastMonthKey), JSON.stringify(record));
        successCount++;
      } catch { errorCount++; }
      if (i < needsMonth.length - 1) await new Promise((r) => setTimeout(r, 4000));
    }

    setAutoSyncStatus(null);
    await loadAll(activeBrandId);
    await loadAllWeeks(activeBrandId);
    if (successCount > 0) {
      setApiNotice(`е·ІиҮӘеӢ•еҗҢжӯҘе®ҢжҲҗ:жҲҗеҠҹжӣҙж–° ${successCount} зӯҶиіҮж–ҷ${errorCount > 0 ? `,${errorCount} зӯҶеӨұж•—(еҸҜиғҪжҳҜй »зҺҮйҷҗеҲ¶,д№ӢеҫҢеҶҚжүӢеӢ•жҠ“дёҖж¬ЎеҚіеҸҜ)` : ""}гҖӮ`);
    } else if (errorCount > 0) {
      setApiError("иҮӘеӢ•еҗҢжӯҘеӨұж•—,и«ӢжүӢеӢ•йҖЈжҺҘ Meta API йҮҚж–°жҠ“еҸ–дёҖж¬ЎгҖӮ");
    }
  }

  // жүӢеӢ•и§ёзҷјеҗҢжӯҘ(дҫӢеҰӮйқўжқҝиЈЎзҡ„гҖҢз«ӢеҚіеҗҢжӯҘгҖҚжҢүйҲ•),з”Ёзӣ®еүҚз•«йқўдёҠзҡ„ж¬Ҡжқ–и·ҹе“ҒзүҢжё…е–®
  function runAutoSync() {
    return runAutoSyncWith(apiToken, brands, apiAccountId);
  }

  const sortedKeys = useMemo(() => Object.keys(months).sort(), [months]);
  const enriched = useMemo(() => { const out = {}; for (const mk of sortedKeys) out[mk] = deriveMetrics(months[mk]); return out; }, [months, sortedKeys]);
  const chartData = useMemo(() => sortedKeys.map((mk) => ({
    month: monthLabel(mk), е»Је‘ҠиІ»: Math.round(enriched[mk].spend), иҪүе–®: enriched[mk].conversions,
    CPA: enriched[mk].cpa !== null ? Number(enriched[mk].cpa.toFixed(1)) : null,
    ROAS: enriched[mk].roas !== null ? Number(enriched[mk].roas.toFixed(2)) : null,
  })), [sortedKeys, enriched]);
  const currency = sortedKeys.length ? months[sortedKeys[sortedKeys.length - 1]].currency : "TWD";
  const focusIdx = sortedKeys.indexOf(focusMonth);
  const focusData = focusMonth ? enriched[focusMonth] : null;
  const prevData = focusIdx > 0 ? enriched[sortedKeys[focusIdx - 1]] : null;
  const MIN_AD_SPEND = 500;
  const spendFilteredAds = focusData && focusData.ads ? focusData.ads.filter((ad) => ad.spend >= MIN_AD_SPEND) : [];
  const visibleAds = filterAdsByStatus(spendFilteredAds, adStatusFilter);
  const hiddenAdCount = focusData && focusData.ads ? focusData.ads.length - spendFilteredAds.length : 0;

  // ---------- жҜҸж—ҘзҮҹж”¶е ұиЎЁ:зӣҙжҺҘе‘ҲзҸҫеҫҢеҸ°жҜҸж—Ҙж”¶зӣҠиЎЁ(ledgerByMonth)иЈЎгҖҢжҜҸдёҖеӨ© x жҜҸеҖӢз”ўе“Ғд»ЈиҷҹгҖҚзҡ„жҳҺзҙ°,дёҚз”ЁеҸҰеӨ–еҪҷзёҪ ----------
  // йҒёе–®жңҲд»Ҫ/йҒёе–®ж—Ҙ,е„Әе…Ҳй ҶеәҸжҳҜ:в‘ дҪҝз”ЁиҖ…иҮӘе·ұжүӢеӢ•й»һйҒҺзҡ„(dailyMonth/focusDay,еҸӘиҰҒйӮЈзӯҶиіҮж–ҷйӮ„еңЁе°ұжІҝз”Ё,е°ҠйҮҚжүӢеӢ•е°ҺиҰҪ)
  // в‘Ўд»ҠеӨ©еҜҰйҡӣзҡ„жңҲд»Ҫ/ж—Ҙжңҹ(еҰӮжһңйӮЈеҖӢжңҲ/йӮЈдёҖеӨ©еүӣеҘҪжңүиіҮж–ҷзҡ„и©ұ)в‘ўйғҪжІ’жңүзҡ„и©ұ,йҖҖеӣһиіҮж–ҷиЈЎжңҖеҫҢдёҖзӯҶ(дҫӢеҰӮи©Ұз®—иЎЁеҸӘеҢҜеҲ°жҹҗеҖӢйҒҺеҺ»зҡ„жңҲд»Ҫ)гҖӮ
  const ledgerMonthKeys = useMemo(() => Object.keys(ledgerByMonth).sort(), [ledgerByMonth]);
  const todayParts = useMemo(() => {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const d = String(now.getDate()).padStart(2, "0");
    return { monthKey: `${y}-${m}`, dateKey: `${y}-${m}-${d}` };
  }, []);
  const activeDailyMonth = (dailyMonth && ledgerByMonth[dailyMonth])
    ? dailyMonth
    : ledgerByMonth[todayParts.monthKey]
    ? todayParts.monthKey
    : (ledgerMonthKeys.length ? ledgerMonthKeys[ledgerMonthKeys.length - 1] : null);
  const dailyMonthRecord = activeDailyMonth ? ledgerByMonth[activeDailyMonth] : null;
  const sortedDailyDays = useMemo(
    () => (dailyMonthRecord ? dailyMonthRecord.days.slice().sort((a, b) => (a.date < b.date ? -1 : 1)) : []),
    [dailyMonthRecord]
  );
  const activeFocusDay = (focusDay && sortedDailyDays.some((d) => d.date === focusDay))
    ? focusDay
    : sortedDailyDays.some((d) => d.date === todayParts.dateKey)
    ? todayParts.dateKey
    : (sortedDailyDays.length ? sortedDailyDays[sortedDailyDays.length - 1].date : null);
  const focusDayRecord = activeFocusDay ? sortedDailyDays.find((d) => d.date === activeFocusDay) : null;
  const dailyMatrixCodes = dailyMonthRecord ? dailyMonthRecord.productCodes : [];
  // threshold жңүзөҰдё”и¶…йҒҺжҷӮ,еӣһеӮіжЁҷзҙ…гҖҒеҠ й©ҡеҳҶиҷҹзҡ„жЁЈејҸ;жІ’зөҰ threshold жҲ–жІ’и¶…йҒҺ,е°ұжҳҜеҺҹжң¬зҡ„жЁЈејҸгҖӮ
  const adPct = (spend, revenue, threshold) => {
    if (revenue <= 0) return "вҖ”";
    const pct = (spend / revenue) * 100;
    const isHigh = threshold != null && pct > threshold;
    return (
      <span style={isHigh ? { color: "var(--red)", fontWeight: 700 } : undefined}>
        {pct.toFixed(0)}%{isHigh ? " вҡ " : ""}
      </span>
    );
  };
  // ж·ЁеҲ©жҪӨжҳҜиІ зҡ„(иҷ§йҢў)жҷӮ,з”ЁжҜ”е»Је‘ҠиІ»дҪ”жҜ”и¶…жЁҷжӣҙйҮҚзҡ„жЁҷзҙ…жЁЈејҸ(ж·ұзҙ…еә•иүІ+зІ—й«”),е…©зЁ®иӯҰзӨәзЁӢеәҰеҒҡеҮәеҚҖеҲҘгҖӮ
  const netProfitCell = (value) => {
    if (value < 0) {
      return (
        <span style={{ color: "#8B1E2B", fontWeight: 700, background: "#FBE4E4", padding: "1px 6px", borderRadius: 4 }}>
          {fmtMoney(value)}
        </span>
      );
    }
    return fmtMoney(value);
  };
  // еҹәзӨҺеҲҶжһҗз”Ё:з•¶жңҲжҜҸдёҖеӨ©зҡ„е»Је‘ҠиІ»дҪ”жҜ”,жҠ“еҮәдҪ”жҜ”жңҖй«ҳзҡ„дёҖеӨ©,д»ҘеҸҠ(еҰӮжһңжңүиЁӯе®ҡй–ҖжӘ»)и¶…йҒҺй–ҖжӘ»зҡ„еӨ©ж•ёжё…е–®гҖӮ
  const dailyRatioStats = useMemo(() => {
    let highestDay = null;
    const overThresholdDays = [];
    const threshold = adRatioThresholds[activeBrandId];
    sortedDailyDays.forEach((d) => {
      if (d.overall.revenue > 0) {
        const pct = (d.overall.adSpend / d.overall.revenue) * 100;
        if (!highestDay || pct > highestDay.pct) highestDay = { date: d.date, pct };
        if (threshold != null && pct > threshold) overThresholdDays.push({ date: d.date, pct });
      }
    });
    return { highestDay, overThresholdDays };
  }, [sortedDailyDays, adRatioThresholds, activeBrandId]);

  // ---------- жҘӯй…Қе»Је‘Ҡй•·з·ҡеҲҶжһҗ:жҠҠеҗҚзЁұжҲ–иЎҢйҠ·жҙ»еӢ•иЈЎеҗ«гҖҢжҘӯй…ҚгҖҚе…©еҖӢеӯ—зҡ„е»Је‘Ҡе–®зҚЁжӢүеҮәдҫҶ,дҫқжңҲд»ҪзҙҜиЁҲи¶ЁеӢў ----------
  const SPONSOR_KEYWORD = "жҘӯй…Қ";
  const sponsorMonthlyStats = useMemo(() => sortedKeys.map((mk) => {
    const rec = months[mk];
    const sponsorAds = (rec.ads || []).filter(
      (ad) => (ad.name && ad.name.includes(SPONSOR_KEYWORD)) || (ad.campaign && ad.campaign.includes(SPONSOR_KEYWORD))
    );
    const spend = sponsorAds.reduce((s, a) => s + a.spend, 0);
    const conversions = sponsorAds.reduce((s, a) => s + a.conversions, 0);
    const revenue = sponsorAds.reduce((s, a) => s + a.revenue, 0);
    return {
      monthKey: mk, month: monthLabel(mk), ads: sponsorAds, spend, conversions, revenue,
      cpa: conversions > 0 ? spend / conversions : null,
      roas: spend > 0 && revenue > 0 ? revenue / spend : null,
    };
  }), [sortedKeys, months]);
  const sponsorChartData = useMemo(() => sponsorMonthlyStats.map((s) => ({
    month: s.month, е»Је‘ҠиІ»: Math.round(s.spend), иҪүе–®: s.conversions,
    CPA: s.cpa !== null ? Number(s.cpa.toFixed(1)) : null,
    ROAS: s.roas !== null ? Number(s.roas.toFixed(2)) : null,

  const sponsorTotal = useMemo(() => {
    const spend = sponsorMonthlyStats.reduce((s, m) => s + m.spend, 0);
    const conversions = sponsorMonthlyStats.reduce((s, m) => s + m.conversions, 0);
    const revenue = sponsorMonthlyStats.reduce((s, m) => s + m.revenue, 0);
    return { spend, conversions, revenue, cpa: conversions > 0 ? spend / conversions : null, roas: spend > 0 && revenue > 0 ? revenue / spend : null };
  }, [sponsorMonthlyStats]);
  const sponsorMonthsWithData = sponsorMonthlyStats.filter((m) => m.ads.length > 0);

  const sortedWeekKeys = useMemo(() => Object.keys(weeksData).sort(), [weeksData]);
  const focusWeekData = focusWeek ? weeksData[focusWeek] : null;
  const focusWeekIdx = sortedWeekKeys.indexOf(focusWeek);
  const prevWeekData = focusWeekIdx > 0 ? weeksData[sortedWeekKeys[focusWeekIdx - 1]] : null;
  function weekLabel(weekStart) {
    if (!weekStart) return "";
    const [y, m, d] = weekStart.split("-").map(Number);
    const start = new Date(y, m - 1, d);
    const end = new Date(y, m - 1, d + 6);
    const fmt2 = (dt) => `${String(dt.getMonth() + 1).padStart(2, "0")}/${String(dt.getDate()).padStart(2, "0")}`;
    return `${fmt2(start)}~${fmt2(end)}`;
  }

  const sortedVisibleAds = useMemo(() => {
    const withMetrics = visibleAds.map((ad) => ({
      ad,
      cpa: ad.conversions > 0 ? ad.spend / ad.conversions : null,
      roas: ad.spend > 0 && ad.revenue > 0 ? ad.revenue / ad.spend : null,
    }));
    if (adSortMode === "cpa") {
      return withMetrics
        .slice()
        .sort((a, b) => {
          if (a.cpa === null) return 1;
          if (b.cpa === null) return -1;
          return a.cpa - b.cpa;
        })
        .map((x) => x.ad);
    }
    if (adSortMode === "roas") {
      return withMetrics
        .slice()
        .sort((a, b) => {
          if (a.roas === null) return 1;
          if (b.roas === null) return -1;
          return b.roas - a.roas;
        })
        .map((x) => x.ad);
    }
    if (adSortMode === "composite") {
      // rank-based composite: best CPA (lowest) and best ROAS (highest) each contribute a rank;
      // lower combined rank = better overall performance. Ads missing a metric get the worst rank.
      const n = withMetrics.length;
      const byCpa = withMetrics
        .map((x, i) => i)
        .sort((i, j) => {
          const a = withMetrics[i].cpa, b = withMetrics[j].cpa;
          if (a === null) return 1;
          if (b === null) return -1;
          return a - b;
        });
      const byRoas = withMetrics
        .map((x, i) => i)
        .sort((i, j) => {
          const a = withMetrics[i].roas, b = withMetrics[j].roas;
          if (a === null) return 1;
          if (b === null) return -1;
          return b - a;
        });
      const cpaRank = new Array(n), roasRank = new Array(n);
      byCpa.forEach((idx, rank) => { cpaRank[idx] = rank; });
      byRoas.forEach((idx, rank) => { roasRank[idx] = rank; });
      return withMetrics
        .map((x, i) => ({ ad: x.ad, score: cpaRank[i] + roasRank[i] }))
        .sort((a, b) => a.score - b.score)
        .map((x) => x.ad);
    }
    // default: by spend, high to low
    return withMetrics.map((x) => x.ad).sort((a, b) => b.spend - a.spend);
  }, [visibleAds, adSortMode]);

  // ---------- еҜҶзўјй–ҳ:йӮ„жІ’й©—иӯүйҖҡйҒҺе°ұдёҚйЎҜзӨәд»»дҪ•е ұиЎЁе…§е®№ ----------
  if (isUnlocked === null) {

  }

          <input

  }

            </div>
            <p style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 6, lineHeight: 1.5 }}>
              зӣ®еүҚзӢҖж…Ӣ:
              {cloudStatus === "connected" && ` вҳҒпёҸ е·ІйҖЈдёҠе…ұз”ЁиіҮж–ҷеә«${credentialName ? `(иә«д»Ҫ:${credentialName})` : ""}`}
              {cloudStatus === "unauthorized" && " вҡ пёҸ жңүйҖЈдёҠ,дҪҶеҜҶзўјдёҚе°Қ"}
              {cloudStatus === "unavailable" && " вҡ пёҸ йҖЈдёҚеҲ° /api/kv,и«ӢзўәиӘҚ Cloudflare Functions е·Із¶“и·ҹйҖҷеҖӢз¶Із«ҷдёҖиө·йғЁзҪІ"}
              {cloudStatus === "unknown" && " е°ҡжңӘжё¬и©Ұ"}
            </p>
            <div className="mal-modal-actions">
              <button className="mal-btn" onClick={() => setShowTeamKeyModal(false)}>й—ңй–ү</button>
              <button className="mal-btn mal-btn-primary" onClick={saveTeamKey}>е„ІеӯҳдёҰжё¬и©ҰйҖЈз·ҡ</button>
            </div>
          </div>
        </div>
      )}

      {showLedgerModal && (
        <div className="mal-modal-overlay">
          <div className="mal-modal">
            <h3>еҢҜе…ҘеҫҢеҸ°жҜҸж—Ҙж”¶зӣҠиЎЁ</h3>
            <p className="mal-modal-sub">
              дёҠеӮігҖҢжҜҸж—Ҙж”¶зӣҠиЎЁгҖҚ.xlsx жӘ”(и·ҹзҜ„дҫӢиЎЁе–®дёҖиҮҙ:еҲҶй ҒжҳҜгҖҢ1жңҲгҖҚ~гҖҢ12жңҲгҖҚ,ж¬„дҪҚдҫқз”ўе“Ғд»ЈиҷҹжӢҶеҲҶ)гҖӮ
              зі»зөұжңғиҮӘеӢ•жҠ“еҮәжҜҸеҖӢеҲҶй Ғе°ҚжҮүзҡ„жңҲд»Ҫ,еӯҳжҲҗи©Іе“ҒзүҢзҡ„еҫҢеҸ°еҜҰйҡӣжҘӯзёҫ,йҖұе ұиЎЁ/жңҲе ұиЎЁжңғиҮӘеӢ•жҜ”е°Қ Meta еӣһе ұзҡ„иҗҪе·®гҖӮ
              йҮҚж–°еҢҜе…ҘеҗҢдёҖеҖӢжңҲд»ҪжңғзӣҙжҺҘиҰҶи“Ӣжӣҙж–°гҖӮ
            </p>
            <div className="mal-field">
              <label>йҖҷд»ҪжӘ”жЎҲзҡ„е№ҙеәҰ <span className="mal-req">*</span></label>
              <input
                type="number"
                value={ledgerYear}
                onChange={(e) => setLedgerYear(e.target.value)}
                style={{ width: "100%", padding: "8px 10px", border: "1px solid var(--rule)", borderRadius: "10px", fontFamily: "IBM Plex Mono, monospace", fontSize: "13px" }}
              />
              <p style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 6, lineHeight: 1.5 }}>
                иЎЁе–®иЈЎзҡ„еҲҶй ҒеҸӘжңүгҖҢжңҲгҖҚжІ’жңүгҖҢе№ҙгҖҚ,жүҖд»ҘйңҖиҰҒеҸҰеӨ–жҢҮе®ҡе№ҙеәҰ,жүҚиғҪжӯЈзўәеӯҳжҲҗдҫӢеҰӮ 2026-07 йҖҷжЁЈзҡ„жңҲд»ҪгҖӮ
              </p>
            </div>
            <div className="mal-field">
              <label>йҒёж“ҮжӘ”жЎҲ <span className="mal-req">*</span></label>
              <input
                type="file"
                accept=".xlsx"
                onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) importLedgerFile(f); }}
                style={{ width: "100%" }}
              />
            </div>
            <div style={{ borderTop: "1px dashed var(--rule)", margin: "16px 0 14px" }} />
            <div className="mal-field">
              <label>жҲ–иҖ…:зӣҙжҺҘеҫһ Google и©Ұз®—иЎЁеҗҢжӯҘ(дёҚз”ЁжүӢеӢ•дёӢијү/дёҠеӮі)</label>
              <input
                type="text"
                value={sheetIdInput}
                onChange={(e) => setSheetIdInput(e.target.value)}
                placeholder="Google и©Ұз®—иЎЁ ID(з¶ІеқҖ .../spreadsheets/d/ еҫҢйқўйӮЈдёҖдёІ)"
                style={{ width: "100%", padding: "8px 10px", border: "1px solid var(--rule)", borderRadius: "10px", fontFamily: "IBM Plex Mono, monospace", fontSize: "13px", marginBottom: 8 }}
              />
              <p style={{ fontSize: 11.5, color: "var(--ink-soft)", lineHeight: 1.5, marginBottom: 8 }}>
                и©Ұз®—иЎЁдёҚз”Ёе…¬й–Ӣ,еҸӘиҰҒеҲҶдә«зөҰжңҚеӢҷеёіиҷҹзҡ„ email(жӘўиҰ–иҖ…ж¬ҠйҷҗеҚіеҸҜ)гҖӮ
                жңғеҗҢжӯҘеҲ°зӣ®еүҚйҒёеҸ–зҡ„е“ҒзүҢ(е»Је‘Ҡеёіиҷҹ ID:{activeBrandId || "е°ҡжңӘйҒёж“Ү"}),дёӢж¬Ўжү“й–ӢжңғиҮӘеӢ•иЁҳдҪҸйҖҷеҖӢе“ҒзүҢе°ҚжҮүзҡ„и©Ұз®—иЎЁ ID(з•ҷз©әзӣҙжҺҘжҢүеҗҢжӯҘ,жңғжІҝз”ЁдёҠж¬ЎиЁҳдҪҸзҡ„йӮЈд»Ҫ)гҖӮ
              </p>
              <button className="mal-btn mal-btn-primary" disabled={sheetSyncLoading} onClick={syncFromGoogleSheet}>
                {sheetSyncLoading ? "еҗҢжӯҘдёӯвҖҰ" : "вҳҒпёҸ еҫһ Google и©Ұз®—иЎЁеҗҢжӯҘ"}
              </button>
            </div>
            {ledgerImportError && <div className="mal-error">вҡ  {ledgerImportError}</div>}
            {ledgerImportNotice && <div className="mal-notice">вң“ {ledgerImportNotice}</div>}
            <div className="mal-modal-actions">
              <button className="mal-btn" disabled={ledgerImportLoading} onClick={() => setShowLedgerModal(false)}>
                {ledgerImportLoading ? "еҢҜе…ҘдёӯвҖҰ" : "й—ңй–ү"}
              </button>
            </div>
          </div>
        </div>
      )}

      {confirmReset && (
        <div className="mal-modal-overlay">
          <div className="mal-modal mal-modal-small">
            <h3>йҮҚзҪ®гҖҢ{activeBrandId ? (brands.find((b) => b.id === activeBrandId) || {}).name || activeBrandId : "жӯӨеёіжң¬"}гҖҚ?</h3>
            <p className="mal-modal-sub">йҖҷжңғеҲӘйҷӨзӣ®еүҚйҖҷеҖӢе“ҒзүҢеә•дёӢжүҖжңүе·Іе„Іеӯҳзҡ„жңҲд»ҪиіҮж–ҷ,з„Ўжі•еҫ©еҺҹгҖӮе…¶д»–е“ҒзүҢзҡ„иіҮж–ҷдёҚеҸ—еҪұйҹҝгҖӮ</p>
            <div className="mal-modal-actions">
              <button className="mal-btn" onClick={() => setConfirmReset(false)}>еҸ–ж¶Ҳ</button>
              <button className="mal-btn mal-btn-danger" onClick={resetAll}>зўәиӘҚйҮҚзҪ®</button>
            </div>
          </div>
        </div>
      )}

      {confirmDelete && (
        <div className="mal-modal-overlay">
          <div className="mal-modal mal-modal-small">
            <h3>еҲӘйҷӨ {monthLabel(confirmDelete)} зҡ„иіҮж–ҷ?</h3>
            <p className="mal-modal-sub">еҲӘйҷӨеҫҢеҸҜйҮҚж–°дёҠеӮіи©ІжңҲе ұиЎЁиЈңеӣһгҖӮ</p>
            <div className="mal-modal-actions">
              <button className="mal-btn" onClick={() => setConfirmDelete(null)}>еҸ–ж¶Ҳ</button>
              <button className="mal-btn mal-btn-danger" onClick={() => deleteMonth(confirmDelete)}>зўәиӘҚеҲӘйҷӨ</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MetaAdsLedger />);
</script>
