<html lang="zh-Hant">
<head>

<title>H&JжҘӯзёҫзёҪиЎЁ</title>

<style>
  :root {
    --paper: #FAF7F2;
    --paper-raised: #FFFFFF;
    --ink: #3C3733;
    --ink-soft: #9C9186;
    --rule: #EAE2D6;
    --blue: #6E8577;
    --green: #7C8B54;
    --red: #A8607A;
    --amber: #BFA054;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Noto Sans TC', sans-serif; background: var(--paper); color: var(--ink);
    padding: 32px 20px 64px;
  }
  .mal-shell { max-width: 920px; margin: 0 auto; }
  .mal-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; border-bottom: 1px solid var(--rule); padding-bottom: 20px; margin-bottom: 28px; flex-wrap: wrap; }
  .mal-title-block { display: flex; align-items: center; gap: 14px; }
  .mal-stamp {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; font-size: 18px;
    display: flex; align-items: center; justify-content: center; color: #fff;
    background: linear-gradient(135deg, var(--blue), var(--red));
    box-shadow: 0 4px 14px rgba(110, 133, 119, 0.28);
  }
  .mal-title { font-family: 'Noto Serif KR', serif; font-weight: 600; font-size: 26px; margin: 0; letter-spacing: 0.02em; }
  .mal-subtitle { font-size: 12.5px; color: var(--ink-soft); margin: 3px 0 0; letter-spacing: 0.01em; }
  .mal-btn {
    font-family: 'Noto Sans TC', sans-serif; font-weight: 600; font-size: 13px; border-radius: 10px; padding: 9px 16px;

    background: var(--paper-raised); color: var(--ink); transition: all 0.15s ease; box-shadow: 0 1px 2px rgba(60,55,51,0.04);
  }
  .mal-btn:hover { background: #FBF9F5; border-color: var(--ink-soft); box-shadow: 0 3px 10px rgba(60,55,51,0.08); }
  .mal-btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .mal-btn-primary:hover { background: #607A6C; border-color: #607A6C; box-shadow: 0 4px 14px rgba(110,133,119,0.28); }
  .mal-btn-danger { background: transparent; border-color: var(--red); color: var(--red); }
  .mal-btn-danger:hover { background: #F3E4E9; box-shadow: none; }
  .mal-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  .mal-notice { background: #EEF1E4; border: 1px solid #D8E0C8; color: #5C6B41; font-size: 13px; padding: 10px 16px; border-radius: 10px; margin-bottom: 16px; }
  .mal-error { background: #F3E4E9; border: 1px solid #E3C3D0; color: #8B4A63; font-size: 13px; padding: 10px 16px; border-radius: 10px; margin-bottom: 16px; }
  .mal-empty { border: 1.5px dashed var(--rule); border-radius: 16px; padding: 56px 24px; text-align: center; background: var(--paper-raised); }
  .mal-empty p { color: var(--ink-soft); font-size: 14px; max-width: 440px; margin: 10px auto 20px; line-height: 1.6; }
  .mal-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 20px; }
  .mal-brand-switch { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .mal-brand-switch-label { font-size: 12.5px; color: var(--ink-soft); font-weight: 600; }
  .mal-brand-chip {
    font-size: 12.5px; padding: 6px 14px; border-radius: 999px; border: 1px solid var(--rule);
    background: var(--paper-raised); color: var(--ink-soft); cursor: pointer; white-space: nowrap; transition: all 0.15s ease;
  }
  .mal-brand-chip:hover { border-color: var(--blue); color: var(--ink); }
  .mal-brand-chip-active { border-color: var(--blue); color: var(--blue); background: #F1F4EF; font-weight: 600; }
  .mal-viewmode-switch { display: flex; gap: 6px; margin-bottom: 18px; background: #F2EEE6; padding: 5px; border-radius: 14px; width: fit-content; }
  .mal-viewmode-btn {
    font-family: 'Noto Serif KR', serif; font-weight: 500; font-size: 13.5px; padding: 8px 18px;
    border: none; border-radius: 10px; background: transparent; color: var(--ink-soft); cursor: pointer; transition: all 0.15s ease;
  }
  .mal-viewmode-btn-active { color: #fff; background: var(--blue); box-shadow: 0 2px 8px rgba(110,133,119,0.3); }
  .mal-week-box { background: var(--paper-raised); border: 1px solid var(--rule); border-radius: 16px; padding: 20px 22px 8px; margin-bottom: 28px; box-shadow: 0 2px 10px rgba(60,55,51,0.04); }
  .mal-week-title { margin-top: 0; border-bottom: 1px solid var(--rule); }
  .mal-week-analysis { margin: 14px 0 16px; }

  .mal-week-analysis ul { margin: 0; padding-left: 20px; }
  .mal-week-analysis li { font-size: 13px; line-height: 1.7; color: var(--ink); margin-bottom: 4px; }
  .mal-tab { font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; padding: 7px 16px; border: 1px solid var(--rule); border-radius: 999px; background: var(--paper-raised); color: var(--ink-soft); cursor: pointer; white-space: nowrap; transition: all 0.15s ease; }
  .mal-tab-active { border-color: var(--blue); color: #fff; background: var(--blue); }
  .mal-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 26px; }
  .mal-card { background: var(--paper-raised); border: 1px solid var(--rule); border-radius: 16px; padding: 18px 20px; box-shadow: 0 2px 10px rgba(60,55,51,0.04); }
  .mal-card-label { font-size: 11.5px; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .mal-card-value { font-family: 'IBM Plex Mono', monospace; font-size: 23px; font-weight: 600; margin: 8px 0 9px; }
  .mal-perf-card { display: block; width: 100%; text-align: left; font-family: inherit; cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .mal-perf-card:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(60,55,51,0.09); }
  .mal-perf-card:disabled { cursor: default; opacity: 0.5; }
  .mal-perf-card-label { font-size: 15.5px; font-weight: 700; text-transform: none; letter-spacing: 0.01em; display: flex; align-items: center; gap: 6px; }
  .mal-perf-card-hint { font-size: 11px; color: var(--ink-soft); font-weight: 400; margin-top: 6px; }
  .mal-perf-section { scroll-margin-top: 16px; border: 1px solid var(--rule); border-radius: 14px; margin-bottom: 16px; overflow: hidden; }
  .mal-perf-section-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; cursor: pointer; background: var(--paper-raised); border: none; width: 100%; text-align: left; font-family: inherit; }
  .mal-perf-section-title { font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 17px; display: flex; align-items: center; gap: 8px; }
  .mal-perf-section-chevron { font-size: 13px; transition: transform 0.15s ease; color: var(--ink-soft); }
  .mal-perf-section-body { padding: 4px 18px 18px; }
  .mal-delta { display: inline-flex; align-items: center; gap: 3px; font-size: 12px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
  .mal-delta-good { color: var(--green); }
  .mal-delta-bad { color: var(--red); }
  .mal-delta-flat { color: var(--ink-soft); }
  .mal-section-title { font-family: 'Noto Serif KR', serif; font-weight: 600; font-size: 16px; margin: 32px 0 14px; padding-left: 12px; border-left: 3px solid var(--blue); border-bottom: none; line-height: 1.4; }
  .mal-section-count { font-family: 'Noto Sans TC', sans-serif; font-weight: 400; font-size: 12px; color: var(--ink-soft); margin-left: 8px; }
  .mal-ad-header-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-top: 30px; }
  .mal-ad-header-row .mal-section-title-flex { margin: 0; border-bottom: none; padding-bottom: 0; flex: 1; }
  .mal-ad-header-row { border-bottom: none; padding-bottom: 6px; margin-bottom: 12px; }
  .mal-ad-sort-select { padding: 7px 12px; border: 1px solid var(--rule); border-radius: 999px; background: var(--paper-raised); color: var(--ink); font-family: 'Noto Sans TC', sans-serif; font-size: 12.5px; }
  .mal-chart-box { background: var(--paper-raised); border: 1px solid var(--rule); border-radius: 16px; padding: 20px 18px; margin-bottom: 22px; box-shadow: 0 2px 10px rgba(60,55,51,0.04); }
  .mal-chart-legend { display: flex; gap: 16px; font-size: 12px; color: var(--ink-soft); margin-bottom: 10px; }
  .mal-chart-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .mal-chart-dot { width: 9px; height: 9px; border-radius: 3px; display: inline-block; }
  .mal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .mal-table th { text-align: right; font-weight: 600; color: var(--ink-soft); font-size: 11.5px; text-transform: uppercase; padding: 8px 10px; border-bottom: 2px solid var(--ink); }
  .mal-table th:first-child, .mal-table td:first-child { text-align: left; }
  .mal-table td { text-align: right; padding: 9px 10px; border-bottom: 1px solid var(--rule); font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; }
  .mal-table tr:hover td { background: #F7F2EA; }
  .mal-row-month { font-family: 'Noto Sans TC', sans-serif; font-weight: 600; }
  .mal-ledger-table th, .mal-ledger-table td { border-right: 1px solid var(--rule); }
  .mal-ledger-table th:last-child, .mal-ledger-table td:last-child { border-right: none; }
  .mal-ledger-group-backend { background: #EEF1E4; }
  .mal-ledger-group-meta { background: #F7EFE0; }
  .mal-ledger-group-gap { background: var(--paper-raised); }
  .mal-ledger-group-label-backend { color: #5C6B41; }
  .mal-ledger-group-label-meta { color: #8A6A2E; }
  /* иЎЁж јијғеҜ¬йңҖиҰҒе·ҰеҸіж»‘еӢ•жҷӮ,з¬¬дёҖж¬„(з”ўе“Ғд»Јиҷҹ/ж—Ҙжңҹ)еҮҚзөҗдёҚи·ҹи‘—жҚІеӢ•,ж»‘еҲ°еӨҡеҸійӮҠйғҪзңӢеҫ—еҲ°зҸҫеңЁжҳҜе“ӘдёҖеҲ—гҖӮ */
  .mal-ledger-table th:first-child, .mal-ledger-table td:first-child {
    position: sticky; left: 0; z-index: 1; background: var(--paper);
  }
  .mal-ledger-table thead th:first-child { z-index: 2; }
  .mal-ledger-table tr:hover td:first-child { background: #F7F2EA; }
  .mal-icon-btn { background: none; border: none; cursor: pointer; color: var(--ink-soft); padding: 4px; font-size: 14px; }
  .mal-icon-btn:hover { color: var(--red); }
  .mal-ad-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .mal-ad-row { display: flex; align-items: center; gap: 14px; background: var(--paper-raised); border: 1px solid var(--rule); border-radius: 14px; padding: 12px 16px; transition: box-shadow 0.15s ease; }
  .mal-ad-row:hover { box-shadow: 0 3px 12px rgba(60,55,51,0.06); }
  .mal-thumb { width: 52px; height: 52px; object-fit: cover; border-radius: 10px; border: 1px solid var(--rule); flex-shrink: 0; background: #fff; }
  .mal-thumb-fallback { display: flex; align-items: center; justify-content: center; color: var(--ink-soft); background: #EDE7DC; font-size: 18px; }
  .mal-ad-info { flex: 1; min-width: 0; }
  .mal-ad-name { font-weight: 600; font-size: 13.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mal-ad-utm { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--blue); display: flex; align-items: center; gap: 4px; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mal-ad-utm-empty { color: var(--ink-soft); font-style: italic; }
  .mal-ad-fblink { font-family: 'Noto Sans TC', sans-serif; font-size: 11px; color: var(--blue); text-decoration: none; margin-top: 3px; display: inline-flex; align-items: center; gap: 3px; }
  .mal-ad-fblink:hover { text-decoration: underline; }
  .mal-status-badge { font-family: 'Noto Sans TC', sans-serif; font-size: 10.5px; font-weight: 600; margin-left: 8px; padding: 2px 9px; border-radius: 999px; white-space: nowrap; }
  .mal-status-on { color: #5C6B41; background: #EEF1E4; }
  .mal-status-off { color: var(--ink-soft); background: #EDE7DC; }
  .mal-ad-row-inactive { opacity: 0.68; }
  .mal-ad-startdate { font-family: 'Noto Sans TC', sans-serif; font-size: 11px; color: var(--ink-soft); margin-top: 3px; display: block; }
  .mal-status-filter { display: flex; gap: 6px; margin-bottom: 16px; }
  .mal-status-filter-btn {
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px; font-weight: 600; padding: 7px 15px;
    border-radius: 999px; border: 1px solid var(--rule); background: var(--paper-raised);
    color: var(--ink-soft); cursor: pointer; transition: all 0.15s ease;
  }
  .mal-status-filter-btn-active { border-color: var(--blue); color: #fff; background: var(--blue); }
  .mal-ad-count { color: var(--ink-soft); font-style: italic; margin-left: 4px; }
  .mal-ad-stats { display: flex; gap: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; flex-shrink: 0; }
  .mal-ad-stats div { display: flex; flex-direction: column; align-items: flex-end; }
  .mal-ad-stats span { font-family: 'Noto Sans TC', sans-serif; font-size: 10px; color: var(--ink-soft); text-transform: uppercase; }
  .mal-toggle-ads { margin-bottom: 24px; font-size: 12.5px; padding: 7px 14px; }
  .mal-modal-overlay { position: fixed; inset: 0; background: rgba(60,55,51,0.35); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; backdrop-filter: blur(2px); }
  .mal-modal { background: #fff; border-radius: 20px; max-width: 560px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 28px; box-shadow: 0 20px 60px rgba(60,55,51,0.2); }
  .mal-modal h3 { font-family: 'Noto Serif KR', serif; font-size: 19px; margin: 0 0 4px; }
  .mal-modal p.mal-modal-sub { color: var(--ink-soft); font-size: 13px; margin: 0 0 18px; }
  .mal-modal-small { max-width: 380px; }
  .mal-field { margin-bottom: 13px; }
  .mal-field label { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 5px; }
  .mal-field label .mal-req { color: var(--red); }
  .mal-field select { width: 100%; padding: 9px 12px; border: 1px solid var(--rule); border-radius: 10px; font-family: 'Noto Sans TC', sans-serif; font-size: 13px; background: var(--paper-raised); color: var(--ink); }
  .mal-modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .mal-field-group-label { font-size: 12px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; margin-bottom: 10px; }
  .mal-advanced-toggle { display: flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; color: var(--blue); font-size: 12.5px; font-weight: 600; padding: 8px 0; margin-top: 4px; }
  .mal-advanced-fields { border-top: 1px dashed var(--rule); margin-top: 8px; padding-top: 14px; }
  .mal-field-alt { background: #F3EEE5; border: 1px dashed var(--rule); border-radius: 10px; padding: 10px 12px; }
  .mal-field-alt label { color: var(--ink-soft); font-weight: 500; }
  .mal-preview-table { width: 100%; font-size: 11px; border-collapse: collapse; margin-bottom: 16px; max-height: 140px; overflow: auto; display: block; }
  .mal-preview-table thead, .mal-preview-table tbody { display: table; width: 100%; }
  .mal-gate-shell {
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .mal-gate-card {
    background: var(--paper-raised); border: 1px solid var(--rule); border-radius: 20px;
    padding: 40px 32px; max-width: 340px; width: 100%; text-align: center;
    box-shadow: 0 8px 30px rgba(60,55,51,0.08);
  }
  .mal-gate-icon { font-size: 34px; margin-bottom: 8px; }
  .mal-gate-title { font-family: 'Noto Serif KR', serif; font-weight: 600; font-size: 20px; margin: 4px 0 6px; }
  .mal-gate-sub { font-size: 13px; color: var(--ink-soft); margin: 0 0 20px; }
  .mal-gate-input {
    width: 100%; padding: 11px 14px; border: 1px solid var(--rule); border-radius: 10px;
    font-family: 'IBM Plex Mono', monospace; font-size: 14px; text-align: center; box-sizing: border-box;
  }
  .mal-gate-error { color: var(--red); font-size: 12.5px; margin: 10px 0 0; }
  .mal-gate-submit { width: 100%; margin-top: 16px; justify-content: center; }

  @media (max-width: 640px) {
    .mal-title { font-size: 22px; }
    .mal-cards { grid-template-columns: repeat(2, 1fr); }
    .mal-ad-row { flex-wrap: wrap; }
    .mal-ad-stats { width: 100%; justify-content: space-between; gap: 8px; }
    .mal-header-actions { flex-wrap: wrap; }
    .mal-header-actions button { font-size: 12px; padding: 7px 12px; flex: 1; min-width: 100px; }
  }

  @media print {
    body { background: #fff; padding: 0; }
    .mal-header-actions, .mal-print-btn, .mal-toggle-ads, .mal-icon-btn, .mal-tabs, .mal-brand-switch, .mal-viewmode-switch {
      display: none !important;
    }
    .mal-modal-overlay { display: none !important; }
    .mal-chart-box, .mal-card, .mal-ad-row {
      break-inside: avoid; box-shadow: none !important;
    }
    .mal-perf-card-hint, .mal-perf-section-chevron { display: none !important; }
    .mal-perf-card:hover { transform: none !important; }
    .mal-perf-section-header { cursor: default; }
    .mal-section-title { break-after: avoid; }
    a[href]::after { content: none !important; }
    .mal-shell { max-width: 100%; }
    .mal-ledger-table th:first-child, .mal-ledger-table td:first-child { position: static !important; }
  }

  body.mal-exporting .mal-header-actions,
  body.mal-exporting .mal-toggle-ads,
  body.mal-exporting .mal-icon-btn,
  body.mal-exporting .mal-tabs,
  body.mal-exporting .mal-brand-switch,
  body.mal-exporting .mal-viewmode-switch {
    display: none !important;
  }
  body.mal-exporting .mal-scroll-wrap {
    overflow: visible !important;
  }
  /* еҢҜеҮә PDF жҷӮ(html2canvas жҲӘең–),position: sticky еёёеёёжҲӘдёҚжә–,д№ҫи„ҶеҢҜеҮәжҷӮй—ңжҺүеҮҚзөҗж•ҲжһңгҖӮ */
  body.mal-exporting .mal-ledger-table th:first-child,
  body.mal-exporting .mal-ledger-table td:first-child {
    position: static !important;
  }
  body.mal-exporting .mal-perf-card-hint,
  body.mal-exporting .mal-perf-section-chevron {
    display: none !important;
  }
</style>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ---------- е…ұз”Ёе„Іеӯҳ(Claude Artifact зҡ„ window.storage):еңҳйҡҠиіҮж–ҷе…ұз”Ё,ж©ҹеҜҶиіҮж–ҷ(APIйҮ‘й‘°зӯү)еҸӘз•ҷеңЁиҮӘе·ұзҖҸиҰҪеҷЁ ----------
// еҰӮжһңдёҚжҳҜеңЁ Claude Artifact з’°еўғжү“й–Ӣ(дҫӢеҰӮзӣҙжҺҘжҠҠжӘ”жЎҲеӯҳеҲ°йӣ»и…ҰгҖҒз”ЁзҖҸиҰҪеҷЁй–Ӣе•ҹ),window.storage дёҚеӯҳеңЁ,
// йҖҷжҷӮиҮӘеӢ•йҖҖеӣһгҖҢжң¬ж©ҹе„ІеӯҳгҖҚжЁЎејҸ,иіҮж–ҷеҸӘеӯҳеңЁиҮӘе·ұзҖҸиҰҪеҷЁ,дёҚжңғи·ЁиЈқзҪ®еҗҢжӯҘвҖ”вҖ”йҒҝе…ҚзӣҙжҺҘй–ӢжӘ”жЎҲжҷӮж•ҙеҖӢз•¶ж©ҹгҖӮ
const HAS_SHARED_STORAGE = typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
const LS_PREFIX = "ad-ledger::";
const localOnlyStorage = {
  async get(key) {
    const v = localStorage.getItem(LS_PREFIX + key);
    return v !== null ? { key, value: v } : null;
  },
  async set(key, value) {
    localStorage.setItem(LS_PREFIX + key, value);
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem(LS_PREFIX + key);
    return { key, deleted: true };
  },
  async list(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {

function parseLedgerSheet(matrix, year) {
  if (!matrix || matrix.length < 3) return null;
  const row1 = matrix[0] || [];
  const row2 = matrix[1] || [];
  const blocks = [];
  for (let c = LEDGER_PRODUCT_BLOCK_START_COL; c < Math.max(row1.length, row2.length); c += 1) {
    if ((row2[c] || "").toString().trim() === "еёійқўзҮҹжҘӯйЎҚ") {
      const code = (row1[c] || "").toString().trim().toUpperCase();
      if (!code) continue;
      blocks.push({
        code,
        name: (row1[c + 1] || "").toString().trim(),
        colRevenue: c, colAov: c + 1, colSpend: c + 2, colProfit: c + 4, colNetProfit: c + 5,

        revenue: toNum(row[1]), adSpend: toNum(row[2]), profit: toNum(row[4]),
        netProfit: toNum(row[7] !== undefined && row[7] !== null && row[7] !== "" ? row[7] : row[6]),

          profit: toNum(row[b.colProfit]),
          netProfit: toNum(row[b.colNetProfit]),
          orders: aov > 0 ? revenue / aov : null,
        };
      });
      days.push({ date: iso, overall, byCode });
    } else if (typeof dateCell === "string" && dateCell.trim() === "зёҪзөҗ") {
      const overall = {
        revenue: toNum(row[1]), adSpend: toNum(row[2]), profit: toNum(row[4]),
        netProfit: toNum(row[7] !== undefined && row[7] !== null && row[7] !== "" ? row[7] : row[6]),
      };
      const byCode = {};
      blocks.forEach((b) => {
        byCode[b.code] = {
          revenue: toNum(row[b.colRevenue]), spend: toNum(row[b.colSpend]),
          profit: toNum(row[b.colProfit]), netProfit: toNum(row[b.colNetProfit]),

function parseLedgerWorkbook(workbook, year) {
  const result = {};

    const m = sheetName.match(LEDGER_MONTH_SHEET_RE);
    if (!m) return;
    const monthNum = parseInt(m[1], 10);
    if (!monthNum || monthNum < 1 || monthNum > 12) return;

    const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null, raw: true });
    const parsed = parseLedgerSheet(matrix, year);
    if (parsed) {
      const monthKey = `${year}-${String(monthNum).padStart(2, "0")}`;

    Object.entries(d.byCode || {}).forEach(([code, v]) => {
      if (!byCode[code]) byCode[code] = { revenue: 0, spend: 0, profit: 0, netProfit: 0, orderEst: 0, hasOrderEst: true };
      byCode[code].revenue += v.revenue || 0;
      byCode[code].spend += v.spend || 0;
      byCode[code].profit += v.profit || 0;
      byCode[code].netProfit += v.netProfit || 0;
      if (v.orders !== null && v.orders !== undefined) byCode[code].orderEst += v.orders;
      else byCode[code].hasOrderEst = false;
    });
  });
  Object.values(byCode).forEach((v) => { v.aov = v.hasOrderEst && v.orderEst > 0 ? v.revenue / v.orderEst : null; });
  const hasAnyData = overall.revenue > 0 || overall.adSpend > 0 || Object.values(byCode).some((v) => v.revenue > 0 || v.spend > 0);
  if (!hasAnyData) return null;
  return { overall, byCode, dayCount: matchedDays.length, sinceISO, untilISO };
}

// Shopline иіҮж–ҷдёҚеҲҶе“ҒзүҢ(дёҖеҖӢе•Ҷеә—е°ҚжҮүжүҖжңүе»Је‘Ҡеёіиҷҹ),жүҖд»ҘйҖҷиЈЎзҡ„ key дёҚеғҸ Meta йӮЈжЁЈеё¶е“ҒзүҢ idгҖӮ
const SHOPLINE_WORKER_URL_KEY = "shopline-worker-url";
const SHOPLINE_WEEK_PREFIX = "shopline-week:";
const SHOPLINE_MONTH_PREFIX = "shopline-month:";
function shoplineWeekKey(weekStart) {
  return SHOPLINE_WEEK_PREFIX + weekStart;
}
function shoplineMonthKey(monthKey) {

}

// жҠҠ Date зү©д»¶ж јејҸеҢ–жҲҗ "YYYY-MM-DD"(з”Ёж—ҘжӣҶдёҠзҡ„е№ҙжңҲж—Ҙ,дёҚиҪүжҷӮеҚҖ)
function fmtYmd(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

// дёҖйҖұ(йҖұдёҖеҲ°йҖұж—Ҙ)зҡ„иө·иЁ–ж—Ҙжңҹеӯ—дёІ,зөҰ Shopline Worker з”Ё
function weekRangeForShopline(weekStart) {
  const start = new Date(weekStart + "T00:00:00");
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  return { since: fmtYmd(start), until: fmtYmd(end) };
}

// дёҖеҖӢжңҲзҡ„иө·иЁ–ж—Ҙжңҹеӯ—дёІ,зөҰ Shopline Worker з”Ё
function monthRangeForShopline(monthKey) {
  const [y, m] = monthKey.split("-").map(Number);
  const start = new Date(y, m - 1, 1);
  const end = new Date(y, m, 0); // и©ІжңҲжңҖеҫҢдёҖеӨ©
  return { since: fmtYmd(start), until: fmtYmd(end) };
}

// жҠҠ Shopline иЁӮе–®дҫқгҖҢutm_content(йҖҡеёёжҳҜ Meta е»Је‘Ҡ ID)гҖҚжҜ”е°ҚеҲ°е°ҚжҮүзҡ„е»Је‘Ҡ,
// жҜ”е°ҚдёҚеҲ°зҡ„иЁӮе–®(дҫӢеҰӮиҮӘз„¶жөҒйҮҸгҖҒзӣҙжҺҘијёе…Ҙз¶ІеқҖгҖҒUTM жҳҜз©әзҡ„)жӯёеҲ°гҖҢunmatchedгҖҚгҖӮ
// еҸӘиЁҲе…Ҙе·Ід»ҳж¬ҫе®ҢжҲҗгҖҒдё”жІ’жңүиў«еҸ–ж¶Ҳзҡ„иЁӮе–®,жҜ”ијғиІјиҝ‘гҖҢеҜҰйҡӣе…ҘеёігҖҚзҡ„зҮҹж”¶гҖӮ
function matchShoplineOrdersToAds(shoplineOrders, ads) {
  const byAdKey = {};
  const unmatched = { revenue: 0, orderCount: 0 };
  const validOrders = (shoplineOrders || []).filter(
    (o) => o.paymentStatus === "completed" && o.status !== "cancelled"
  );
  validOrders.forEach((o) => {
    const contentId = o.utm && (o.utm.utm_content || o.utm.utm_term);
    const matchedAd = contentId
      ? (ads || []).find((ad) => (ad.adIds || []).map(String).includes(String(contentId)))
      : null;
    if (matchedAd) {
      const key = matchedAd.name + "::" + (matchedAd.adIds || []).join(",");
      if (!byAdKey[key]) byAdKey[key] = { ad: matchedAd, shoplineRevenue: 0, shoplineOrders: 0 };
      byAdKey[key].shoplineRevenue += o.amount;
      byAdKey[key].shoplineOrders += 1;
    } else {
      unmatched.revenue += o.amount;
      unmatched.orderCount += 1;
    }
  });
  const rows = Object.values(byAdKey)
    .map((r) => {
      const metaRevenue = r.ad.revenue || 0;
      const delta = r.shoplineRevenue - metaRevenue;
      const deltaPct = metaRevenue > 0 ? (delta / metaRevenue) * 100 : null;
      return { ...r, metaRevenue, delta, deltaPct };
    })
    .sort((a, b) => b.shoplineRevenue - a.shoplineRevenue);
  return { rows, unmatched, matchedOrderCount: validOrders.length - unmatched.orderCount, totalValidOrders: validOrders.length };
}

// з”Ё UTC йҒӢз®—дҫҶеҠ жёӣеӨ©ж•ё,йҒҝе…ҚзҖҸиҰҪеҷЁжҷӮеҚҖйҖ жҲҗж—Ҙжңҹеӯ—дёІдҪҚз§»гҖӮ
function addDaysISO(iso, days) {
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + days);
  return `${dt.getUTCFullYear()}-${String(dt.getUTCMonth() + 1).padStart(2, "0")}-${String(dt.getUTCDate()).padStart(2, "0")}`;
}
function fmtInt(n) { return Math.round(n).toLocaleString("zh-TW"); }
function fmtMoney(n, currency) {
  try {
    return new Intl.NumberFormat("zh-TW", { style: "currency", currency: currency || "TWD", maximumFractionDigits: 0 }).format(n);
  } catch { return `${currency || ""} ${fmtInt(n)}`; }
}
function deriveMetrics(agg) {
  const cpa = agg.conversions > 0 ? agg.spend / agg.conversions : null;
  const roas = agg.spend > 0 && agg.revenue > 0 ? agg.revenue / agg.spend : null;
  return { ...agg, cpa, roas };
}
function pctChange(curr, prev) {
  if (prev === null || prev === undefined || prev === 0) return null;
  if (curr === null || curr === undefined) return null;
  return ((curr - prev) / prev) * 100;
}

function DeltaBadge({ value, invert = false }) {

}

function SimpleBarChart({ data, seriesA, seriesB, colorA, colorB, labelA, labelB, fmtA, fmtB }) {
  const w = 640, h = 200, padL = 6, padR = 6, padT = 10, padB = 26;
  const n = data.length;
  const groupW = (w - padL - padR) / n;
  const barW = Math.min(22, groupW * 0.28);
  const maxA = Math.max(1, ...data.map((d) => d[seriesA]));
  const maxB = Math.max(1, ...data.map((d) => d[seriesB]));
  return (
    <div>
      <div className="mal-chart-legend">
        <span><i className="mal-chart-dot" style={{ background: colorA }}></i>{labelA}</span>
        <span><i className="mal-chart-dot" style={{ background: colorB }}></i>{labelB}</span>
      </div>
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="200">
        <line x1={padL} y1={h - padB} x2={w - padR} y2={h - padB} stroke="#EAE2D6" />
        {data.map((d, i) => {
          const cx = padL + groupW * i + groupW / 2;
          const barH_A = ((h - padT - padB) * d[seriesA]) / maxA;
          const barH_B = ((h - padT - padB) * d[seriesB]) / maxB;
          return (
            <g key={i}>
              <rect x={cx - barW - 2} y={h - padB - barH_A} width={barW} height={barH_A} fill={colorA} rx="2">
                <title>{d.month}: {fmtA(d[seriesA])}</title>
              </rect>
              <rect x={cx + 2} y={h - padB - barH_B} width={barW} height={barH_B} fill={colorB} rx="2">
                <title>{d.month}: {fmtB(d[seriesB])}</title>
              </rect>
              <text x={cx} y={h - 8} textAnchor="middle" fontSize="11" fontFamily="IBM Plex Mono, monospace" fill="#9C9186">{d.month}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function SimpleLineChart({ data, seriesA, seriesB, colorA, colorB, labelA, labelB, fmtA, fmtB }) {
  const w = 640, h = 200, padL = 6, padR = 6, padT = 14, padB = 26;
  const n = data.length;
  const stepX = n > 1 ? (w - padL - padR) / (n - 1) : 0;
  const valsA = data.map((d) => d[seriesA]).filter((v) => v !== null && v !== undefined);
  const valsB = data.map((d) => d[seriesB]).filter((v) => v !== null && v !== undefined);
  const maxA = Math.max(1, ...valsA), minA = Math.min(0, ...valsA);
  const maxB = Math.max(1, ...valsB), minB = Math.min(0, ...valsB);
  const yA = (v) => h - padB - ((v - minA) / (maxA - minA || 1)) * (h - padT - padB);
  const yB = (v) => h - padB - ((v - minB) / (maxB - minB || 1)) * (h - padT - padB);
  const pathFor = (key, yf) => {
    let d = "";
    data.forEach((pt, i) => {
      const v = pt[key];
      if (v === null || v === undefined) return;
      const x = padL + stepX * i;
      d += (d ? " L " : "M ") + x + " " + yf(v);
    });
    return d;
  };
  return (
    <div>
      <div className="mal-chart-legend">
        <span><i className="mal-chart-dot" style={{ background: colorA }}></i>{labelA}</span>
        <span><i className="mal-chart-dot" style={{ background: colorB }}></i>{labelB}</span>
      </div>
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="200">
        <line x1={padL} y1={h - padB} x2={w - padR} y2={h - padB} stroke="#EAE2D6" />
        <path d={pathFor(seriesA, yA)} fill="none" stroke={colorA} strokeWidth="2.5" />
        <path d={pathFor(seriesB, yB)} fill="none" stroke={colorB} strokeWidth="2.5" />
        {data.map((pt, i) => {
          const x = padL + stepX * i;
          return (
            <g key={i}>
              {pt[seriesA] !== null && pt[seriesA] !== undefined && (
                <circle cx={x} cy={yA(pt[seriesA])} r="3.2" fill={colorA}><title>{pt.month} {labelA}: {fmtA(pt[seriesA])}</title></circle>
              )}
              {pt[seriesB] !== null && pt[seriesB] !== undefined && (
                <circle cx={x} cy={yB(pt[seriesB])} r="3.2" fill={colorB}><title>{pt.month} {labelB}: {fmtB(pt[seriesB])}</title></circle>
              )}
              <text x={x} y={h - 8} textAnchor="middle" fontSize="11" fontFamily="IBM Plex Mono, monospace" fill="#9C9186">{pt.month}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

const DONUT_PALETTE = [
  "#6E8577", "#A8607A", "#BFA054", "#7C8B54", "#8E9AAF", "#C97B63",
  "#5B7F95", "#9B7EDE", "#D98B5F", "#4F8A7B", "#B85C7A", "#7D9471",

  "#9E7B6E", "#6B9A8C", "#B88CA6", "#8A9E5B", "#A65B6E", "#5B8AA6",
];

// з”ўе“Ғд»Јиҷҹзҡ„ж•ёйҮҸжІ’жңүдёҠйҷҗ,иүІзӣӨз”Ёе®Ңд№ӢеҫҢ,з”Ё HSL иүІзӣёз’°жј”з®—жі•иҮӘеӢ•з”ҹжҲҗж–°йЎҸиүІ(й»ғйҮ‘и§’еәҰж—ӢиҪү,зўәдҝқеҪјжӯӨеӨ еҘҪеҲҶиҫЁ),
// иҖҢдёҚжҳҜи®“йЎҸиүІеҫһй ӯеҫӘз’°йҮҚиӨҮвҖ”вҖ”йҒҝе…Қз”ўе“ҒдёҖеӨҡ,е…©еҖӢдёҚеҗҢд»Јиҷҹиў«з•«жҲҗеҗҢдёҖеҖӢйЎҸиүІиҖҢзңӢдёҚеҮәе·®з•°гҖӮ
function colorForIndex(i) {
  if (i < DONUT_PALETTE.length) return DONUT_PALETTE[i];
  const hue = (i * 137.508) % 360; // й»ғйҮ‘и§’еәҰ,и®“иүІзӣёзӣЎйҮҸеҲҶж•Ј
  return `hsl(${hue.toFixed(0)}, 46%, 48%)`;
}

function DonutChart({ data, size = 176, thickness = 30 }) {
  const total = data.reduce((s, d) => s + Math.max(0, d.value), 0);
  const r = size / 2;
  const rInner = r - thickness;
  const toXY = (deg, radius) => {
    const rad = ((deg - 90) * Math.PI) / 180;
    return [r + radius * Math.cos(rad), r + radius * Math.sin(rad)];
  };
  function arcPath(startDeg, sweepDeg) {
    if (sweepDeg <= 0) return "";
    const endDeg = Math.min(startDeg + sweepDeg, startDeg + 359.999);
    const large = sweepDeg > 180 ? 1 : 0;
    const [x1, y1] = toXY(startDeg, r);
    const [x2, y2] = toXY(endDeg, r);
    const [x3, y3] = toXY(endDeg, rInner);
    const [x4, y4] = toXY(startDeg, rInner);
    return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${rInner} ${rInner} 0 ${large} 0 ${x4} ${y4} Z`;
  }
  let angle = 0;
  const arcs = data.map((d) => {
    const value = Math.max(0, d.value);
    const frac = total > 0 ? value / total : 0;
    const start = angle;
    const sweep = frac * 360;
    angle += sweep;
    return { ...d, start, sweep, frac };
  });
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
      {arcs.filter((a) => a.sweep > 0).map((a, i) => (
        <path key={i} d={arcPath(a.start, a.sweep)} fill={a.color}>
          <title>{a.label}пјҡ{(a.frac * 100).toFixed(1)}%</title>
        </path>
      ))}
      <circle cx={r} cy={r} r={rInner - 1} fill="var(--paper-raised)" />
    </svg>
  );
}

  async function fetchShoplineData(since, until, storageKey, applyFn) {
    if (!shoplineWorkerUrl) {
      setShoplineError("и«Ӣе…ҲиІјдёҠдёҰе„ІеӯҳдҪ зҡ„ Cloudflare Worker з¶ІеқҖгҖӮ");

    setShoplineLoading(true);
    setShoplineError(null);

    try {
      const res = await fetch(`${shoplineWorkerUrl}/api/orders?since=${since}&until=${until}`, {
        headers: { "X-Proxy-Auth": SHOPLINE_PROXY_SECRET },
      });
      const data = await res.json();
      if (!res.ok || data.error) {
        throw new Error(data.error || `Worker еӣһжҮүйҢҜиӘӨ (status ${res.status})`);
      }
      await storage.set(storageKey, JSON.stringify(data));
      applyFn(data);
      setShoplineNotice(`е·ІжҠ“еҸ– ${data.meta && data.meta.totalOrders != null ? data.meta.totalOrders : "0"} зӯҶ Shopline иЁӮе–®(${since} ~ ${until})гҖӮ`);
    } catch (e) {
      setShoplineError("жҠ“еҸ– Shopline иіҮж–ҷеӨұж•—:" + e.message);
    } finally {
      setShoplineLoading(false);
    }
  }

  // иҪүжҲҗзңӢеҫ—жҮӮзҡ„дёӯж–ҮиӘӘжҳҺгҖӮеҺҹе§ӢжҠҖиЎ“иЁҠжҒҜйӮ„жҳҜжңғеҚ°еңЁзҖҸиҰҪеҷЁ console иЈЎ,зңҹзҡ„иҰҒйҷӨйҢҜеҸҜд»ҘжҢү F12 жҹҘзңӢ,
  // дҪҶз•«йқўдёҠеҸӘйЎҜзӨәдёҖиҲ¬дәәзңӢеҫ—жҮӮзҡ„и©ұгҖӮ
  function friendlyMetaError(e) {
    console.error("[жҠ“еҸ–еӨұж•—зҡ„еҺҹе§ӢйҢҜиӘӨ]", e);
    const msg = String((e && e.message) || e || "");

    if (/жӯЈеңЁжӣҙж–°|и«ӢзЁҚзӯү|и«ӢзЁҚеҖҷ/i.test(msg)) {
      return "зӣ®еүҚжңүе…¶д»–дәәжӯЈеңЁжӣҙж–°еҗҢдёҖеҖӢе»Је‘Ҡеёіиҷҹзҡ„иіҮж–ҷ,зі»зөұжңғиҮӘеӢ•йҮҚи©Ұ,и«ӢзЁҚеҖҷгҖӮ";
    }
    if (
      /too many calls/i.test(msg) ||
      /rate.?limit/i.test(msg) ||
      /80004/.test(msg) ||
      /error_subcode 2446079/i.test(msg) ||
      (e && (e.code === 1 || e.code === 2))
    ) {
      return "еӨӘеӨҡдәәеҗҢжҷӮеңЁжҠ“еҸ–йҖҷеҖӢе»Је‘Ҡеёіиҷҹ,Meta жҡ«жҷӮйҷҗеҲ¶дәҶеӯҳеҸ–гҖӮйҖҷдёҚжҳҜиЁӯе®ҡйҢҜиӘӨ,йҖҡеёёзӯү 1~2 еҲҶйҗҳеҶҚи©ҰдёҖж¬Ўе°ұжңғжҒўеҫ©гҖӮ";
    }
    if (/failed to fetch/i.test(msg) || /networkerror/i.test(msg) || /load failed/i.test(msg)) {
      return "з¶Іи·ҜйҖЈз·ҡеӨұж•—,и«ӢзўәиӘҚжүӢж©ҹжҲ–йӣ»и…ҰжңүйҖЈдёҠз¶Іи·Ҝ,еҶҚи©ҰдёҖж¬ЎгҖӮ";
    }
    if (/timeout|timed out|abort/i.test(msg)) {
      return "йҖЈз·ҡйҖҫжҷӮ,и«ӢзЁҚеҫҢеҶҚи©ҰдёҖж¬ЎгҖӮ";
    }
    if (/unexpected token/i.test(msg) || (/json/i.test(msg) && /pars/i.test(msg))) {
      return "дјәжңҚеҷЁеӣһжҮүз•°еёё,еҸҜиғҪжҳҜжҡ«жҷӮжҖ§е•ҸйЎҢ,и«ӢзЁҚеҫҢеҶҚи©ҰдёҖж¬ЎгҖӮ";
    }
    if (/token/i.test(msg) || /auth/i.test(msg) || /\b401\b/.test(msg) || /\b403\b/.test(msg) || /permission/i.test(msg)) {
      return "еӯҳеҸ–ж¬ҠйҷҗеҸҜиғҪжңүе•ҸйЎҢ(дҫӢеҰӮж¬Ҡжқ–йҒҺжңҹ),и«ӢиҒҜз№«з®ЎзҗҶе“ЎзўәиӘҚиЁӯе®ҡгҖӮ";
    }
    if (/status 5\d\d/i.test(msg)) {
      return "дјәжңҚеҷЁжҡ«жҷӮзҷјз”ҹе•ҸйЎҢ,и«ӢзЁҚеҫҢеҶҚи©ҰдёҖж¬Ў;иӢҘжҢҒзәҢзҷјз”ҹ,и«ӢиҒҜз№«з®ЎзҗҶе“ЎгҖӮ";
    }
    if (/status 4\d\d/i.test(msg)) {
      return "и«ӢжұӮиў«жӢ’зө•,еҸҜиғҪжҳҜиЁӯе®ҡжңүиӘӨ,и«ӢиҒҜз№«з®ЎзҗҶе“ЎзўәиӘҚгҖӮ";
    }
    return "жҠ“еҸ–еӨұж•—,и«ӢзЁҚеҫҢеҶҚи©ҰдёҖж¬Ў;иӢҘжҢҒзәҢзҷјз”ҹ,и«ӢиҒҜз№«з®ЎзҗҶе“ЎгҖӮ";

  // ---------- Meta е»Је‘ҠжҲҗж•Ҳ:йҖҸйҒҺ Worker д»ЈзҗҶжҠ“еҸ–,ж¬Ҡжқ–е®Ңе…ЁдёҚз¶“йҒҺзҖҸиҰҪеҷЁ ----------
  // е“ҒзүҢж–№еҸӘйңҖиҰҒжҢүжҢүйҲ•,дёҚйңҖиҰҒијёе…Ҙд»»дҪ•ж¬Ҡжқ–жҲ–еёіиҷҹ IDвҖ”вҖ”Worker йӮЈйӮҠе·Із¶“йҺ–еҘҪдәҶгҖӮ
  //
  // йҮҚи©ҰиӘӘжҳҺ:еҰӮжһңжңүеҘҪе№ҫеҖӢдәә(дёҚеҗҢиЈқзҪ®)еңЁе·®дёҚеӨҡжҷӮй–“еҗ„иҮӘжҢүжӣҙж–°,жңғеҗҢжҷӮжү“еҗҢдёҖеҖӢ Meta е»Је‘Ҡеёіиҷҹ,
  // з–ҠеҠ иө·дҫҶеҸҜиғҪи§ёзҷј Meta зҡ„й »зҺҮйҷҗеҲ¶иҖҢеӨұж•—гҖӮйҖҷиЈЎеӨұж•—жҷӮдёҚжңғйҰ¬дёҠж”ҫжЈ„,иҖҢжҳҜзӯүдёҖж®өжҷӮй–“(йҡЁж©ҹжӢүй–Ӣ,
  // йҒҝе…ҚеӨ§е®¶гҖҢеҗҢжҷӮеӨұж•—гҖҒеҗҢжҷӮйҮҚи©ҰгҖҚеҸҲж’һеңЁдёҖиө·)еҶҚи©ҰдёҖж¬Ў,жңҖеӨҡйҮҚи©Ұ 2 ж¬ЎгҖӮйҖҷиғҪи®“еӨ§йғЁеҲҶеӣ зӮәж’һй »зҺҮ
  // йҷҗеҲ¶йҖ жҲҗзҡ„жҡ«жҷӮжҖ§еӨұж•—иҮӘеӢ•дҝ®еҫ©,дҪҶз„Ўжі•еҫ№еә•йҒҝе…ҚеӨҡдәәеҗҢжҷӮи§ёзҷј,еӣ зӮәжҜҸж”ҜиЈқзҪ®еҗ„иҮӘзҚЁз«ӢгҖҒеҪјжӯӨдёҚзҹҘйҒ“
  // е°Қж–№д№ҹеңЁжӣҙж–°вҖ”вҖ”зңҹжӯЈиҰҒеҒҡеҲ°гҖҢеҗҢжҷӮй–“еҸӘжңүдёҖеҖӢдәәеңЁжӣҙж–°гҖҚ,йңҖиҰҒеңЁ Worker йӮЈз«ҜеҒҡдјәжңҚеҷЁз«Ҝзҡ„жҺ’йҡҠ/йҺ–е®ҡгҖӮ
  async function callMetaWorker(path, params, retries = 2) {
    const url = new URL(`${shoplineWorkerUrl}${path}`);
    Object.entries(params || {}).forEach(([k, v]) => {
      if (v !== undefined && v !== null && v !== "") url.searchParams.set(k, v);
    });
    for (let attempt = 0; ; attempt++) {
      try {
        const res = await fetch(url.toString(), { headers: { "X-Proxy-Auth": SHOPLINE_PROXY_SECRET } });
        const data = await res.json();
        if (!res.ok || data.error) {
          throw new Error(data.error || `Worker еӣһжҮүйҢҜиӘӨ (status ${res.status})`);
        }
        return data;
      } catch (e) {
        if (attempt >= retries) throw e;
        const waitMs = 3000 * (attempt + 1) + Math.random() * 2000;
        await new Promise((r) => setTimeout(r, waitMs));
      }
    }
  }

  // ---------- еҝ«йҖҹиЈң3еҖӢжңҲ / еҝ«йҖҹиЈң4йҖұ:йҖҸйҒҺ Worker д»ЈзҗҶ,дёҚйңҖиҰҒдҪҝз”ЁиҖ…ијёе…Ҙж¬Ҡжқ– ----------
  // и·ҹгҖҢжӣҙж–°дёҠйҖұиіҮж–ҷгҖҚгҖҢжӣҙж–°жң¬жңҲиіҮж–ҷгҖҚз”ЁеҗҢдёҖеҘ— callMetaWorker ж©ҹеҲ¶,еҸӘжҳҜдёҖж¬ЎиЈңеӨҡеҖӢжңҹй–“,
  // жҜҸжҠ“е®ҢдёҖеҖӢжңҹй–“жңғй–“йҡ” 4 з§’еҶҚжҠ“дёӢдёҖеҖӢ,йҒҝе…Қи§ёзҷј Meta й »зҺҮйҷҗеҲ¶гҖӮ
  const [quickBatchLoading, setQuickBatchLoading] = useState(null); // null | "months" | "weeks"
  const [quickBatchProgress, setQuickBatchProgress] = useState(null);

  async function quickFetchRecentMonths(monthsCount = 3) {
    if (!activeBrandId) {
      setMetaUpdateError("и«Ӣе…ҲйҒёж“ҮдёҖеҖӢе“ҒзүҢгҖӮ");
      return;
    }
    setQuickBatchLoading("months");
    setMetaUpdateError(null);
    setMetaUpdateNotice(null);

    const now = new Date();
    const monthsToFetch = [];
    for (let m = 0; m < monthsCount; m++) {
      const d = new Date(now.getFullYear(), now.getMonth() - m, 1);
      monthsToFetch.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`);
    }
    monthsToFetch.reverse(); // еҫһжңҖж—©зҡ„жңҲй–Ӣе§ӢжҠ“

    const progress = monthsToFetch.map((mk) => ({ id: mk, name: monthLabel(mk), status: "pending", message: "" }));
    setQuickBatchProgress(progress);

    let successCount = 0, errorCount = 0, lastMonthKey = null;
    for (let i = 0; i < monthsToFetch.length; i++) {
      const monthKey = monthsToFetch[i];
      setQuickBatchProgress((prev) => prev.map((p, idx) => (idx === i ? { ...p, status: "running" } : p)));
      try {
        const [y, m] = monthKey.split("-").map(Number);
        const since = `${monthKey}-01`;
        const lastDay = new Date(y, m, 0).getDate();
        const until = `${monthKey}-${String(lastDay).padStart(2, "0")}`;
        const record = await callMetaWorker("/api/meta/insights", {
          accountId: activeBrandId,
          since,
          until,
          relax: "false",
        });
        await storage.set(monthKeyFor(activeBrandId, monthKey), JSON.stringify(record));
        successCount++;
        lastMonthKey = monthKey;
        setQuickBatchProgress((prev) =>
          prev.map((p, idx) => (idx === i ? { ...p, status: record.ads.length ? "done" : "empty", message: `${record.ads.length} ж”Ҝе»Је‘Ҡ` } : p))
        );
      } catch (e) {
        errorCount++;
        setQuickBatchProgress((prev) => prev.map((p, idx) => (idx === i ? { ...p, status: "error", message: friendlyMetaError(e) } : p)));
      }
      if (i < monthsToFetch.length - 1) await new Promise((r) => setTimeout(r, 4000));
    }

    await loadAll(activeBrandId);
    if (lastMonthKey) setFocusMonth(lastMonthKey);
    setMetaUpdateNotice(`е·ІиҮӘеӢ•жӣҙж–°еүҚ ${monthsCount} еҖӢжңҲ:жҲҗеҠҹ ${successCount} еҖӢжңҲ${errorCount > 0 ? `,еӨұж•— ${errorCount} еҖӢжңҲ` : ""}гҖӮ`);
    setQuickBatchLoading(null);
  }

  async function quickFetchRecentWeeks(weeksCount = 4) {
    if (!activeBrandId) {
      setMetaUpdateError("и«Ӣе…ҲйҒёж“ҮдёҖеҖӢе“ҒзүҢгҖӮ");
      return;

    setQuickBatchLoading("weeks");
    setMetaUpdateError(null);
    setMetaUpdateNotice(null);

    try {
      const tz = await callMetaWorker("/api/meta/timezone", { accountId: activeBrandId });
      const progress = [];
      for (let w = 1; w <= weeksCount; w++) {
        const info = getLastWeekRange(tz.utcOffsetHours, w);
        progress.push({ id: "w" + w, name: `${info.since} ~ ${info.until}`, status: "pending", message: "" });
      }
      setQuickBatchProgress(progress);

      let successCount = 0, errorCount = 0, mostRecentInfo = null;
      for (let w = 1; w <= weeksCount; w++) {
        setQuickBatchProgress((prev) => prev.map((p, idx) => (idx === w - 1 ? { ...p, status: "running" } : p)));
        try {
          const info = getLastWeekRange(tz.utcOffsetHours, w);
          const record = await callMetaWorker("/api/meta/insights", {
            accountId: activeBrandId,
            since: info.since,
            until: info.until,
            relax: "true",
          });
          await storage.set(weekKeyFor(activeBrandId, info.weekStart), JSON.stringify(record));
          successCount++;
          if (w === 1) mostRecentInfo = info; // w=1 жҳҜгҖҢдёҠйҖұгҖҚ,д№ҹе°ұжҳҜжңҖж–°зҡ„дёҖйҖұ
          setQuickBatchProgress((prev) =>
            prev.map((p, idx) => (idx === w - 1 ? { ...p, status: record.ads.length ? "done" : "empty", message: `${record.ads.length} ж”Ҝе»Је‘Ҡ` } : p))
          );
        } catch (e) {
          errorCount++;
          setQuickBatchProgress((prev) => prev.map((p, idx) => (idx === w - 1 ? { ...p, status: "error", message: friendlyMetaError(e) } : p)));
        }
        if (w < weeksCount) await new Promise((r) => setTimeout(r, 4000));
      }

      if (mostRecentInfo) setWeekInfo(mostRecentInfo);
      await loadAllWeeks(activeBrandId);
      setViewMode("week");
      setMetaUpdateNotice(`е·ІиҮӘеӢ•жӣҙж–°йҒҺеҺ» ${weeksCount} йҖұ:жҲҗеҠҹ ${successCount} йҖұ${errorCount > 0 ? `,еӨұж•— ${errorCount} йҖұ` : ""}гҖӮ`);
    } catch (e) {
      setMetaUpdateError(friendlyMetaError(e));
    } finally {
      setQuickBatchLoading(null);
    }
  }

  async function loadAllWeeks(brandId) {
    try {
      const listRes = await storage.list(WEEK_STORAGE_PREFIX);
      const keys = (listRes.keys || []).filter((k) => {
        const rest = k.slice(WEEK_STORAGE_PREFIX.length);
        return brandId ? rest.startsWith(brandId + "::") : !rest.includes("::");
      });
      const entries = {};
      for (const k of keys) {
        const res = await storage.get(k);
        if (res && res.value) {
          const rest = k.slice(WEEK_STORAGE_PREFIX.length);
          const wk = brandId ? rest.slice((brandId + "::").length) : rest;
          entries[wk] = JSON.parse(res.value);
        }
      }
      setWeeksData(entries);
      const sorted = Object.keys(entries).sort();
      setFocusWeek(sorted.length ? sorted[sorted.length - 1] : null);
    } catch {
      setWeeksData({});
      setFocusWeek(null);
    }
  }

  async function importLedgerFile(file) {
    setLedgerImportLoading(true); setLedgerImportError(null); setLedgerImportNotice(null);
    try {
      const buf = await file.arrayBuffer();
      const workbook = XLSX.read(buf, { type: "array", cellDates: true });
      const parsedByMonth = parseLedgerWorkbook(workbook, Number(ledgerYear));
      const monthKeys = Object.keys(parsedByMonth);
      if (!monthKeys.length) {
        setLedgerImportError("еңЁйҖҷд»ҪжӘ”жЎҲиЈЎжІ’жңүжүҫеҲ°зңӢеҫ—жҮӮзҡ„жңҲд»ҪеҲҶй Ғ(еҲҶй ҒеҗҚзЁұйңҖиҰҒжҳҜгҖҢ1жңҲгҖҚ~гҖҢ12жңҲгҖҚйҖҷзЁ®ж јејҸ),и«ӢзўәиӘҚжӘ”жЎҲж јејҸжҳҜеҗҰи·ҹзҜ„дҫӢиЎЁе–®дёҖиҮҙгҖӮ");
        return;
      }
      for (const mk of monthKeys) {
        await storage.set(ledgerKeyFor(activeBrandId, mk), JSON.stringify(parsedByMonth[mk]));
      }
      await loadLedger(activeBrandId);
      setLedgerImportNotice(`е·ІеҢҜе…Ҙ ${monthKeys.map((mk) => monthLabel(mk)).join("гҖҒ")} зҡ„еҫҢеҸ°жҜҸж—Ҙж”¶зӣҠиЎЁ,йҖұе ұиЎЁ/жңҲе ұиЎЁжңғиҮӘеӢ•жҜ”е°ҚгҖӮ`);
      setShowLedgerModal(false);
    } catch (e) {
      setLedgerImportError("и®ҖеҸ–жӘ”жЎҲжҷӮзҷјз”ҹе•ҸйЎҢ,и«ӢзўәиӘҚдёҠеӮізҡ„жҳҜ .xlsx жӘ”,дё”ж јејҸи·ҹзҜ„дҫӢиЎЁе–®дёҖиҮҙгҖӮ");
    } finally {
      setLedgerImportLoading(false);
    }
  }

  // еҫһ Google и©Ұз®—иЎЁзӣҙжҺҘеҗҢжӯҘеҫҢеҸ°жҜҸж—Ҙж”¶зӣҠиЎЁ(ж–№ејҸB:и©Ұз®—иЎЁдҝқжҢҒе®Ңе…Ёз§ҒеҜҶ,еҸӘеҲҶдә«зөҰдёҖеҖӢжңҚеӢҷеёіиҷҹ),
  // еҸ–д»ЈжүӢеӢ•дёӢијү xlsx еҶҚдёҠеӮізҡ„жӯҘй©ҹгҖӮдјәжңҚеҷЁз«Ҝ(/api/sheets/sync)жңғз”ЁжңҚеӢҷеёіиҷҹйҮ‘й‘°и®ҖгҖҢ1жңҲгҖҚ~гҖҢ12жңҲгҖҚ
  // йҖҷдәӣеҲҶй Ғ,иҪүжҲҗи·ҹ xlsx еҢҜе…Ҙе®Ңе…ЁеҗҢдёҖеҘ—ж јејҸеҫҢзӣҙжҺҘеӯҳйҖІеёіжң¬,еүҚз«ҜйҖҷиЈЎеҸӘйңҖиҰҒжү“дёҖж¬Ў APIгҖӮ
  async function syncFromGoogleSheet() {
    if (!activeBrandId) {
      setLedgerImportError("и«Ӣе…ҲеңЁдёҠж–№йҒёж“ҮжҲ–е»әз«ӢдёҖеҖӢе“ҒзүҢ(е»Је‘Ҡеёіиҷҹ),зі»зөұжүҚзҹҘйҒ“иҰҒжҠҠеҗҢжӯҘеӣһдҫҶзҡ„иіҮж–ҷеӯҳеҲ°е“ӘдёҖжң¬еёігҖӮ");
      return;
    }
    const sheetId = sheetIdInput.trim();
    setSheetSyncLoading(true); setLedgerImportError(null); setLedgerImportNotice(null);
    try {
      const res = await fetch(`/api/sheets/sync`, {
        method: "POST",
        headers: { ...teamKeyHeaders(), "Content-Type": "application/json" },
        body: JSON.stringify({ accountId: activeBrandId, sheetId, year: Number(ledgerYear) }),
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
      await loadLedger(activeBrandId);
      const monthsLabel = (json.importedMonths || []).map((mk) => monthLabel(mk)).join("гҖҒ");
      setLedgerImportNotice(
        `е·Іеҫһ Google и©Ұз®—иЎЁеҗҢжӯҘ ${monthsLabel} зҡ„еҫҢеҸ°жҜҸж—Ҙж”¶зӣҠиЎЁгҖӮ` +
        (json.errors && json.errors.length ? ` (йғЁеҲҶеҲҶй Ғз•ҘйҒҺ:${json.errors.join(";")})` : "")
      );
    } catch (e) {
      setLedgerImportError("еҗҢжӯҘеӨұж•—:" + e.message + "вҖ”вҖ”и«ӢзўәиӘҚйҖҷд»Ҫи©Ұз®—иЎЁе·Із¶“еҲҶдә«зөҰжңҚеӢҷеёіиҷҹзҡ„ email(жӘўиҰ–иҖ…ж¬ҠйҷҗеҚіеҸҜ),дё” ID жІ’жңүиІјйҢҜгҖӮ");
    } finally {
      setSheetSyncLoading(false);
    }
  }

  // PDF еҢҜеҮәз”ЁеҲ°зҡ„ html2canvas / jsPDF еҸӘеңЁзңҹзҡ„жҢүдёӢгҖҢеҢҜеҮә PDFгҖҚжҷӮжүҚеӢ•ж…Ӣијүе…Ҙ,
  // йҒҝе…ҚжҜҸж¬Ўй–Ӣй ҒйғҪиҰҒеӨҡдёӢијүгҖҒеӨҡи§ЈжһҗйҖҷе…©еҖӢдёҚе°Ҹзҡ„еҮҪејҸеә«гҖӮијүе…ҘдёҖж¬ЎеҫҢжңғеҝ«еҸ–,д№ӢеҫҢеҢҜеҮәдёҚжңғйҮҚиӨҮијүе…ҘгҖӮ
  let pdfLibsLoadingPromise = null;
  function loadPdfLibsOnce() {
    if (window.html2canvas && window.jspdf) return Promise.resolve();
    if (pdfLibsLoadingPromise) return pdfLibsLoadingPromise;
    const loadScript = (src) =>
      new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error(`з„Ўжі•ијүе…Ҙ ${src}`));
        document.head.appendChild(s);
      });
    pdfLibsLoadingPromise = Promise.all([
      loadScript("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"),
      loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"),
    ]).catch((e) => {
      pdfLibsLoadingPromise = null; // еӨұж•—зҡ„и©ұдёӢж¬ЎйӮ„иғҪйҮҚи©Ұ
      throw e;
    });
    return pdfLibsLoadingPromise;
  }

  async function exportPDF() {
    setPdfExporting(true);
    setError(null);
    try {
      await loadPdfLibsOnce();
    } catch (e) {
      setError("PDF еҢҜеҮәе·Ҙе…·ијүе…ҘеӨұж•—,и«ӢзўәиӘҚз¶Іи·ҜйҖЈз·ҡеҫҢеҶҚи©ҰдёҖж¬ЎгҖӮ");
      setPdfExporting(false);
      return;
    }
    if (!window.html2canvas || !window.jspdf) {
      setError("PDF еҢҜеҮәе·Ҙе…·йӮ„жІ’ијүе…Ҙе®ҢжҲҗ,и«ӢзўәиӘҚз¶Іи·ҜйҖЈз·ҡеҫҢеҶҚи©ҰдёҖж¬ЎгҖӮ");
      setPdfExporting(false);
      return;
    }
    // е…Ҳеұ•й–ӢжүҖжңүж”¶еҗҲдёӯзҡ„гҖҢе»Је‘ҠжҲҗж•ҲеҲҶйЎһгҖҚеҚҖеЎҠ,дёҚз„¶ж”¶еҗҲзҡ„е…§е®№дёҚжңғиў«жҲӘйҖІ PDF иЈЎгҖӮ
    window.dispatchEvent(new Event(PERF_EXPAND_ALL_EVENT));
    await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    document.body.classList.add("mal-exporting");
    try {
      const target = document.querySelector(".mal-shell");
      const canvas = await window.html2canvas(target, { scale: 2, backgroundColor: "#FAF7F2", useCORS: true });
      if (!canvas || !canvas.width || !canvas.height) {
        throw new Error("з•«йқўж“·еҸ–зөҗжһңжҳҜз©әзҡ„(еҸҜиғҪжҳҜеӯ—еһӢжҲ–ең–зүҮи·Ёз¶ІеҹҹйҷҗеҲ¶е°ҺиҮҙ),и«ӢйҮҚж–°ж•ҙзҗҶй ҒйқўгҖҒзӯүеҫ…еӯ—еһӢиҲҮең–зүҮйғҪијүе…Ҙе®ҢжҲҗеҫҢеҶҚи©ҰдёҖж¬ЎгҖӮ");
      }
      // дҝқйҡӘеҒҡжі•:дёҚе®Ңе…Ёдҫқиіҙ html2canvas зҡ„ backgroundColor йҒёй …вҖ”вҖ”е®ғеңЁжҹҗдәӣжғ…жіҒдёӢжІ’жңүзўәеҜҰз”ҹж•Ҳ,
      // е°ҺиҮҙз•«еёғеә•еұӨжҳҜйҖҸжҳҺзҡ„гҖӮиҖҢ JPEG ж јејҸдёҚж”ҜжҸҙйҖҸжҳҺ,иҪүжӘ”жҷӮзҖҸиҰҪеҷЁжңғжҠҠйҖҸжҳҺзҡ„ең°ж–№иЈңжҲҗзҙ”й»‘иүІ,
      // йҖҷе°ұжҳҜгҖҢеҢҜеҮәеҫҢж•ҙй Ғе…Ёй»‘гҖҚзҡ„зңҹжӯЈеҺҹеӣ гҖӮйҖҷиЈЎз”Ё destination-over жүӢеӢ•жҠҠиғҢжҷҜиүІз•«еҲ°з•«еёғжңҖеә•еұӨ,
      // и“ӢдҪҸд»»дҪ•йҖҸжҳҺзҡ„зё«йҡҷ,зўәдҝқдёҚз®Ў html2canvas йӮЈйӮҠжңүжІ’жңүжҲҗеҠҹеҘ—з”ЁиғҢжҷҜиүІ,жңҖеҫҢдёҖе®ҡжҳҜдёҚйҖҸжҳҺзҡ„гҖӮ
      const ctx = canvas.getContext("2d");
      ctx.globalCompositeOperation = "destination-over";
      ctx.fillStyle = "#FAF7F2";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const { jsPDF } = window.jspdf;

      // Build a single page sized to the full content's aspect ratio, so nothing
      // gets sliced mid-row/mid-card the way fixed-height A4 pagination would.
      const pageWidthPt = 800;
      const pageHeightPt = (canvas.height * pageWidthPt) / canvas.width;
      const pdf = new jsPDF({
        orientation: pageHeightPt > pageWidthPt ? "p" : "l",
        unit: "pt",
        format: [pageWidthPt, pageHeightPt],
      });
      const imgData = canvas.toDataURL("image/jpeg", 0.95);
      pdf.addImage(imgData, "JPEG", 0, 0, pageWidthPt, pageHeightPt);

      const label =
        viewMode === "week"
          ? focusWeek
            ? `йҖұе ұ-${weekLabel(focusWeek).replace("~", "иҮі")}`
            : "е…ЁйғЁйҖұд»Ҫ"
          : focusMonth
          ? monthLabel(focusMonth).replace("/", "-")
          : "е…ЁйғЁжңҲд»Ҫ";
      pdf.save(`е“ҒзүҢжҲҗж•ҲеҲҶжһҗ-${label}.pdf`);
    } catch (e) {
      setError("еҢҜеҮә PDF еӨұж•—:" + e.message);
    } finally {
      document.body.classList.remove("mal-exporting");
      setPdfExporting(false);
    }
  }

  function editCpaThreshold(brandId) {
    const brandName = (brands.find((b) => b.id === brandId) || {}).name || brandId;
    const current = cpaThresholds[brandId];
    const input = window.prompt(
      `иЁӯе®ҡгҖҢ${brandName}гҖҚзҡ„ CPA йҒҺй«ҳжЁҷжә–вҖ”вҖ”жҜҸзӯҶиЁӮе–®жҲҗжң¬(CPA)и¶…йҒҺйҖҷеҖӢйҮ‘йЎҚ,зі»зөұжңғжЁҷзӨәзӮәгҖҢCPA йҒҺй«ҳгҖҚгҖӮ\nз•ҷз©әзҷҪеҸҜд»Ҙжё…йҷӨйҖҷеҖӢе“ҒзүҢзҡ„жЁҷжә–гҖӮ`,
      current != null ? String(current) : ""
    );
    if (input === null) return; // дҪҝз”ЁиҖ…жҢүеҸ–ж¶Ҳ
    const trimmed = input.trim();
    const updated = { ...cpaThresholds };
    if (!trimmed) {
      delete updated[brandId];
    } else {
      const num = parseFloat(trimmed);
      if (isNaN(num) || num <= 0) {
        setApiError("CPA жЁҷжә–и«Ӣијёе…ҘдёҖеҖӢеӨ§ж–ј 0 зҡ„ж•ёеӯ—гҖӮ");
        return;

      updated[brandId] = num;
    }
    setCpaThresholds(updated);
    storage.set("meta-api-cpa-thresholds", JSON.stringify(updated)).catch(() => {});
  }

  const MIN_FETCH_SPEND = 500;
  const MIN_API_GAP_MS = 1200; // д»»е…©ж¬Ў Meta Graph API и«ӢжұӮд№Ӣй–“зҡ„жңҖе°Ҹй–“йҡ”(жҜ«з§’)

  // жүҖжңүжү“ Meta Graph API зҡ„ең°ж–№йғҪиҰҒж”№еҸ«йҖҷеҖӢ,дёҚиҰҒзӣҙжҺҘз”Ё fetch()гҖӮ
  // е®ғжңғзўәдҝқгҖҢйҖҷдёҖж¬ЎиҰҒжү“зҡ„и«ӢжұӮгҖҚи·ҹгҖҢдёҠдёҖж¬ЎзңҹжӯЈжү“еҮәеҺ»зҡ„и«ӢжұӮгҖҚд№Ӣй–“иҮіе°‘й–“йҡ” MIN_API_GAP_MS,
  // дёҚз®ЎдёҠдёҖж¬Ўи«ӢжұӮжҳҜдҫҶиҮӘе‘Ёе ұиЎЁгҖҒжңҲе ұиЎЁгҖҒжү№ж¬ЎгҖҒиҮӘеӢ•еҗҢжӯҘгҖҒжҲ–зё®ең–жҠ“еҸ–,е…ЁйғЁе…ұз”ЁеҗҢдёҖеҖӢиЁҲжҷӮеҷЁ,
  // жүҖд»Ҙе°ұз®—дҪҝз”ЁиҖ…з”Ёе…©еҖӢдёҚеҗҢжҢүйҲ•(е…ҲжҠ“дёҠйҖұгҖҒеҶҚжҠ“жңҲе ұиЎЁ)жүӢеӢ•йҖЈзәҢи§ёзҷј,д№ҹдёҖжЁЈжңғиў«йҖҷиЈЎж“ӢдёӢдҫҶжҺ’йҡҠзӯүеҫ…гҖӮ
  async function throttledFetch(url, context) {
    const now = Date.now();
    const wait = lastApiCallRef.current + MIN_API_GAP_MS - now;
    if (wait > 0) await new Promise((r) => setTimeout(r, wait));
    lastApiCallRef.current = Date.now();
    try {
      return await fetch(url);
    } catch (e) {
      throw new Error(`${context || "е‘јеҸ« Meta API"}жҷӮз¶Іи·Ҝи«ӢжұӮеӨұж•—:${e.message}`);
    }
  }

  async function parseApiResponse(res, context) {
    let json;
    try {
      json = await res.json();
    } catch {
      throw new Error(`${context}еӣһеӮізҡ„е…§е®№з„Ўжі•и§Јжһҗ(еҸҜиғҪжҳҜз¶Іи·Ҝдёӯж–·жҲ– Meta дјәжңҚеҷЁз•°еёё)гҖӮ`);
    }
    if (!res.ok || json.error) {
      const code = json.error && json.error.code;
      const sub = json.error && json.error.error_subcode;
      const msg = (json.error && json.error.message) || `HTTP ${res.status}`;
      const err = new Error(`${context}еӨұж•—(йҢҜиӘӨд»Јзўј ${code || res.status}${sub ? "/" + sub : ""}):${msg}`);
      err.code = code;
      err.subcode = sub;
      throw err;
    }
    return json;
  }

  // зөұдёҖеҢ…иЈқгҖҢжү“ API + и§ЈжһҗеӣһжҮүгҖҚ,йҒҮеҲ° Meta йӮЈйӮҠеӣһеӮізҡ„жҡ«жҷӮжҖ§йҢҜиӘӨжҷӮ,иҮӘеӢ•зӯүдёҖдёӢйҮҚи©Ұ,дёҚз”ЁдҪҝз”ЁиҖ…жүӢеӢ•еҶҚжҢүдёҖж¬ЎгҖӮ
  // йҢҜиӘӨд»Јзўј 1(еҗ«еҗ„зЁ® subcode,дҫӢеҰӮ 1/99)и·ҹ 2 йғҪжҳҜ Meta е®ҳж–№ж–Үд»¶иЈЎеҲ—зӮәгҖҢе»әиӯ°зӣҙжҺҘйҮҚи©ҰгҖҚзҡ„жҡ«жҷӮжҖ§йҢҜиӘӨ,
  // и·ҹж¬Ҡжқ–/еёіиҷҹ ID/ж¬Ҡйҷҗе®Ңе…Ёз„Ўй—ң,еёёиҰӢеҺҹеӣ жҳҜзҹӯжҷӮй–“е…§жү“еӨӘеӨҡж¬Ў API(дёҚз®ЎжҳҜдҪ иҮӘе·ұгҖҒеҗҢдәӢ,жҲ–иҮӘеӢ•еҗҢжӯҘеҗҢжҷӮеңЁи·‘)гҖӮ
  async function fetchGraphApi(url, context, retriesLeft = 2) {
    const res = await throttledFetch(url, context);
    try {
      return await parseApiResponse(res, context);
    } catch (e) {
      if ((e.code === 1 || e.code === 2) && retriesLeft > 0) {
        const waitMs = retriesLeft === 2 ? 3000 : 6000; // йҮҚи©Ұй–“йҡ”йҖҗж¬ЎжӢүй•·,зөҰ Meta йӮЈйӮҠжӣҙеӨҡе–ҳжҒҜжҷӮй–“
        await new Promise((r) => setTimeout(r, waitMs));
        return fetchGraphApi(url, context, retriesLeft - 1);
      }
      throw e;
    }
  }

  // жҹҘе»Је‘ҠеёіиҷҹиҮӘе·ұзҡ„жҷӮеҚҖ(и·ҹ UTC е·®е№ҫе°ҸжҷӮ),и®“гҖҢдёҠйҖұдёҖ~йҖұж—ҘгҖҚзҡ„ж—ҘжңҹзҜ„еңҚз…§йҖҷеҖӢеёіиҷҹиҮӘе·ұзҡ„жҷӮеҚҖеҺ»з®—,
  // иҖҢдёҚжҳҜз…§зҖҸиҰҪеҷЁжүҖеңЁзҡ„жҷӮеҚҖвҖ”вҖ”дёҚз„¶еёіиҷҹжҷӮеҚҖи·ҹзҖҸиҰҪеҷЁдёҚеҗҢзҡ„и©ұ,з®—еҮәдҫҶзҡ„йҖұе ұиЎЁеҚҖй–“жңғи·ҹ Meta еҫҢеҸ°зҡ„гҖҢдёҠйҖұгҖҚе°ҚдёҚиө·дҫҶ,
  // иҠұиІ»гҖҒиҪүе–®ж•ёгҖҒCPAгҖҒROAS е°ұжңғж•ҙжү№е…ңдёҚиө·дҫҶ(е°Өе…¶жҳҜйқ иҝ‘йҖұдёҖ/йҖұж—ҘдәӨз•Ңзҡ„йӮЈе№ҫзӯҶиіҮж–ҷ)гҖӮ
  // жҠ“дёҚеҲ°жҷӮеҚҖд№ҹдёҚи®“е®ғеҚЎдҪҸж•ҙеҖӢжөҒзЁӢ,зӣҙжҺҘйҖҖеӣһз”ЁзҖҸиҰҪеҷЁжҷӮеҚҖгҖӮ
  async function fetchAccountUtcOffset(token, accountId) {
    try {
      const json = await fetchGraphApi(
        `https://graph.facebook.com/v19.0/act_${accountId}?fields=timezone_offset_hours_utc&access_token=${encodeURIComponent(token)}`,
        "и®ҖеҸ–еёіиҷҹжҷӮеҚҖ"
      );
      return typeof json.timezone_offset_hours_utc === "number" ? json.timezone_offset_hours_utc : null;
    } catch {
      return null;
    }
  }

  function apiErrorHint(e) {
    const msg = (e && e.message) || "";
    if (e && (e.code === 1 || e.code === 2)) {
      return (
        "гҖӮйҖҷдёҚжҳҜдҪ зҡ„ж¬Ҡжқ–жҲ–еёіиҷҹ ID иЁӯе®ҡйҢҜиӘӨвҖ”вҖ”Meta е®ҳж–№жҠҠйҖҷзЁ®йҢҜиӘӨжӯёйЎһзӮәгҖҢжҡ«жҷӮжҖ§е•ҸйЎҢ,е»әиӯ°зӣҙжҺҘйҮҚи©ҰгҖҚ," +
        "еёёиҰӢеҺҹеӣ жҳҜзҹӯжҷӮй–“е…§е°ҚеҗҢдёҖеҖӢе»Је‘Ҡеёіиҷҹжү“еӨӘеӨҡж¬Ў API(еҸҜиғҪжҳҜдҪ иҮӘе·ұйҖЈзәҢжҢүдәҶеҘҪе№ҫж¬ЎгҖҒеҗҢдәӢеүӣеҘҪд№ҹеңЁеҗҢжҷӮй–“жҠ“еҗҢдёҖеҖӢе“ҒзүҢгҖҒ" +
        "жҲ–иҮӘеӢ•еҗҢжӯҘи·ҹжүӢеӢ•жҠ“еҸ–ж’һеңЁдёҖиө·),зі»зөұе·Із¶“иҮӘеӢ•йҮҚи©ҰйҒҺ,еҰӮжһңйӮ„жҳҜеӨұж•—,зӯү 1~2 еҲҶйҗҳеҶҚи©ҰдёҖж¬ЎйҖҡеёёе°ұжңғжҒўеҫ©гҖӮ"
      );
    }
    if (/too many calls/i.test(msg) || /80004/.test(msg) || /error_subcode 2446079/i.test(msg)) {
      return "гҖӮйҖҷжҳҜ Meta е»Је‘Ҡеёіиҷҹзҡ„е‘јеҸ«й »зҺҮйҷҗеҲ¶,дёҚжҳҜиЁӯе®ҡйҢҜиӘӨвҖ”вҖ”йҖҡеёёзӯү 5~15 еҲҶйҗҳеҶҚи©ҰдёҖж¬Ўе°ұжңғжҒўеҫ©,жү№ж¬ЎжҠ“еӨҡеҖӢе“ҒзүҢжҷӮе»әиӯ°дёҖж¬ЎдёҚиҰҒжҠ“еӨӘеӨҡеҖӢгҖӮ";
    }
    return "гҖӮи«ӢзўәиӘҚж¬Ҡжқ–жІ’йҒҺжңҹгҖҒе»Је‘Ҡеёіиҷҹ ID жӯЈзўә,дё”е·ІжҺҲж¬Ҡ ads_read ж¬ҠйҷҗгҖӮ";
  }

  // relaxThreshold=true(зӣ®еүҚеҸӘжңүгҖҢдёҠйҖұе ұиЎЁгҖҚжңғз”ЁеҲ°):зҜ©йҒёйҡҺж®өдёҚжңғжҺ’йҷӨжҺүгҖҢзӣ®еүҚйӮ„еңЁжҠ•ж”ҫдёӯгҖҚзҡ„е»Је‘Ҡ,
  // е°ұз®—йҖҷж”Ҝе»Је‘ҠйҖҷж®өжңҹй–“иҠұиІ»йӮ„жІ’еҲ° 500,еҸӘиҰҒзҸҫеңЁд»ҚеңЁжҠ•ж”ҫ,дёҖжЁЈжңғдҝқз•ҷдёӢдҫҶ,ж–№дҫҝзңӢеҲ°еүӣиө·жӯҘ/еӯёзҝ’дёӯзҡ„е»Је‘ҠгҖӮ
  // жңҲе ұиЎЁ(fetchOneBrandMonth)жІ’жңүеё¶йҖҷеҖӢеҸғж•ё,з¶ӯжҢҒеҺҹжң¬иҠұиІ» вүҘ 500 жүҚз•ҷдёӢзҡ„еҡҙж јй–ҖжӘ»гҖӮ
  async function fetchInsightsForRange(token, accountId, since, until, relaxThreshold = false) {
    const encToken = encodeURIComponent(token);
    const timeRange = encodeURIComponent(JSON.stringify({ since, until }));

    // 0) account currency
    let currency = "TWD";
    try {
      const curJson = await fetchGraphApi(`https://graph.facebook.com/v19.0/act_${accountId}?fields=currency&access_token=${encToken}`, "и®ҖеҸ–еёіиҷҹе№ЈеҲҘ");
      if (curJson.currency) currency = curJson.currency;
    } catch { /* fall back to TWD, this call isn't critical */ }

    // 1) per-ad performance for the month
    // й—ңйҚөеҸғж•ё use_account_attribution_setting=true:и®“йҖҷж¬Ў API е‘јеҸ«еҘ—з”ЁгҖҢйҖҷеҖӢе»Је‘ҠеёіиҷҹиҮӘе·ұеңЁ Meta еҫҢеҸ°иЁӯе®ҡзҡ„жӯёеӣ зӘ—еҸЈгҖҚ,
    // иҖҢдёҚжҳҜ API й җиЁӯзҡ„жӯёеӣ зӘ—еҸЈгҖӮеҰӮжһңжІ’жңүйҖҷеҖӢеҸғж•ё,API й җиЁӯзҡ„жӯёеӣ зӘ—еҸЈйҖҡеёёжҜ”еҫҢеҸ°йЎҜзӨәз”Ёзҡ„еҜ¬(дҫӢеҰӮжҠҠ 7 еӨ©е…§зҡ„й»һж“ҠгҖҒ
    // з”ҡиҮізҖҸиҰҪеҫҢеҫҲд№…жүҚзҷјз”ҹзҡ„иіјиІ·йғҪз®—йҖІдҫҶ),жңғе°ҺиҮҙиҪүе–®ж•ёжҜ” Meta еҫҢеҸ°йЎҜзӨәзҡ„гҖҢзөҗжһңгҖҚеӨҡеҮәеҘҪе№ҫеҖҚ,CPA иў«еҡҙйҮҚдҪҺдј°гҖҒ
    // ROAS иў«еҡҙйҮҚй«ҳдј°вҖ”вҖ”йҖҷжӯЈжҳҜйҖ жҲҗиҪүе–®ж•ёи·ҹеҫҢеҸ°ж•ёеӯ—е·®йқһеёёеӨҡеҖҚзҡ„ж №жң¬еҺҹеӣ ,дёҚжҳҜйҮҚиӨҮиЁҲз®—зҡ„е•ҸйЎҢгҖӮ
    let insightsUrl =
      `https://graph.facebook.com/v19.0/act_${accountId}/insights?level=ad&use_account_attribution_setting=true` +
      `&fields=ad_id,ad_name,spend,actions,action_values&time_range=${timeRange}&limit=500&access_token=${encToken}`;
    let rows = [];
    let page = 0;
    while (insightsUrl && page < 20) {
      const json = await fetchGraphApi(insightsUrl, "и®ҖеҸ–жҲҗж•ҲиіҮж–ҷ");
      rows = rows.concat(json.data || []);
      insightsUrl = json.paging && json.paging.next ? json.paging.next : null;
      page++;
    }

    if (!rows.length) {
      return { spend: 0, conversions: 0, revenue: 0, campaigns: 0, currency, accountId, ads: [] };
    }

    // 2) thumbnails + UTM tags + жҠ•ж”ҫзӢҖж…Ӣ + жүҖеұ¬иЎҢйҠ·жҙ»еӢ•,matched by ad_id (more reliable than name)
    // йҖҷдёҖжӯҘиҰҒж”ҫеңЁзҜ©йҒёй–ҖжӘ»гҖҢд№ӢеүҚгҖҚ,еӣ зӮә relaxThreshold жЁЎејҸйңҖиҰҒз”ЁжҠ•ж”ҫзӢҖж…ӢдҫҶжұәе®ҡиҰҒдёҚиҰҒж”ҫиЎҢдҪҺиҠұиІ»зҡ„е»Је‘ҠгҖӮ
    // еҸӘжҹҘгҖҢйҖҷж®өжңҹй–“зңҹзҡ„жңүиҠұиІ»зҙҖйҢ„гҖҚзҡ„е»Је‘Ҡ ID,дёҚиҰҒжҺғж•ҙеҖӢеёіиҷҹзҡ„жӯ·еҸІе»Је‘Ҡ,йҒҝе…Қи§ёзҷј Meta еёіиҷҹеұӨзҙҡзҡ„й »зҺҮйҷҗеҲ¶гҖӮ
    const periodAdIds = [...new Set(rows.map((r) => r.ad_id).filter(Boolean))];
    let thumbMap = {};
    let utmMap = {};
    let statusMap = {};
    let campaignMap = {};
    let startDateMap = {};
    const ID_CHUNK_SIZE = 50;
    for (let i = 0; i < periodAdIds.length; i += ID_CHUNK_SIZE) {
      const chunk = periodAdIds.slice(i, i + ID_CHUNK_SIZE);
      const filtering = encodeURIComponent(JSON.stringify([{ field: "id", operator: "IN", value: chunk }]));
      let adsUrl =
        `https://graph.facebook.com/v19.0/act_${accountId}/ads?fields=id,name,url_tags,effective_status,created_time,campaign{name},adset{start_time},creative{thumbnail_url,image_url,url_tags}` +
        `&filtering=${filtering}&limit=500&access_token=${encToken}`;
      let page2 = 0;
      while (adsUrl && page2 < 5) {
        const json = await fetchGraphApi(adsUrl, "и®ҖеҸ–е»Је‘Ҡжё…е–®");
        (json.data || []).forEach((ad) => {
          const thumb = ad.creative && (ad.creative.thumbnail_url || ad.creative.image_url);
          if (thumb) thumbMap[ad.id] = thumb;
          // жңүдәӣе»Је‘Ҡ(дҫӢеҰӮеӢ•ж…Ӣзҙ жқҗ/еһӢйҢ„йЎһе»Је‘Ҡ)зҡ„иҝҪи№ӨеҸғж•ёжҳҜиЁӯеңЁгҖҢеүөж„ҸгҖҚеұӨзҙҡ,дёҚжҳҜе»Је‘Ҡжң¬иә«,
          // жүҖд»Ҙе»Је‘Ҡжң¬иә«зҡ„ url_tags жҠ“дёҚеҲ°еҖјжҷӮ,еҶҚйҖҖеӣһеҺ»зңӢеүөж„Ҹеә•дёӢзҡ„ url_tagsгҖӮ
          const tags = ad.url_tags || (ad.creative && ad.creative.url_tags) || "";
          if (tags) utmMap[ad.id] = extractUtmValue(tags);
          statusMap[ad.id] = ad.effective_status || "UNKNOWN";
          if (ad.campaign && ad.campaign.name) campaignMap[ad.id] = ad.campaign.name;
          // жҠ•ж”ҫиө·е§ӢжҷӮй–“:е„Әе…Ҳз”Ёе»Је‘Ҡзө„еҗҲ(adset)жҺ’е®ҡзҡ„й–Ӣе§ӢжҷӮй–“,жңҖиІјиҝ‘еҜҰйҡӣй–Ӣе§ӢжҠ•ж”ҫзҡ„ж—Ҙжңҹ;
          // жҠ“дёҚеҲ°зҡ„и©ұ(дҫӢеҰӮиҲҠиіҮж–ҷгҖҒж¬ҠйҷҗйҷҗеҲ¶)йҖҖеӣһз”Ёе»Је‘Ҡжң¬иә«зҡ„е»әз«ӢжҷӮй–“,з•¶дҪңеӨ§жҰӮзҡ„еҸғиҖғгҖӮ
          const startRaw = (ad.adset && ad.adset.start_time) || ad.created_time || "";
          if (startRaw) startDateMap[ad.id] = startRaw;
        });
        adsUrl = json.paging && json.paging.next ? json.paging.next : null;
        page2++;
      }
    }

    // 3) е…Ҳз”ЁгҖҢе®Ңж•ҙгҖҒжңӘзҜ©йҒёгҖҚзҡ„иіҮж–ҷз®—зёҪиЁҲвҖ”вҖ”йҖҷжЁЈе»Је‘ҠиІ»/иҪүе–®ж•ё/иҪүе–®йҮ‘йЎҚжүҚжңғи·ҹ Meta еҫҢеҸ°зҡ„еёіиҷҹзёҪиҰҪж•ёеӯ—е®Ңе…ЁдёҖиҮҙгҖӮ
    // еҫҢеҸ°зҡ„зёҪиЁҲжҳҜжҠҠи©Іжңҹй–“гҖҢжүҖжңүгҖҚе»Је‘ҠйғҪз®—йҖІеҺ»,дёҚжңғеӣ зӮәжҹҗж”Ҝе»Је‘ҠиҠұиІ»еҫҲе°Ҹе°ұдёҚиЁҲе…Ҙ;
    // еҰӮжһңеҸӘеҠ зёҪгҖҢиҠұиІ» вүҘ 500гҖҚзҡ„е»Је‘Ҡ,зёҪиЁҲе°ұжңғжҜ”еҫҢеҸ°еҜҰйҡӣж•ёеӯ—е°‘,CPA/ROAS д№ҹжңғи·ҹи‘—еӨұзңҹгҖӮ
    let totalSpend = 0, totalConv = 0, totalRev = 0;
    rows.forEach((row) => {
      totalSpend += parseFloat(row.spend) || 0;
      totalConv += pickPurchaseValue(row.actions);
      totalRev += pickPurchaseValue(row.action_values);
    });

    // иҠұиІ»й–ҖжӘ»еҸӘз”ЁдҫҶжұәе®ҡгҖҢе»Је‘ҠжҳҺзҙ°еҲ—иЎЁгҖҚиҰҒдёҚиҰҒйЎҜзӨәйҖҷж”Ҝе»Је‘Ҡ(йҒҝе…Қжё…е–®иў«еӨ§йҮҸиҠұиІ»еҫҲе°‘зҡ„жё¬и©Ұе»Је‘Ҡжҙ—зүҲ),
    // дёҚжңғеҶҚеҪұйҹҝдёҠйқўзҡ„зёҪиЁҲж•ёеӯ—гҖӮ
    const detailRows = rows.filter((row) => {
      const spend = parseFloat(row.spend) || 0;
      if (spend >= MIN_FETCH_SPEND) return true;
      if (relaxThreshold && statusMap[row.ad_id] === "ACTIVE") return true;
      return false;
    });

    // 4) aggregate, merging ads that share the same UTM tag вҖ”вҖ” дҪҶгҖҢжҠ•ж”ҫдёӯгҖҚи·ҹгҖҢе·ІеҒңжӯўгҖҚзҡ„е»Је‘Ҡзө•е°ҚдёҚжңғеҗҲдҪөеңЁдёҖиө·,
    // еҚідҪҝ UTM иҝҪи№Өд»ЈзўјзӣёеҗҢ,еҸӘиҰҒзӣ®еүҚзҡ„жҠ•ж”ҫзӢҖж…ӢдёҚдёҖжЁЈ,е°ұжңғжӢҶжҲҗдёҚеҗҢзҡ„е…©еҲ—,йҒҝе…ҚиӘӨжҠҠе·Із¶“еҒңжҺүзҡ„иҲҠж•ёеӯ—и·ҹзҸҫеңЁйӮ„еңЁи·‘зҡ„ж··еңЁдёҖиө·зңӢгҖӮ
    const grouped = {};
    detailRows.forEach((row) => {
      const spend = parseFloat(row.spend) || 0;
      const conversions = pickPurchaseValue(row.actions);
      const revenue = pickPurchaseValue(row.action_values);

      const adName = row.ad_name || "(жңӘе‘ҪеҗҚе»Је‘Ҡ)";
      const utm = utmMap[row.ad_id] || "";
      const isActive = statusMap[row.ad_id] === "ACTIVE";
      const groupKey = (utm ? "utm:" + utm : "ad:" + row.ad_id) + "::" + (isActive ? "on" : "off");
      if (!grouped[groupKey]) {
        grouped[groupKey] = { utm, names: new Set(), image: "", spend: 0, conversions: 0, revenue: 0, active: isActive, campaigns: new Set(), adIds: new Set(), startDate: null };
      }
      const g = grouped[groupKey];
      g.names.add(adName);
      g.spend += spend; g.conversions += conversions; g.revenue += revenue;
      if (!g.image && thumbMap[row.ad_id]) g.image = thumbMap[row.ad_id];
      if (campaignMap[row.ad_id]) g.campaigns.add(campaignMap[row.ad_id]);
      if (row.ad_id) g.adIds.add(row.ad_id);
      // еҰӮжһңйҖҷеҖӢзҫӨзө„жҳҜеҗҲдҪөдәҶеҘҪе№ҫж”Ҝе»Је‘Ҡ(еҗҢдёҖеҖӢ UTM иҝҪи№Өд»Јзўј),жҠ•ж”ҫиө·е§ӢжҷӮй–“еҸ–гҖҢжңҖж—©гҖҚзҡ„йӮЈеҖӢ,
      // д»ЈиЎЁйҖҷеҖӢзҙ жқҗ/иҝҪи№Өд»ЈзўјжңҖеҲқжҳҜд»ҖйәјжҷӮеҖҷй–Ӣе§ӢжҠ•ж”ҫзҡ„гҖӮ
      const rowStart = startDateMap[row.ad_id];
      if (rowStart && (!g.startDate || rowStart < g.startDate)) g.startDate = rowStart;
    });

    const ads = Object.values(grouped)
      .map((g) => {
        const nameList = [...g.names];
        const adCount = nameList.length || 1;
        const name =
          nameList.length === 0
            ? g.utm || "жңӘе‘ҪеҗҚе»Је‘Ҡ"
            : nameList.length === 1
            ? nameList[0]
            : `${nameList[0]} зӯү ${nameList.length} ж”Ҝе»Је‘Ҡ`;
        const campaignList = [...g.campaigns];
        const campaign = campaignList.length ? campaignList.join(" / ") : "(жңӘеҲҶйЎһжҙ»еӢ•)";
        return {
          name, utm: g.utm, image: g.image, spend: g.spend, conversions: g.conversions, revenue: g.revenue,
          adCount, rawNames: nameList, active: g.active, campaign, adIds: [...g.adIds], startDate: g.startDate,
        };
      })
      .sort((a, b) => b.spend - a.spend);

    return { spend: totalSpend, conversions: totalConv, revenue: totalRev, campaigns: 0, currency, accountId, ads };
  }

  async function fetchLastWeekData() {
    if (!apiToken.trim() || !apiAccountId.trim()) {
      setApiError("и«ӢеЎ«е…ҘеӯҳеҸ–ж¬Ҡжқ–и·ҹе»Је‘Ҡеёіиҷҹ IDгҖӮ");
      return;
    }
    setApiError(null);
    setApiNotice(null);
    setWeekLoading(true);
    try {
      const cleanId = apiAccountId.trim().replace(/^act_/, "");
      const tzOffset = await fetchAccountUtcOffset(apiToken.trim(), cleanId);
      const info = getLastWeekRange(tzOffset);
      const record = await fetchInsightsForRange(apiToken.trim(), cleanId, info.since, info.until, true);
      const brandIdToUse = await ensureBrandRegistered(cleanId);
      await storage.set(weekKeyFor(brandIdToUse, info.weekStart), JSON.stringify(record));
      setActiveBrandId(brandIdToUse);
      setWeekInfo(info);
      await loadAllWeeks(brandIdToUse);
      setFocusWeek(info.weekStart);
      setViewMode("week");
      setApiNotice(`е·ІжҠ“еҲ°дёҠйҖұ(${info.since} ~ ${info.until})зҡ„иіҮж–ҷ,е…ұ ${record.ads.length} ж”Ҝе»Је‘ҠгҖӮ`);
      setShowApiPanel(false);
    } catch (e) {
      setApiError("жҠ“еҸ–еӨұж•—:" + e.message + apiErrorHint(e));
    } finally {
      setWeekLoading(false);
    }
  }

  // иҮӘеӢ•еӣһжәҜжҠ“еҸ–йҒҺеҺ» N йҖұ(йҖұдёҖ~йҖұж—Ҙ),дҫқеәҸдёҖйҖұдёҖйҖұжҠ“гҖҒдёӯй–“й–“йҡ” 4 з§’йҒҝе…Қи§ёзҷј Meta й »зҺҮйҷҗеҲ¶гҖӮ
  // жҜҸдёҖйҖұйғҪжҳҜзҚЁз«Ӣе‘јеҸ« fetchInsightsForRange,жүҖд»Ҙе°ұз®—жҹҗдёҖйҖұеӨұж•—,д№ҹдёҚжңғеҪұйҹҝе…¶д»–йҖұзҡ„зөҗжһңгҖӮ
  async function fetchRecentWeeksFromApi(weeksCount) {
    if (!apiToken.trim() || !apiAccountId.trim()) {
      setApiError("и«ӢеЎ«е…ҘеӯҳеҸ–ж¬Ҡжқ–и·ҹе»Је‘Ҡеёіиҷҹ IDгҖӮ");
      return;
    }
    setApiError(null);
    setApiNotice(null);
    setWeekLoading(true);
    setShowApiPanel(false);
    try {
      const cleanId = apiAccountId.trim().replace(/^act_/, "");
      const brandIdToUse = await ensureBrandRegistered(cleanId);
      const tzOffset = await fetchAccountUtcOffset(apiToken.trim(), cleanId);

      const progress = [];
      for (let w = 1; w <= weeksCount; w++) {
        const info = getLastWeekRange(tzOffset, w);
        progress.push({ id: "w" + w, name: `${info.since} ~ ${info.until}`, status: "pending", message: "" });
      }
      setBatchProgress(progress);

      let lastInfo = null, successCount = 0, errorCount = 0;
      for (let w = 1; w <= weeksCount; w++) {
        setBatchProgress((prev) => prev.map((p, idx) => (idx === w - 1 ? { ...p, status: "running" } : p)));
        try {
          const info = getLastWeekRange(tzOffset, w);
          const record = await fetchInsightsForRange(apiToken.trim(), cleanId, info.since, info.until, true);
          await storage.set(weekKeyFor(brandIdToUse, info.weekStart), JSON.stringify(record));
          lastInfo = info;
          successCount++;
          setBatchProgress((prev) =>
            prev.map((p, idx) => (idx === w - 1 ? { ...p, status: record.ads.length ? "done" : "empty", message: `${record.ads.length} ж”Ҝе»Је‘Ҡ` } : p))
          );
        } catch (e) {
          errorCount++;
          setBatchProgress((prev) => prev.map((p, idx) => (idx === w - 1 ? { ...p, status: "error", message: e.message } : p)));
        }
        if (w < weeksCount) await new Promise((r) => setTimeout(r, 4000));
      }

      setActiveBrandId(brandIdToUse);
      if (lastInfo) setWeekInfo(lastInfo);
      await loadAllWeeks(brandIdToUse);
      setViewMode("week");
      setApiNotice(`е·ІжҠ“еҸ–йҒҺеҺ» ${weeksCount} йҖұзҡ„иіҮж–ҷ:жҲҗеҠҹ ${successCount} йҖұ${errorCount > 0 ? `,еӨұж•— ${errorCount} йҖұ(еҸҜд»Ҙд№ӢеҫҢе–®зҚЁз”ЁгҖҢдёҠйҖұе ұиЎЁгҖҚжЁЎејҸиЈңжҠ“)` : ""}гҖӮ`);
    } catch (e) {
      setApiError("жҠ“еҸ–еӨұж•—:" + e.message + apiErrorHint(e));
    } finally {
      setWeekLoading(false);
    }
  }

  function computeWeekAnalysis(record) {
    if (!record) return [];
    const insights = [];
    const cpa = record.conversions > 0 ? record.spend / record.conversions : null;
    const roas = record.spend > 0 && record.revenue > 0 ? record.revenue / record.spend : null;

    if (roas !== null) {
      if (roas >= 3) insights.push(`ROAS ${roas.toFixed(2)}x,иЎЁзҸҫдёҚйҢҜ,е»Је‘ҠиҠұиІ»жңүжҸӣеӣһжҳҺйЎҜзҡ„зҮҹж”¶гҖӮ`);
      else if (roas >= 1.5) insights.push(`ROAS ${roas.toFixed(2)}x,иЎЁзҸҫжҷ®йҖҡ,йӮ„жңүе„ӘеҢ–з©әй–“гҖӮ`);
      else insights.push(`ROAS ${roas.toFixed(2)}x,еҒҸдҪҺ,е»әиӯ°жӘўиҰ–йҖҷйҖұиЎЁзҸҫе·®зҡ„е»Је‘ҠжҳҜеҗҰи©Ій—ңжҺүжҲ–иӘҝж•ҙзҙ жқҗгҖӮ`);
    } else {
      insights.push("йҖҷйҖұжІ’жңүиҪүжҸӣйҮ‘йЎҚиіҮж–ҷ,з„Ўжі•иЁҲз®— ROASгҖӮ");
    }

    if (cpa !== null) {
      insights.push(`е№іеқҮжҜҸзӯҶиЁӮе–®жҲҗжң¬(CPA)жҳҜ ${fmtMoney(cpa, record.currency)},иҪүе–®ж•ёе…ұ ${fmtInt(record.conversions)} зӯҶгҖӮ`);
    } else {
      insights.push("йҖҷйҖұжІ’жңүд»»дҪ•иҪүе–®,жӘўжҹҘдёҖдёӢе»Је‘ҠжҳҜеҗҰжӯЈеёёжҠ•ж”ҫдёӯгҖӮ");
    }

    const spendyAds = record.ads.filter((a) => a.spend >= 500);
    if (spendyAds.length) {
      const bestRoas = spendyAds
        .map((a) => ({ ...a, roasVal: a.spend > 0 && a.revenue > 0 ? a.revenue / a.spend : null }))
        .filter((a) => a.roasVal !== null)
        .sort((a, b) => b.roasVal - a.roasVal)[0];
      if (bestRoas) insights.push(`йҖҷйҖұиЎЁзҸҫжңҖеҘҪзҡ„е»Је‘ҠжҳҜгҖҢ${bestRoas.name}гҖҚ,ROAS жңү ${bestRoas.roasVal.toFixed(2)}xгҖӮ`);

      const badOnes = spendyAds.filter((a) => a.spend > 0 && (a.revenue <= 0 || a.revenue / a.spend < 1));
      if (badOnes.length) {
        insights.push(`жңү ${badOnes.length} ж”ҜиҠұиІ»и¶…йҒҺ 500 зҡ„е»Је‘Ҡ ROAS дҪҺж–ј 1x(зӯүж–јиҷ§йҢў),е»әиӯ°е„Әе…ҲжӘўжҹҘйҖҷдәӣе»Је‘ҠгҖӮ`);
      }
    }

    return insights;
  }

  // ---------- жҠ•ж”ҫдёӯе»Је‘ҠжҲҗж•ҲеҲҶйЎһ(жҲҗж•ҲеҘҪ / жҲҗж•ҲжӯЈеёё / жҲҗж•ҲдёҚеҘҪ / еӯёзҝ’дёӯ) ----------
  const LEARNING_MIN_CONVERSIONS = 10; // иҪүе–®ж•ёдёҚи¶і,йӮ„зңӢдёҚеҮәзңҹеҜҰжҲҗж•Ҳ,е…ҲжӯёйЎһзӮәгҖҢеӯёзҝ’дёӯгҖҚ
  const PERF_LABELS = { good: "жҲҗж•ҲеҘҪ", normal: "жҲҗж•ҲжӯЈеёё", poor: "жҲҗж•ҲдёҚеҘҪ", learning: "еӯёзҝ’дёӯ" };
  const PERF_COLORS = { good: "var(--green)", normal: "var(--blue)", poor: "var(--red)", learning: "var(--amber)" };
  const PERF_ORDER = ["good", "normal", "poor", "learning"];

  function classifyAdPerformance(ad) {
    if (ad.conversions < LEARNING_MIN_CONVERSIONS) return "learning";
    const roas = ad.spend > 0 && ad.revenue > 0 ? ad.revenue / ad.spend : null;
    if (roas === null) return "poor";
    if (roas >= 3) return "good";
    if (roas >= 1.5) return "normal";
    return "poor";
  }

  function groupAdsByPerformance(ads) {
    // йҖҷиЈЎж•…ж„ҸдёҚеҸӘзңӢгҖҢзӣ®еүҚжҠ•ж”ҫдёӯгҖҚзҡ„е»Је‘ҠвҖ”вҖ”иҠұиІ»и¶…йҒҺй–ҖжӘ»гҖҒе·Із¶“еҒңжӯўдҪҶиЎЁзҸҫдёҚеҘҪзҡ„е»Је‘Ҡ,
    // д№ҹжҮүи©Іи®“дҪ зңӢеҫ—еҲ°(дёҚз„¶гҖҢжҲҗж•ҲдёҚеҘҪгҖҚеҲҶйЎһж°ёйҒ жҳҜз©әзҡ„,е®№жҳ“иӘӨд»ҘзӮәжІ’жңүиЎЁзҸҫе·®зҡ„е»Је‘Ҡ)гҖӮ
    const qualifyingAds = (ads || []).filter((a) => a.spend >= MIN_AD_SPEND);
    const buckets = { good: [], normal: [], poor: [], learning: [] };
    qualifyingAds.forEach((ad) => {
      buckets[classifyAdPerformance(ad)].push(ad);
    });
    PERF_ORDER.forEach((k) => buckets[k].sort((a, b) => b.spend - a.spend));
    return { qualifyingAds, buckets };
  }

  // ---------- иЎҢйҠ·жҙ»еӢ•(campaign)ж•ҙй«”жҲҗж•ҲеҲҶжһҗ ----------
  function computeCampaignStats(ads) {
    const activeAds = (ads || []).filter((a) => a.active);
    const campaignMap = {};
    activeAds.forEach((ad) => {
      const key = ad.campaign || "(жңӘеҲҶйЎһжҙ»еӢ•)";
      if (!campaignMap[key]) campaignMap[key] = { name: key, spend: 0, conversions: 0, revenue: 0, adCount: 0 };
      const c = campaignMap[key];
      c.spend += ad.spend;
      c.conversions += ad.conversions;
      c.revenue += ad.revenue;
      c.adCount += 1;
    });
    return Object.values(campaignMap)
      .map((c) => ({
        ...c,
        cpa: c.conversions > 0 ? c.spend / c.conversions : null,
        roas: c.spend > 0 && c.revenue > 0 ? c.revenue / c.spend : null,
      }))
      .sort((a, b) => b.spend - a.spend);
  }

  function computeCampaignInsights(campaignStats, currencyCode) {
    if (!campaignStats.length) return ["зӣ®еүҚжІ’жңүеҒөжё¬еҲ°д»»дҪ•жҠ•ж”ҫдёӯзҡ„е»Је‘Ҡ,з„Ўжі•йҖІиЎҢиЎҢйҠ·жҙ»еӢ•еҲҶжһҗгҖӮ"];
    const insights = [];
    const totalSpend = campaignStats.reduce((s, c) => s + c.spend, 0);
    const totalConv = campaignStats.reduce((s, c) => s + c.conversions, 0);
    const totalRev = campaignStats.reduce((s, c) => s + c.revenue, 0);
    const overallRoas = totalSpend > 0 && totalRev > 0 ? totalRev / totalSpend : null;
    insights.push(
      `зӣ®еүҚжҠ•ж”ҫдёӯзҡ„жҙ»еӢ•е…ұ ${campaignStats.length} еҖӢ,зёҪиҠұиІ» ${fmtMoney(totalSpend, currencyCode)},иҪүе–® ${fmtInt(totalConv)} зӯҶ${overallRoas !== null ? `,ж•ҙй«” ROAS ${overallRoas.toFixed(2)}x` : ""}гҖӮ`
    );
    const withRoas = campaignStats.filter((c) => c.roas !== null);
    if (withRoas.length) {
      const best = withRoas.slice().sort((a, b) => b.roas - a.roas)[0];
      insights.push(`иЎЁзҸҫжңҖеҘҪзҡ„жҙ»еӢ•жҳҜгҖҢ${best.name}гҖҚ,ROAS жңү ${best.roas.toFixed(2)}xгҖӮ`);
      const worst = withRoas.slice().sort((a, b) => a.roas - b.roas)[0];
      if (worst.name !== best.name && worst.roas < 1.5) {
        insights.push(`иЎЁзҸҫијғејұзҡ„жҙ»еӢ•жҳҜгҖҢ${worst.name}гҖҚ,ROAS еҸӘжңү ${worst.roas.toFixed(2)}x,е»әиӯ°жӘўиҰ–еҸ—зңҫжҲ–зҙ жқҗгҖӮ`);
      }
    } else {
      insights.push("зӣ®еүҚжҠ•ж”ҫдёӯзҡ„жҙ»еӢ•йғҪйӮ„жІ’жңүи¶іеӨ зҡ„иҪүжҸӣйҮ‘йЎҚиіҮж–ҷ,е…ҲжҢҒзәҢи§ҖеҜҹгҖӮ");
    }
    const noDataCampaigns = campaignStats.filter((c) => c.conversions < LEARNING_MIN_CONVERSIONS);
    if (noDataCampaigns.length) {
      insights.push(`жңү ${noDataCampaigns.length} еҖӢжҙ»еӢ•иҪүе–®ж•ёйӮ„дёҚеҲ° ${LEARNING_MIN_CONVERSIONS} зӯҶ,еұ¬ж–јеӯёзҝ’дёӯйҡҺж®ө,е»әиӯ°еҶҚи§ҖеҜҹдёҖж®өжҷӮй–“еҶҚдёӢзөҗи«–гҖӮ`);
    }
    return insights;
  }

  // дҫқгҖҢиЎҢйҠ·жҙ»еӢ•еҗҚзЁұгҖҚжңҖеүҚйқўзҡ„жӢ¬иҷҹ(дҫӢеҰӮгҖҢгҖҗRSгҖ‘гҖҚгҖҢгҖҗAPгҖ‘гҖҚ)иҮӘеӢ•жӯёйЎһ,зөұиЁҲеҗ„з”ўе“Ғзҡ„зҮҹжҘӯйЎҚ/е»Је‘ҠиІ»дҪ”жҜ”иҲҮеҲ©жҪӨгҖӮ
  // з”ўе“Ғд»Јиҷҹе®Ңе…ЁдҫқеҜҰйҡӣиЎҢйҠ·жҙ»еӢ•еҗҚзЁұеӢ•ж…Ӣз”ўз”ҹвҖ”вҖ”ж–°еўһз”ўе“ҒжҷӮеҸӘиҰҒз…§еҗҢдёҖеҘ—е‘ҪеҗҚиҰҸеүҮе»әз«ӢиЎҢйҠ·жҙ»еӢ•,
  // дёҚйңҖиҰҒеңЁзі»зөұиЈЎжүӢеӢ•зҷ»иЁҳж–°з”ўе“Ғ,д»Јиҷҹе°ұжңғиҮӘеӢ•еҮәзҸҫеңЁеҲҶжһҗиЈЎгҖӮ
  function LedgerVsMetaComparison({ ads, currencyCode, ledgerAgg, onOpenImport, periodLabel }) {
    if (!ledgerAgg) {
      return (
        <div className="mal-empty">
          <p>йҖҷеҖӢ{periodLabel}йӮ„жІ’жңүеҢҜе…ҘеҫҢеҸ°зҡ„гҖҢжҜҸж—Ҙж”¶зӣҠиЎЁгҖҚ,жІ’иҫҰжі•жҜ”е°ҚеҫҢеҸ°еҜҰйҡӣжҘӯзёҫи·ҹ Meta еӣһе ұзҡ„иҗҪе·®гҖӮ</p>
          <button className="mal-btn mal-btn-primary" onClick={onOpenImport}>рҹ“Ҙ еҢҜе…ҘеҫҢеҸ°жҜҸж—Ҙж”¶зӣҠиЎЁ</button>
        </div>
      );
    }
    const metaBreak = buildProductBreakdown(ads || [], MIN_AD_SPEND);
    const metaByCode = {};
    metaBreak.rows.forEach((r) => { metaByCode[r.code] = r; });
    const codes = Array.from(new Set([...Object.keys(ledgerAgg.byCode), ...Object.keys(metaByCode)])).sort();
    let totalBackendRevenue = 0, totalMetaRevenue = 0, totalBackendSpend = 0, totalMetaSpend = 0;
    const rows = codes.map((code) => {
      const b = ledgerAgg.byCode[code];
      const m = metaByCode[code];
      const backendRevenue = b ? b.revenue : 0;
      const metaRevenue = m ? m.revenue : 0;
      const backendSpend = b ? b.spend : 0;
      const metaSpend = m ? m.spend : 0;
      totalBackendRevenue += backendRevenue; totalMetaRevenue += metaRevenue;
      totalBackendSpend += backendSpend; totalMetaSpend += metaSpend;
      const revGap = metaRevenue - backendRevenue;
      const revGapPct = backendRevenue > 0 ? (revGap / backendRevenue) * 100 : null;
      const spendGap = metaSpend - backendSpend;
      const spendGapPct = backendSpend > 0 ? (spendGap / backendSpend) * 100 : null;
      return { code, backendRevenue, metaRevenue, revGap, revGapPct, backendSpend, metaSpend, spendGap, spendGapPct, onlyBackend: !!b && !m, onlyMeta: !!m && !b };
    });
    const totalRevGap = totalMetaRevenue - totalBackendRevenue;
    const totalRevGapPct = totalBackendRevenue > 0 ? (totalRevGap / totalBackendRevenue) * 100 : null;
    const totalSpendGap = totalMetaSpend - totalBackendSpend;
    const totalSpendGapPct = totalBackendSpend > 0 ? (totalSpendGap / totalBackendSpend) * 100 : null;
    const onlyBackendCodes = rows.filter((r) => r.onlyBackend).map((r) => r.code);
    const onlyMetaCodes = rows.filter((r) => r.onlyMeta).map((r) => r.code);
    return (
      <>
        <div className="mal-cards" style={{ marginBottom: 18 }}>
          <div className="mal-card">
            <div className="mal-card-label">еҫҢеҸ°еҜҰйҡӣзҮҹж”¶</div>
            <div className="mal-card-value">{fmtMoney(totalBackendRevenue, currencyCode)}</div>
          </div>
          <div className="mal-card">
            <div className="mal-card-label">Meta еӣһе ұзҮҹж”¶</div>
            <div className="mal-card-value">{fmtMoney(totalMetaRevenue, currencyCode)}</div>
          </div>
          <div className="mal-card">
            <div className="mal-card-label">зҮҹж”¶иҗҪе·®</div>
            <div className="mal-card-value">{fmtMoney(totalRevGap, currencyCode)}</div>
            {totalRevGapPct !== null && <DeltaBadge value={totalRevGapPct} />}
          </div>
          <div className="mal-card">
            <div className="mal-card-label">е»Је‘ҠиІ»иҗҪе·®</div>
            <div className="mal-card-value">{fmtMoney(totalSpendGap, currencyCode)}</div>
            {totalSpendGapPct !== null && <DeltaBadge value={totalSpendGapPct} invert />}
          </div>
        </div>
        <div className="mal-scroll-wrap" style={{ overflowX: "auto" }}>
          <table className="mal-table mal-ledger-table">
            <thead>

  function PerformanceBreakdown({ ads, currencyCode, accountId }) {
    const { qualifyingAds, buckets } = groupAdsByPerformance(ads);
    // й җиЁӯе…ҲжҠҠжҜҸдёҖзө„ж”¶иө·дҫҶ(дёҚз„¶гҖҢжҲҗж•ҲеҘҪгҖҚеӢ•иј’дёҠзҷҫж”Ҝе»Је‘Ҡ,й ҒйқўжңғеҫҲй•·),
    // й»һеҚЎзүҮи·ійҒҺеҺ»зҡ„жҷӮеҖҷ,жүҚжҠҠи©Ізө„еұ•й–Ӣ,еҗҢжҷӮжҚІеӢ•йҒҺеҺ»гҖӮ
    const [collapsed, setCollapsed] = useState({ good: true, normal: true, poor: true, learning: true });

    useEffect(() => {
      function handleExpandAll() {
        setCollapsed({ good: false, normal: false, poor: false, learning: false });
      }
      window.addEventListener(PERF_EXPAND_ALL_EVENT, handleExpandAll);
      return () => window.removeEventListener(PERF_EXPAND_ALL_EVENT, handleExpandAll);
    }, []);

    if (!qualifyingAds.length) return null;

    function jumpToBucket(k) {
      if (!buckets[k].length) return;
      setCollapsed((prev) => ({ ...prev, [k]: false }));
      // зӯүеұ•й–ӢеҫҢ DOM й«ҳеәҰжӣҙж–°,еҶҚжҚІеӢ•,дҪҚзҪ®жүҚжңғжә–вҖ”вҖ”дёҚз„¶еҸҜиғҪжҚІеҲ°еұ•й–ӢеүҚзҡ„иҲҠдҪҚзҪ®гҖӮ
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const el = document.getElementById(`mal-perf-bucket-${k}`);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });
    }

    function toggleBucket(k) {
      setCollapsed((prev) => ({ ...prev, [k]: !prev[k] }));
    }

    return (
      <>
        <h2 className="mal-section-title">
          е»Је‘ҠжҲҗж•ҲеҲҶйЎһ<span className="mal-section-count">(иҠұиІ» вүҘ {MIN_AD_SPEND} зҡ„е»Је‘Ҡе…ұ {qualifyingAds.length} ж”Ҝ,еҗ«е·ІеҒңжӯў)</span>
