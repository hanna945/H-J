<style>
  :root {
    --paper: #F5F2EC;
    --paper-raised: #FFFFFF;
    --ink: #4A4744;
    --ink-soft: #9C978F;
    --rule: #E2DED5;
    --blue: #8A8479;
    --blue-deep: #6B6660;
    --green: #6B8F5C;
    --red: #A8607A;
    --amber: #CDA24A;
    --masthead-a: #EAE6DD;
    --masthead-b: #D9D3C7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Noto Sans TC', sans-serif; background: var(--paper); color: var(--ink);
    padding: 0 0 64px;
  }
  .mal-shell { max-width: 920px; margin: 0 auto; padding: 0 20px; }
  /* 滿版底色的標題區塊(韓系奶油淺色調質感)——跟 speedingscs repo 同一套手法。
     配色改成奶油/淺金漸層(不用深色底),第二輪根據回饋拿掉綠色調,主色改成淺玫瑰色。 */
  .mal-header {
    display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap;
    background: linear-gradient(160deg, var(--masthead-a), var(--masthead-b)); color: var(--ink);
    margin: 0 calc(-50vw + 50%) 26px; padding: 26px max(20px, calc(50vw - 460px + 20px)) 22px;
    border-bottom: 1px solid #E3CB98;
  }
  .mal-title-block { display: flex; align-items: center; gap: 14px; }
  .mal-stamp {
    width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0; font-size: 18px;
    display: flex; align-items: center; justify-content: center; color: #fff;
    background: #fff; overflow: hidden;
    box-shadow: 0 4px 14px rgba(74,63,53,0.14);
  }
  .mal-stamp img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .mal-title { font-family: 'Noto Serif KR', serif; font-weight: 700; font-size: 25px; margin: 0; letter-spacing: 0.01em; color: var(--ink); }
  .mal-subtitle { font-size: 12.5px; color: #8A7457; margin: 4px 0 0; letter-spacing: 0.01em; }
  .mal-btn {
    font-family: 'Noto Sans TC', sans-serif; font-weight: 600; font-size: 13px; border-radius: 10px; padding: 9px 16px;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--rule);
    background: var(--paper-raised); color: var(--ink); transition: all 0.15s ease; box-shadow: 0 1px 2px rgba(74,63,53,0.05);
  }
  .mal-btn:hover { background: #FFF9EC; border-color: var(--ink-soft); box-shadow: 0 3px 10px rgba(74,63,53,0.09); }
  .mal-btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .mal-btn-primary:hover { background: var(--blue-deep); border-color: var(--blue-deep); box-shadow: 0 4px 14px rgba(138,132,121,0.3); }
  .mal-btn-danger { background: transparent; border-color: var(--red); color: var(--red); }
  .mal-btn-danger:hover { background: #F3E4E9; box-shadow: none; }
  .mal-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  .mal-header .mal-btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .mal-notice { background: #EEF1E4; border: 1px solid #D8E0C8; color: #5C6B41; font-size: 13px; padding: 10px 16px; border-radius: 10px; margin-bottom: 16px; }
  .mal-error { background: #F3E4E9; border: 1px solid #E3C3D0; color: #8B4A63; font-size: 13px; padding: 10px 16px; border-radius: 10px; margin-bottom: 16px; }
  .mal-empty { border: 1.5px dashed var(--rule); border-radius: 16px; padding: 56px 24px; text-align: center; background: var(--paper-raised); }
  .mal-plan-savestatus { font-family: 'Noto Sans TC', sans-serif; font-weight: 400; font-size: 12px; color: var(--ink-soft); }
  .mal-plan-savestatus-error { color: var(--red); font-weight: 700; }
  .mal-empty p { color: var(--ink-soft); font-size: 14px; max-width: 440px; margin: 10px auto 20px; line-height: 1.6; }
  .mal-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 20px; }
  .mal-brand-switch { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .mal-brand-switch-label { font-size: 12.5px; color: var(--ink-soft); font-weight: 600; }
  .mal-brand-chip {
    font-size: 12.5px; padding: 6px 14px; border-radius: 999px; border: 1px solid var(--rule);
    background: var(--paper-raised); color: var(--ink-soft); cursor: pointer; white-space: nowrap; transition: all 0.15s ease;
  }
  .mal-brand-chip:hover { border-color: var(--blue); color: var(--ink); }
  .mal-brand-chip-active { border-color: var(--amber); color: #fff; background: var(--amber); font-weight: 600; }
  .mal-viewmode-switch { display: flex; gap: 6px; margin-bottom: 18px; background: #E9E1CE; padding: 5px; border-radius: 14px; width: fit-content; }
  .mal-viewmode-btn {
    font-family: 'Noto Serif KR', serif; font-weight: 500; font-size: 13.5px; padding: 8px 18px;
    border: none; border-radius: 10px; background: transparent; color: var(--ink-soft); cursor: pointer; transition: all 0.15s ease;
  }
  .mal-viewmode-btn-active { color: #fff; background: var(--blue); box-shadow: 0 2px 8px rgba(138,132,121,0.3); }
  .mal-week-box { background: var(--paper-raised); border: 1px solid var(--rule); border-radius: 16px; padding: 20px 22px 8px; margin-bottom: 28px; box-shadow: 0 2px 10px rgba(74,63,53,0.04); }
  .mal-week-title { margin-top: 0; border-bottom: 1px solid var(--rule); }
  .mal-week-analysis { margin: 14px 0 16px; }
  .mal-week-analysis-title { font-family: 'Noto Serif KR', serif; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
  .mal-week-analysis ul { margin: 0; padding-left: 20px; }
  .mal-week-analysis li { font-size: 13px; line-height: 1.7; color: var(--ink); margin-bottom: 4px; }
  .mal-tab { font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; padding: 7px 16px; border: 1px solid var(--rule); border-radius: 999px; background: var(--paper-raised); color: var(--ink-soft); cursor: pointer; white-space: nowrap; transition: all 0.15s ease; }
  .mal-tab-active { border-color: var(--blue); color: #fff; background: var(--blue); }
  .mal-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 26px; }
  .mal-card { background: var(--paper-raised); border: 1px solid var(--rule); border-radius: 16px; padding: 18px 20px; box-shadow: 0 2px 10px rgba(74,63,53,0.04); }
  .mal-card-label { font-size: 11.5px; color: var(--ink-soft); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .mal-card-value { font-family: 'IBM Plex Mono', monospace; font-size: 23px; font-weight: 600; margin: 8px 0 9px; }
  .mal-perf-card { display: block; width: 100%; text-align: left; font-family: inherit; cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .mal-perf-card:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(74,63,53,0.09); }
  .mal-perf-card:disabled { cursor: default; opacity: 0.5; }

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ---------- 共用儲存(Claude Artifact 的 window.storage):團隊資料共用,機密資料(API金鑰等)只留在自己瀏覽器 ----------
// 如果不是在 Claude Artifact 環境打開(例如直接把檔案存到電腦、用瀏覽器開啟),window.storage 不存在,
// 這時自動退回「本機儲存」模式,資料只存在自己瀏覽器,不會跨裝置同步——避免直接開檔案時整個當機。
const HAS_SHARED_STORAGE = typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
const LS_PREFIX = "ad-ledger::";
const localOnlyStorage = {
  async get(key) {
    const v = localStorage.getItem(LS_PREFIX + key);
    return v !== null ? { key, value: v } : null;
  },
  async set(key, value) {
    localStorage.setItem(LS_PREFIX + key, value);
    return { key, value };
  },
  async delete(key) {
    localStorage.removeItem(LS_PREFIX + key);
    return { key, deleted: true };
  },
  async list(prefix) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(LS_PREFIX + prefix)) keys.push(k.slice(LS_PREFIX.length));
    }
    return { keys };
  },
};
// 以下這些 key 存的是「報表資料/品牌設定」,大家看到的要是同一份,所以存到共用空間(shared: true)。
// Meta API 金鑰、帳號ID、記住金鑰的開關、自動同步設定、Shopline Worker 網址——這些是個人的登入憑證/個人設定,絕對不能共用,只存在自己瀏覽器(shared: false)。
// 這份檔案跟 speedingscs 那套系統不一樣:只有「後台每日收益表」(帳本)需要團隊共用,
// 其餘(Meta 廣告成效資料、品牌清單、CPA/廣告佔比門檻)維持原本各自瀏覽器本機儲存,不動既有行為、不擴大共用範圍。
// 這三個 key 雖然不是「metaads-」開頭的資料表 key,但邏輯上也應該全隊共用(不是個人瀏覽器設定):
// 品牌清單、CPA過高標準、廣告費佔比過高標準——你在自己電腦上設定的門檻,同事打開網頁應該要看到一樣的警示,
// 而不是各自要重新設一次。跟 speedingscs 那邊保持同一份清單。
const SHARED_EXACT_KEYS = new Set(["meta-api-brands", "meta-api-cpa-thresholds", "meta-api-adratio-thresholds", "meta-api-roas-targets", "meta-api-product-names"]);

// ---------- 團隊共用資料庫二號選擇:Cloudflare Pages Functions + KV ----------
// 如果這個網站不是在 Claude Artifact 裡打開(window.storage 不存在),就改試著打 /api/kv 這個後端
// (要搭配另外附上的 functions/api/kv 一起部署到 Cloudflare Pages 才會有作用)。
// 團隊密碼只存在使用者自己瀏覽器的 localStorage,不會經過共用資料庫,純粹是拿來認證每個裝置能不能讀寫。
const CLOUD_KV_BASE = "/api/kv";
const TEAM_KEY_STORAGE_KEY = "ad-ledger-team-key";
function getTeamKey() {
  try { return localStorage.getItem(TEAM_KEY_STORAGE_KEY) || ""; } catch { return ""; }
}
function setTeamKey(v) {
  try {
    if (v) localStorage.setItem(TEAM_KEY_STORAGE_KEY, v);
    else localStorage.removeItem(TEAM_KEY_STORAGE_KEY);
  } catch {}
}
function teamKeyHeaders() {
  const k = getTeamKey();
  return k ? { "X-Team-Key": k } : {};
}
// cloudStatus: "unknown"(還沒測)|"connected"(接得上)|"unauthorized"(接得上但密碼不對)|"unavailable"(沒有部署這個API,例如單純開檔案或還沒佈署Functions)
let cloudStatusCache = "unknown";
let credentialNameCache = ""; // 目前這組密碼對應的顯示名稱(依 Cloudflare 的 TEAM_CREDENTIALS 設定),沒有多身份設定時是空字串。
let credentialBrandsCache = null; // 這組密碼「自帶」的品牌清單([{id,name}, ...]),來自 TEAM_CREDENTIALS 本身;最高權限身份或沒設定多身份時是 null。
async function probeCloud(force) {
  if (cloudStatusCache !== "unknown" && !force) return cloudStatusCache;
  try {
    const res = await fetch(`${CLOUD_KV_BASE}/list?prefix=`, { headers: teamKeyHeaders() });
    if (res.status === 401) cloudStatusCache = "unauthorized";
    else if (res.ok) {
      cloudStatusCache = "connected";
      try {
        const j = await res.json();
        credentialNameCache = (j && j.credentialName) || "";
        credentialBrandsCache = (j && j.credentialBrands) || null;
      } catch { credentialNameCache = ""; credentialBrandsCache = null; }
    }
    else cloudStatusCache = "unavailable";
  } catch {
    cloudStatusCache = "unavailable";
  }
  return cloudStatusCache;
}
function getCredentialName() { return credentialNameCache; }
function getCredentialBrands() { return credentialBrandsCache; }
// 把「共用品牌清單」(meta-api-brands)跟「目前登入身份自帶的品牌清單」(如果 TEAM_CREDENTIALS 有設定 {id,name} 格式)合併成
// 最終可切換的品牌清單。身份自帶的清單優先排在前面,共用清單裡其他不在身份清單內的品牌(例如最高權限使用者額外存的常用品牌)接在後面。
function mergeCredentialBrands(cleanedSharedBrands) {
  const credBrands = getCredentialBrands();
  if (!credBrands || !credBrands.length) return cleanedSharedBrands;
  const byId = {};
  cleanedSharedBrands.forEach((b) => { byId[b.id] = b; });
  credBrands.forEach((b) => { if (!byId[b.id]) byId[b.id] = { id: b.id, name: b.name }; });
  const credIds = new Set(credBrands.map((b) => b.id));
  return [...credBrands.map((b) => byId[b.id]), ...cleanedSharedBrands.filter((b) => !credIds.has(b.id))];
}

const storage = {
  async get(key) {
    if (!isSharedKey(key)) return localOnlyStorage.get(key);
    if (HAS_SHARED_STORAGE) {
      try { return await window.storage.get(key, true); } catch { return null; }
    }
    if ((await probeCloud()) === "connected") {
      try { return await cloudStorage.get(key); } catch { /* 掉線就退回本機,不讓畫面壞掉 */ }
    }
    return localOnlyStorage.get(key);
  },
  async set(key, value) {
    if (!isSharedKey(key)) return localOnlyStorage.set(key, value);
    if (HAS_SHARED_STORAGE) return await window.storage.set(key, value, true);
    if ((await probeCloud()) === "connected") {
      try { return await cloudStorage.set(key, value); } catch { /* 掉線就退回本機 */ }
    }
    return localOnlyStorage.set(key, value);
  },
  async delete(key) {
    if (!isSharedKey(key)) return localOnlyStorage.delete(key);
    if (HAS_SHARED_STORAGE) {

    }
    if ((await probeCloud()) === "connected") {
      try { return await cloudStorage.delete(key); } catch {}
    }
    return localOnlyStorage.delete(key);
  },
  async list(prefix) {
    if (!isSharedKey(prefix)) return localOnlyStorage.list(prefix);
    if (HAS_SHARED_STORAGE) {
      try { const res = await window.storage.list(prefix, true); return res || { keys: [] }; } catch { return { keys: [] }; }
    }
    if ((await probeCloud()) === "connected") {
      try { return await cloudStorage.list(prefix); } catch {}
    }
    return localOnlyStorage.list(prefix);

};

// 「嚴格版」存讀——跟上面 storage.get/set 的差異是:連不上雲端/雲端回錯,這裡會直接把錯誤丟出去,
// 不會悄悄退回讀寫本機。給AI分析存檔這種「使用者會期待存到雲端、跨裝置看得到」的功能用。

// ---------- 後台「每日收益表」(.xlsx) 解析 ----------
// 檔案格式(依使用者提供的範例表單):每個分頁是一個月(例如「7月」),
// 第 1 列是各品牌/產品區塊的代號與名稱標題,第 2 列是每個區塊裡的欄位名稱(帳面營業額/平均客單價/廣告費/帳面利潤/稅後淨利),
// 第 3 列開始每一列是一天的資料,直到出現「總結」列為止。
// 每個產品區塊固定寬度 8 欄:[帳面營業額, 平均客單價, 廣告費, %, 帳面利潤, 稅後淨利, %, (空)]。
// 這個寬度與偏移量是從範例表單直接反推出來的——如果之後表單欄位順序有調整,這裡也要跟著更新。
// ⚠️ 這段解析邏輯同時存在另外兩個地方,三份要完全一致:
//    - H-J/functions/_shared/ledgerParser.js(後端 Pages Function,/api/sheets/sync 用)
//    - brand-report-cron-sync/src/ledgerParser.js(排程 Worker,每天自動同步用)
//   這裡改了,那两個檔案也要跟著手動同步改,不然三個入口(手動上傳xlsx / 網頁按同步 / 每天自動同步)
//   解析出來的資料會不一致。可以用 tools/check-ledger-parser-sync.js 這個腳本檢查三份是否還一致。
const LEDGER_PRODUCT_BLOCK_WIDTH = 8;
// LEDGER_PARSER_SYNC_CHECK:START —— tools/check-ledger-parser-sync.js 從這裡開始擷取,跟另外兩份比對,不要移除這行標記。
const LEDGER_PRODUCT_BLOCK_START_COL = 19; // 從 T 欄(0-indexed 19)開始才是「產品代號」區塊,前面 A-R 欄是總表與 FB 總花費
const LEDGER_MONTH_SHEET_RE = /^(\d{1,2})\s*月/;

function excelDateToISO(v) {
  if (v instanceof Date) {
    return `${v.getUTCFullYear()}-${String(v.getUTCMonth() + 1).padStart(2, "0")}-${String(v.getUTCDate()).padStart(2, "0")}`;
  }
  return null;
}

function toNum(v) {
  const n = typeof v === "number" ? v : parseFloat(v);
  return isFinite(n) ? n : 0;
}

// 解析單一分頁(一個月份)成 { monthKey, days: [...], productCodes: [...] }。
// year 由匯入時使用者指定(表單裡沒有年份資訊,只有分頁月份)。
function parseLedgerSheet(matrix, year) {
  if (!matrix || matrix.length < 3) return null;
  const row1 = matrix[0] || [];
  const row2 = matrix[1] || [];
  const blocks = [];
  // 不再寫死從T欄(index19)開始掃描——這個假設對某些品牌是錯的(例如宥凱的整體總表只到第8欄,
  // 產品代號第9欄就開始了,寫死19會把前面的代號整批跳過)。改成從第1欄開始逐欄掃描,
  // 但「帳面營業額」第一次出現一定是整體/全店總表本身(不是產品代號),要跳過不當成代號,
  // 從第二次出現開始才是真正的產品代號區塊——不管整體總表實際多寬,都能正確定位。
  let skippedOverall = false;
  for (let c = 1; c < Math.max(row1.length, row2.length); c += 1) {
    if ((row2[c] || "").toString().trim() === "帳面營業額") {
      if (!skippedOverall) { skippedOverall = true; continue; }
      const code = (row1[c] || "").toString().trim().toUpperCase();
      if (!code) continue;
      // 「平均客單價」「廣告費」「帳面利潤」「稅後淨利/實際利潤」都不用固定位移量推算在第幾欄,
      // 改成直接往右找寫著這些字的儲存格,用文字比對定位——避免某個代號剛好欄位排列跟其他代號
      // 不一樣時,固定位移量抓歪卻沒人發現。這裡不是理論上的假設:蝦皮、MOMO 這兩個代號實際上就是
      // 沒有「平均客單價」這一欄(行銷通路直接看訂單、沒有這個概念),導致後面的廣告費/利潤欄位
      // 整批往左遞補一格,固定位移量在這兩個代號上會直接抓錯欄。
      // 搜尋範圍限制在 c ~ c+11(11欄),超過這個範圍代表已經進到下一個代號的區塊,不能再往下找;
      // 真的找不到才退回原本的固定位移量當保底,不會整個欄位直接空著。
      const SEARCH_LIMIT = 12;
      let colAov = null;
      let colSpend = null;
      let colProfit = null;
      let colNetProfit = null;
      for (let k = c + 1; k < c + SEARCH_LIMIT; k++) {
        const label = (row2[k] || "").toString().trim();
        if (colAov === null && label === "平均客單價") colAov = k;
        // 廣告費/帳面利潤,原本用精確比對,MOMO、LINE禮物的欄名其實是「廣告費(平台抽成)」,
        // 門市、經銷的利潤欄名是「帳面利潤:扣貨物成本」「帳面利潤:貨物成本」這種帶冒號後綴的寫法,
        // 精確比對全部對不上、會落到後面的固定位移量保底(而保底位移量對這幾個代號來說是錯的,
        // 通常會抓到旁邊的百分比顯示欄,數字很小但不是0,不會被『沒資料』的判斷擋下來)。
        // 改成 startsWith,只要開頭是這幾個字就算數,涵蓋全部後綴變體。
        if (colSpend === null && label.startsWith("廣告費")) colSpend = k;
        if (colProfit === null && label.startsWith("帳面利潤")) colProfit = k;
        if (colNetProfit === null && (label === "稅後淨利" || label.startsWith("實際利潤") || label.startsWith("真實利潤"))) colNetProfit = k;
      }
      blocks.push({
        code,
        name: (row1[c + 1] || "").toString().trim(),
        colRevenue: c,
        colAov: colAov, // 找不到就是 null(蝦皮/MOMO本來就沒有這欄,orders 會算不出來,直接顯示 "—",不會硬套錯的欄位)
        colSpend: colSpend !== null ? colSpend : c + 2,
        colProfit: colProfit !== null ? colProfit : c + 4,
        colNetProfit: colNetProfit !== null ? colNetProfit : c + 6,
      });
    }
  }
  const days = [];
  let totalRow = null;
  for (let r = 2; r < matrix.length; r++) {
    const row = matrix[r] || [];
    const dateCell = row[0];
    if (dateCell instanceof Date) {
      const iso = excelDateToISO(dateCell);
      const overall = {
        revenue: toNum(row[1]), adSpend: toNum(row[2]), profit: toNum(row[4]),
        netProfit: toNum(row[7] !== undefined && row[7] !== null && row[7] !== "" ? row[7] : row[6]),
      };
      const byCode = {};
      blocks.forEach((b) => {
        const revenue = toNum(row[b.colRevenue]);
        const spend = toNum(row[b.colSpend]);
        const aov = toNum(row[b.colAov]);
        if (revenue === 0 && spend === 0) return; // 這天這個產品沒有資料,不建立空物件,避免污染平均值計算
        byCode[b.code] = {
          revenue, spend, aov,
          profit: toNum(row[b.colProfit]),
          netProfit: toNum(row[b.colNetProfit]),
          orders: aov > 0 ? revenue / aov : null,
        };
      });
      days.push({ date: iso, overall, byCode });
    } else if (typeof dateCell === "string" && dateCell.trim() === "總結") {
      const overall = {
        revenue: toNum(row[1]), adSpend: toNum(row[2]), profit: toNum(row[4]),
        netProfit: toNum(row[7] !== undefined && row[7] !== null && row[7] !== "" ? row[7] : row[6]),
      };
      const byCode = {};
      blocks.forEach((b) => {
        byCode[b.code] = {
          revenue: toNum(row[b.colRevenue]), spend: toNum(row[b.colSpend]),
          profit: toNum(row[b.colProfit]), netProfit: toNum(row[b.colNetProfit]),
        };
      });
      totalRow = { overall, byCode };
      break; // 「總結」之後是代言費、預估獲利等其他彙總列,不屬於逐日資料,停止解析
    }
  }
  if (!days.length) return null;
  return { days, monthTotal: totalRow, productCodes: blocks.map((b) => b.code) };
}

// 解析整份工作簿(可能包含 12 個月分頁),回傳 { [monthKey]: monthObject }。
function parseLedgerWorkbook(workbook, year) {
  const result = {};
  workbook.SheetNames.forEach((sheetName) => {
    const m = sheetName.match(LEDGER_MONTH_SHEET_RE);
    if (!m) return;
    const monthNum = parseInt(m[1], 10);
    if (!monthNum || monthNum < 1 || monthNum > 12) return;
    const sheet = workbook.Sheets[sheetName];
    const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null, raw: true });
    const parsed = parseLedgerSheet(matrix, year);
    if (parsed) {
      const monthKey = `${year}-${String(monthNum).padStart(2, "0")}`;
      result[monthKey] = { monthKey, year, month: monthNum, ...parsed };
    }
  });
  return result;
}

// 把後台每日資料彙總成指定期間(週或月,用 since ~ until 這種 ISO 日期字串)的總計,依產品代號分組。
// ledgerByMonth: { [monthKey]: monthObject },會自動跨月份撈資料,所以週報表算到跨月份的那一週也沒問題。
function aggregateLedgerRange(ledgerByMonth, sinceISO, untilISO) {
  const matchedDays = [];
  Object.values(ledgerByMonth || {}).forEach((mo) => {
    (mo.days || []).forEach((d) => {
      if (d.date && d.date >= sinceISO && d.date <= untilISO) matchedDays.push(d);
    });
  });
  if (!matchedDays.length) return null;
  const overall = { revenue: 0, adSpend: 0, profit: 0, netProfit: 0 };
  const byCode = {};
  matchedDays.forEach((d) => {
    overall.revenue += d.overall.revenue || 0;
    overall.adSpend += d.overall.adSpend || 0;
    overall.profit += d.overall.profit || 0;
    overall.netProfit += d.overall.netProfit || 0;
    Object.entries(d.byCode || {}).forEach(([code, v]) => {
      if (!byCode[code]) byCode[code] = { revenue: 0, spend: 0, profit: 0, netProfit: 0, orderEst: 0, hasOrderEst: true };
      byCode[code].revenue += v.revenue || 0;
      byCode[code].spend += v.spend || 0;
      byCode[code].profit += v.profit || 0;
      byCode[code].netProfit += v.netProfit || 0;
      if (v.orders !== null && v.orders !== undefined) byCode[code].orderEst += v.orders;
      else byCode[code].hasOrderEst = false;
    });
  });
  Object.values(byCode).forEach((v) => { v.aov = v.hasOrderEst && v.orderEst > 0 ? v.revenue / v.orderEst : null; });
  const hasAnyData = overall.revenue > 0 || overall.adSpend > 0 || Object.values(byCode).some((v) => v.revenue > 0 || v.spend > 0);
  if (!hasAnyData) return null;
  return { overall, byCode, dayCount: matchedDays.length, sinceISO, untilISO };
}

// ---------- Shopline 對照:儲存鍵值與輔助函式 ----------
// Shopline 資料不分品牌(一個商店對應所有廣告帳號),所以這裡的 key 不像 Meta 那樣帶品牌 id。
const SHOPLINE_WORKER_URL_KEY = "shopline-worker-url";
const SHOPLINE_WEEK_PREFIX = "shopline-week:";
const SHOPLINE_MONTH_PREFIX = "shopline-month:";
// Shopline 週/月資料併入共用範圍,這樣排程 Worker 背景抓回來寫進共用資料庫的資料,網頁打開就能直接讀到,
// 不用等使用者自己在瀏覽器裡按一次抓取。SHARED_PREFIXES 在更前面已經用 const 宣告過,這裡用 push 而不是重新賦值。
SHARED_PREFIXES.push(SHOPLINE_WEEK_PREFIX, SHOPLINE_MONTH_PREFIX);
const ADPERF_AI_WEEK_PREFIX = "adperf-ai-week:";
const ADPERF_AI_MONTH_PREFIX = "adperf-ai-month:";
SHARED_PREFIXES.push(ADPERF_AI_WEEK_PREFIX, ADPERF_AI_MONTH_PREFIX);
function shoplineWeekKey(weekStart) {

}
function shoplineMonthKey(monthKey) {

}

// 把 Date 物件格式化成 "YYYY-MM-DD"(用日曆上的年月日,不轉時區)
function fmtYmd(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

// 一週(週一到週日)的起訖日期字串,給 Shopline Worker 用
function weekRangeForShopline(weekStart) {
  const start = new Date(weekStart + "T00:00:00");
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  return { since: fmtYmd(start), until: fmtYmd(end) };
}

// 一個月的起訖日期字串,給 Shopline Worker 用
function monthRangeForShopline(monthKey) {
  const [y, m] = monthKey.split("-").map(Number);
  const start = new Date(y, m - 1, 1);
  const end = new Date(y, m, 0); // 該月最後一天
  return { since: fmtYmd(start), until: fmtYmd(end) };
}

// 把 Shopline 訂單依「utm_content(通常是 Meta 廣告 ID)」比對到對應的廣告,
// 比對不到的訂單(例如自然流量、直接輸入網址、UTM 是空的)歸到「unmatched」。
// 只計入已付款完成、且沒有被取消的訂單,比較貼近「實際入帳」的營收。
function matchShoplineOrdersToAds(shoplineOrders, ads) {
  const byAdKey = {};
  const unmatched = { revenue: 0, orderCount: 0 };
  const validOrders = (shoplineOrders || []).filter(
    (o) => o.paymentStatus === "completed" && o.status !== "cancelled"
  );
  validOrders.forEach((o) => {
    const contentId = o.utm && (o.utm.utm_content || o.utm.utm_term);
    const matchedAd = contentId
      ? (ads || []).find((ad) => (ad.adIds || []).map(String).includes(String(contentId)))
      : null;
    if (matchedAd) {
      const key = matchedAd.name + "::" + (matchedAd.adIds || []).join(",");
      if (!byAdKey[key]) byAdKey[key] = { ad: matchedAd, shoplineRevenue: 0, shoplineOrders: 0 };
      byAdKey[key].shoplineRevenue += o.amount;
      byAdKey[key].shoplineOrders += 1;
    } else {
      unmatched.revenue += o.amount;
      unmatched.orderCount += 1;
    }
  });
  const rows = Object.values(byAdKey)
    .map((r) => {
      const metaRevenue = r.ad.revenue || 0;
      const delta = r.shoplineRevenue - metaRevenue;
      const deltaPct = metaRevenue > 0 ? (delta / metaRevenue) * 100 : null;
      return { ...r, metaRevenue, delta, deltaPct };
    })
    .sort((a, b) => b.shoplineRevenue - a.shoplineRevenue);

}
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

// 把 Meta 回傳的投放起始時間(ISO 字串,例如 "2026-07-16T00:00:00+0800")格式化成「7/16」這種簡短格式。
// 直接用字串前面的年月日去解析,不透過 Date 物件轉時區,避免因為瀏覽器時區不同而讓日期跑掉一天。
function fmtStartDate(isoString) {
  if (!isoString) return "";
  const match = String(isoString).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!match) return "";
  const month = parseInt(match[2], 10);
  const day = parseInt(match[3], 10);
  return `${month}/${day}`;
}
// utcOffsetHours 是廣告帳號自己的時區(相對 UTC 的小時數,例如台北是 8)。
// Meta 後台顯示的「上週」是照廣告帳號本身設定的時區去算的,不是瀏覽器所在的時區——
// 如果沒有帶入帳號時區,就照舊用瀏覽器當下的時區(維持原本行為,通常也不會有問題)。
// weeksAgo:要抓「往前第幾個完整週」,1 = 上週(預設,跟原本行為一樣),2 = 上上週,以此類推,用來支援「自動回溯抓取過去幾週」。
function getLastWeekRange(utcOffsetHours, weeksAgo = 1) {
  const offsetMs = typeof utcOffsetHours === "number" ? utcOffsetHours * 3600000 : -new Date().getTimezoneOffset() * 60000;
  const ref = new Date(Date.now() + offsetMs);
  const day = ref.getUTCDay(); // 0 = Sun ... 6 = Sat
  const diffToThisMonday = day === 0 ? 6 : day - 1;
  const thisMonday = new Date(Date.UTC(ref.getUTCFullYear(), ref.getUTCMonth(), ref.getUTCDate() - diffToThisMonday));
  const targetMonday = new Date(thisMonday);
  targetMonday.setUTCDate(thisMonday.getUTCDate() - 7 * weeksAgo);
  const targetSunday = new Date(targetMonday);
  targetSunday.setUTCDate(targetMonday.getUTCDate() + 6);
  const fmtUtc = (d) => `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, "0")}-${String(d.getUTCDate()).padStart(2, "0")}`;
  return { since: fmtUtc(targetMonday), until: fmtUtc(targetSunday), weekStart: fmtUtc(targetMonday) };
}
// 把一批 Shopline 訂單(record.orders)依下單日期分組,算出每天的訂單數、原價營收、折扣金額、實收營收。
// 官網業績(H&J官網業績)的營收本來就是 Shopline 資料,不是 Google 試算表帳本,「每日報表」對這個品牌要看這份,不是空的帳本。
function groupShoplineOrdersByDay(orders) {
  const byDay = {};
  (orders || [])
    .filter((o) => o.paymentStatus === "completed" && o.status !== "cancelled")
    .forEach((o) => {
      const day = (o.createdAt || "").slice(0, 10);
      if (!day) return;
      if (!byDay[day]) byDay[day] = { date: day, orderCount: 0, grossRevenue: 0, discountAmount: 0, netRevenue: 0 };
      byDay[day].orderCount += 1;
      byDay[day].grossRevenue += o.subtotal || 0;
      byDay[day].discountAmount += o.discountAmount || 0;
      byDay[day].netRevenue += o.amount || 0;
    });
  return Object.values(byDay).sort((a, b) => (a.date < b.date ? 1 : -1));
}

const LEGACY_DEFAULT_BRAND_IDS = [

  { name: "H&J官網業績", id: "436280797192761" },

// 注意:這幾個 action_type 在 Meta 回傳的同一筆資料裡經常是「同一筆購買的不同算法」而不是彼此獨立的訂單,

// 組出直接跳轉到 Meta 廣告管理員、並選取這支(或這幾支合併的)廣告的連結。

function fbAdsManagerLink(accountId, adIds) {

// FB 前台(Meta 廣告檔案庫 Ad Library)的公開連結——不用登入、不用權限,任何人打開都看得到廣告實際呈現的樣子,
// 跟上面 fbAdsManagerLink 那個「後台管理頁」是兩回事。只對「還在投放中」的廣告顯示這個連結:
// 已停止的一般商業廣告(非政治類)在檔案庫裡不會留檔,連結打開會是空的。
// FB 前台(廣告底層的粉專貼文本身)的公開連結,取代原本連到 Meta 廣告檔案庫(Ad Library)、
// 但一般商業/電商廣告常常搜不到、點開會是空的做法。改用貼文的 effective_object_story_id

// 備用連結:當上面的 fbPostLink 生不出連結(這支廣告沒有對應到既有貼文,是直接用素材建立的

// 不是單一廣告ID)——只要同一批廣告資料裡任何一支能查到對應貼文,就能反推出粉專ID沿用,

function fbAdLibraryFallbackLink(pageId) {

// 從一批廣告資料裡,找出「任何一支」有 postId 的,取出粉專ID那一段——用來當同一批廣告裡

// 依「投放中 / 已停止」篩選廣告清單。若資料沒有狀態資訊(active 是 undefined),
// 選「全部」時一樣會顯示,但選「只看投放中」或「只看已停止」時會被排除,因為系統無法確認它屬於哪一種。
// 列印或匯出 PDF 前,會先發送這個事件,通知所有「廣告成效分類」區塊全部展開——
// 因為收合的區塊在收合狀態下完全沒有渲染 DOM,不這樣做的話,列印/PDF 會漏掉收合中的廣告明細。
const PERF_EXPAND_ALL_EVENT = "mal:expand-all-perf";

function filterAdsByStatus(ads, filter, keyword) {
  let result = ads || [];
  if (filter === "active") result = result.filter((a) => a.active === true);
  else if (filter === "inactive") result = result.filter((a) => a.active === false);
  const kw = (keyword || "").trim().toLowerCase();
  if (kw) {
    result = result.filter((a) => {
      const name = (a.name || "").toLowerCase();
      const campaign = (a.campaign || "").toLowerCase();
      const utm = (a.utm || "").toLowerCase();
      return name.includes(kw) || campaign.includes(kw) || utm.includes(kw);
    });
  }
  return result;
}

// 從「行銷活動名稱」(campaign,不是廣告名稱)最前面的括號解析出「產品代號」。
// 依實際 Meta 後台命名慣例,產品代號放在行銷活動名稱最前面,例如「【RS】A+SC｜價值｜圖+影｜空間噴霧｜CPA」
// 會解析成代號:RS;「【AP】A+SC｜價值｜業配｜圖文｜陳仙梅｜7/3」會解析成代號:AP。
// 產品可能隨時新增,只要行銷活動的命名規則不變(代號一律放在活動名稱最前面的【】或[]裡),
// 新代號就會自動被抓出來,不需要手動維護產品清單——如果活動名稱前面沒有括號代號,
// 會被歸類為「無法辨識」,不會硬套錯誤的分類。
function parseProductCode(campaignName) {
  if (!campaignName) return null;
  const m = campaignName.match(/^\s*[【\[]([^】\]]+)[】\]]/);
  return m ? m[1].trim().toUpperCase() : null;
}

// 括號裡如果是「測試」性質的活動(不是真正的產品),不當成產品代號——避免混進業績比例分析裡。
// 目前比對的關鍵字:test / 測試(不分大小寫),之後如果還有其他非產品用途的命名習慣,可以再加進這個清單。
const NON_PRODUCT_CODE_PATTERN = /test|測試/i;

// 依「產品代號」統計每個產品的營業額、廣告費、佔比與利潤,用來做業績比例分析(圓餅圖/表格)。
// 代號清單完全從實際資料裡動態產生,不是寫死的列表——新產品只要照命名規則建立行銷活動,就會自動出現在這裡。
// minSpend:花費低於這個門檻、又沒有轉單金額的廣告會被排除(避免資料量過大拖慢讀取),但會獨立計數方便對帳。
const AD_RATIO_CRITICAL_PCT = 30; // 廣告費佔比超過這個數字,不管有沒有設定門檻,一律標紅(比黃字警示更嚴重的等級)
// 移到頂層(原本定義在主元件裡面):跟speedingscs同一個理由,AdPerformanceReport是獨立的頂層元件,
// 沒辦法直接取用主元件內部定義的東西,移出來共用一份,不用複製一份重複維護。
const adPct = (spend, revenue, threshold) => {
  if (revenue <= 0) return "—";
  const pct = (spend / revenue) * 100;
  const isCritical = pct > AD_RATIO_CRITICAL_PCT;
  const isOverThreshold = !isCritical && threshold != null && pct > threshold; // 超過自訂門檻、但還沒到 30% 的中間警示等級
  const style = isCritical
    ? { color: "var(--red)", fontWeight: 700 }
    : isOverThreshold
    ? { color: "var(--amber)", fontWeight: 700 }
    : undefined;
  return (
    <span style={style}>
      {pct.toFixed(0)}%{isCritical ? " ‼" : isOverThreshold ? " ⚠" : ""}
    </span>
  );
};

function buildProductBreakdown(ads, minSpend) {
  const byCode = {};
  let unresolved = 0;
  let excludedTestCount = 0;
  let lowSpendCount = 0;
  let lowSpendAmount = 0;
  let totalRevenue = 0;
  let totalSpend = 0;
  (ads || []).forEach((ad) => {
    if (ad.spend < minSpend && !(ad.revenue > 0)) {
      lowSpendCount++;
      lowSpendAmount += ad.spend;
      return;
    }
    const code = parseProductCode(ad.campaign);
    if (!code) { unresolved++; return; }
    if (NON_PRODUCT_CODE_PATTERN.test(code)) { excludedTestCount++; return; }
    if (!byCode[code]) byCode[code] = { spend: 0, conversions: 0, revenue: 0, count: 0 };
    byCode[code].spend += ad.spend;
    byCode[code].conversions += ad.conversions;
    byCode[code].revenue += ad.revenue;
    byCode[code].count += 1;
    totalRevenue += ad.revenue;
    totalSpend += ad.spend;
  });
  const rows = Object.entries(byCode)
    .map(([code, v]) => ({
      code, ...v,
      profit: v.revenue - v.spend,
      revenueShare: totalRevenue > 0 ? (v.revenue / totalRevenue) * 100 : 0,
      spendShare: totalSpend > 0 ? (v.spend / totalSpend) * 100 : 0,
      costRatio: v.revenue > 0 ? (v.spend / v.revenue) * 100 : null,
    }))
    .sort((a, b) => b.revenue - a.revenue);
  return { rows, unresolved, excludedTestCount, lowSpendCount, lowSpendAmount, totalRevenue, totalSpend };
}

// 通路合併邏輯,AdPerformanceReport(投放成效)跟整體營運總表共用一份,不要各寫一份各自維護:
// Meta廣告(逐產品代號)算出來的rows,加上後台帳本裡「Meta沒有對應代號」的通路(蝦皮/MOMO/SHOPIFY/門市/經銷…)。
// 有花費的通路併入同一組rows一起排ROAS(channelRowsToMerge);沒花費的另外分開,不進ROAS排行
// (channelRevenueOnlyRows)。grandTotalRevenue/grandTotalSpend是「不管有沒有花費,全部通路都算進去」
// 的真正總數,給只需要看整體營收/淨利的地方用,不是ROAS導向的統計,所以不能直接拿 totalRevenue/totalSpend
// 那組(那組故意排除無花費通路,避免稀釋ROAS)。
function mergeChannelBreakdown(metaRows, metaTotalRevenue, metaTotalSpend, ledgerAgg) {
  const metaCodes = new Set(metaRows.map((r) => r.code));
  const channelRowsToMerge = [];
  const channelRevenueOnlyRows = [];
  if (ledgerAgg && ledgerAgg.byCode) {
    Object.entries(ledgerAgg.byCode).forEach(([code, v]) => {
      if (metaCodes.has(code)) return; // 這個代號 Meta 已經有資料,不重複算(帳面 vs Meta 落差另外由 LedgerVsMetaComparison 負責)
      // spend 門檻多一道「至少是營收1%」的保護,是因為帳本解析在少數欄位對不到文字時會退回固定位移量保底,
      // 保底偶爾會抓到旁邊的百分比顯示欄(數字很小但不是0),這裡避免那種雜訊被誤判成「有花費」。
      const hasRealSpend = v.spend > 0 && (!(v.revenue > 0) || v.spend >= v.revenue * 0.01);
      if (hasRealSpend) {
        channelRowsToMerge.push({
          code,
          spend: v.spend,
          revenue: v.revenue,
          conversions: v.hasOrderEst && v.orderEst > 0 ? Math.round(v.orderEst) : null,
          count: 0,
          isChannel: true,
        });
      } else if (v.revenue > 0 || v.spend > 0) {
        channelRevenueOnlyRows.push({ code, revenue: v.revenue, spend: v.spend || 0, profit: v.profit, netProfit: v.netProfit });
      }
    });
  }
  const mergedTotalRevenue = metaTotalRevenue + channelRowsToMerge.reduce((s, r) => s + r.revenue, 0);
  const mergedTotalSpend = metaTotalSpend + channelRowsToMerge.reduce((s, r) => s + r.spend, 0);
  const rows = [...metaRows, ...channelRowsToMerge]
    .map((r) => ({
      ...r,
      profit: r.revenue - r.spend,
      revenueShare: mergedTotalRevenue > 0 ? (r.revenue / mergedTotalRevenue) * 100 : 0,
      spendShare: mergedTotalSpend > 0 ? (r.spend / mergedTotalSpend) * 100 : 0,
      costRatio: r.revenue > 0 ? (r.spend / r.revenue) * 100 : null,
    }))
    .sort((a, b) => b.revenue - a.revenue);
  const grandTotalRevenue = mergedTotalRevenue + channelRevenueOnlyRows.reduce((s, r) => s + r.revenue, 0);
  const grandTotalSpend = mergedTotalSpend + channelRevenueOnlyRows.reduce((s, r) => s + (r.spend || 0), 0);
  return { rows, totalRevenue: mergedTotalRevenue, totalSpend: mergedTotalSpend, channelRowsToMerge, channelRevenueOnlyRows, grandTotalRevenue, grandTotalSpend };
}

// 從網址參數(url_tags / UTM 字串)裡取出「=」後面的那串值,用來判斷是不是同一個素材。
// 例如 "utm_medium=SR_FB_0309-CPA" -> "SR_FB_0309-CPA"。
// 如果同時有多組參數(用 & 分隔),只取第一組的值——因為廣告主通常只在其中一個參數放素材代碼。
function extractUtmValue(raw) {
  if (!raw) return "";
  const first = raw.split("&")[0] || raw;
  const eqIdx = first.indexOf("=");
  const value = eqIdx >= 0 ? first.slice(eqIdx + 1) : first;
  let decoded = value;
  try { decoded = decodeURIComponent(value); } catch { /* 保留原始值 */ }
  return decoded.trim();
}
function monthLabel(key) {
  const [y, m] = key.split("-");
  return `${y}/${m}`;
}
function monthDateRange(monthKey) {
  const [y, m] = monthKey.split("-").map(Number);
  const since = `${monthKey}-01`;
  const lastDay = new Date(Date.UTC(y, m, 0)).getUTCDate();
  const until = `${monthKey}-${String(lastDay).padStart(2, "0")}`;
  return { since, until };
}
// 週的 key 本身就是那一週的起始日(例如 "2026-06-29"),固定跨 7 天,加 6 天就是週末最後一天。
function weekDateRange(weekKey) {
  return { since: weekKey, until: addDaysISO(weekKey, 6) };
}
// 用 UTC 運算來加減天數,避免瀏覽器時區造成日期字串位移。
function addDaysISO(iso, days) {
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + days);
  return `${dt.getUTCFullYear()}-${String(dt.getUTCMonth() + 1).padStart(2, "0")}-${String(dt.getUTCDate()).padStart(2, "0")}`;
}
function fmtInt(n) { return Math.round(n).toLocaleString("zh-TW"); }
function fmtMoney(n, currency) {
  try {
    return new Intl.NumberFormat("zh-TW", { style: "currency", currency: currency || "TWD", maximumFractionDigits: 0 }).format(n);
  } catch { return `${currency || ""} ${fmtInt(n)}`; }
}
// 把 syncedAt 的 UTC ISO 字串轉成台灣時間顯示,格式跟畫面上其他日期欄位一致(YYYY/MM/DD HH:mm)。
function fmtSyncedAt(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d.getTime())) return null;
  const tw = new Date(d.getTime() + 8 * 3600 * 1000);
  const pad = (n) => String(n).padStart(2, "0");
  return `${tw.getUTCFullYear()}/${pad(tw.getUTCMonth() + 1)}/${pad(tw.getUTCDate())} ${pad(tw.getUTCHours())}:${pad(tw.getUTCMinutes())}`;
}
// 資料是「什麼時候抓的」提示,這個時間點是「最後一次成功呼叫 Meta API 的當下」,不是「資料涵蓋到哪一天」。
// 舊資料(這次修改之前就存在 KV 裡的)沒有這個欄位,顯示「—」而不是硬猜一個時間,避免誤導。
function SyncedAtNote({ iso }) {
  const text = fmtSyncedAt(iso);
  return (
    <p className="mal-synced-at">
      🕒 資料更新於:{text || "— (舊資料,尚無記錄;重新抓取後就會有)"}
    </p>
  );
}
function deriveMetrics(agg) {
  const cpa = agg.conversions > 0 ? agg.spend / agg.conversions : null;
  const roas = agg.spend > 0 && agg.revenue > 0 ? agg.revenue / agg.spend : null;
  return { ...agg, cpa, roas };
}
function pctChange(curr, prev) {
  if (prev === null || prev === undefined || prev === 0) return null;
  if (curr === null || curr === undefined) return null;
  return ((curr - prev) / prev) * 100;
}

function DeltaBadge({ value, invert = false }) {
  if (value === null || value === undefined || !isFinite(value)) {
    return <span className="mal-delta mal-delta-flat">—</span>;
  }
  const good = invert ? value < 0 : value > 0;
  const flat = Math.abs(value) < 0.05;
  const arrow = flat ? "→" : value > 0 ? "▲" : "▼";
  const cls = flat ? "mal-delta-flat" : good ? "mal-delta-good" : "mal-delta-bad";
  return <span className={`mal-delta ${cls}`}>{arrow} {Math.abs(value).toFixed(1)}%</span>;
}

// AI 生成的重點觀察裡,關鍵結論會用 **文字** 標記強調(對齊參考PDF範例裡加粗的效果)——
// 這裡把這種簡易 markdown 語法解析成真正的粗體,不是整段輸出 **字面上的星號**。
function renderBoldText(text) {
  const parts = String(text || "").split(/(\*\*[^*]+\*\*)/g);
  return parts.map((part, i) => {
    if (part.startsWith("**") && part.endsWith("**")) {
      return <strong key={i}>{part.slice(2, -2)}</strong>;
    }
    return part ? <React.Fragment key={i}>{part}</React.Fragment> : null;
  });
}

function AdThumb({ src, alt }) {
  const [errored, setErrored] = useState(false);
  if (!src || errored) return <div className="mal-thumb mal-thumb-fallback">🖼</div>;
  return <img src={src} alt={alt || "廣告預覽"} className="mal-thumb" onError={() => setErrored(true)} />;
}

// ---------- lightweight dependency-free charts ----------

function SimpleBarChart({ data, seriesA, seriesB, colorA, colorB, labelA, labelB, fmtA, fmtB }) {
  const w = 640, h = 200, padL = 6, padR = 6, padT = 10, padB = 26;
  const n = data.length;
  const groupW = (w - padL - padR) / n;
  const barW = Math.min(22, groupW * 0.28);
  const maxA = Math.max(1, ...data.map((d) => d[seriesA]));
  const maxB = Math.max(1, ...data.map((d) => d[seriesB]));
  return (
    <div>
      <div className="mal-chart-legend">
        <span><i className="mal-chart-dot" style={{ background: colorA }}></i>{labelA}</span>
        <span><i className="mal-chart-dot" style={{ background: colorB }}></i>{labelB}</span>
      </div>
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="200">
        <line x1={padL} y1={h - padB} x2={w - padR} y2={h - padB} stroke="#EAE2D6" />
        {data.map((d, i) => {
          const cx = padL + groupW * i + groupW / 2;
          const barH_A = ((h - padT - padB) * d[seriesA]) / maxA;
          const barH_B = ((h - padT - padB) * d[seriesB]) / maxB;
          return (
            <g key={i}>
              <rect x={cx - barW - 2} y={h - padB - barH_A} width={barW} height={barH_A} fill={colorA} rx="2">
                <title>{d.month}: {fmtA(d[seriesA])}</title>
              </rect>
              <rect x={cx + 2} y={h - padB - barH_B} width={barW} height={barH_B} fill={colorB} rx="2">
                <title>{d.month}: {fmtB(d[seriesB])}</title>
              </rect>
              <text x={cx} y={h - 8} textAnchor="middle" fontSize="11" fontFamily="IBM Plex Mono, monospace" fill="#9C9186">{d.month}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function SimpleLineChart({ data, seriesA, seriesB, colorA, colorB, labelA, labelB, fmtA, fmtB }) {
  const w = 640, h = 200, padL = 6, padR = 6, padT = 14, padB = 26;
  const n = data.length;
  const stepX = n > 1 ? (w - padL - padR) / (n - 1) : 0;
  const valsA = data.map((d) => d[seriesA]).filter((v) => v !== null && v !== undefined);
  const valsB = data.map((d) => d[seriesB]).filter((v) => v !== null && v !== undefined);
  const maxA = Math.max(1, ...valsA), minA = Math.min(0, ...valsA);
  const maxB = Math.max(1, ...valsB), minB = Math.min(0, ...valsB);
  const yA = (v) => h - padB - ((v - minA) / (maxA - minA || 1)) * (h - padT - padB);
  const yB = (v) => h - padB - ((v - minB) / (maxB - minB || 1)) * (h - padT - padB);
  const pathFor = (key, yf) => {
    let d = "";
    data.forEach((pt, i) => {
      const v = pt[key];
      if (v === null || v === undefined) return;
      const x = padL + stepX * i;
      d += (d ? " L " : "M ") + x + " " + yf(v);
    });
    return d;
  };
  return (
    <div>
      <div className="mal-chart-legend">
        <span><i className="mal-chart-dot" style={{ background: colorA }}></i>{labelA}</span>
        <span><i className="mal-chart-dot" style={{ background: colorB }}></i>{labelB}</span>
      </div>
      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="200">
        <line x1={padL} y1={h - padB} x2={w - padR} y2={h - padB} stroke="#EAE2D6" />
        <path d={pathFor(seriesA, yA)} fill="none" stroke={colorA} strokeWidth="2.5" />
        <path d={pathFor(seriesB, yB)} fill="none" stroke={colorB} strokeWidth="2.5" />
        {data.map((pt, i) => {
          const x = padL + stepX * i;
          return (
            <g key={i}>
              {pt[seriesA] !== null && pt[seriesA] !== undefined && (
                <circle cx={x} cy={yA(pt[seriesA])} r="3.2" fill={colorA}><title>{pt.month} {labelA}: {fmtA(pt[seriesA])}</title></circle>
              )}
              {pt[seriesB] !== null && pt[seriesB] !== undefined && (
                <circle cx={x} cy={yB(pt[seriesB])} r="3.2" fill={colorB}><title>{pt.month} {labelB}: {fmtB(pt[seriesB])}</title></circle>
              )}
              <text x={x} y={h - 8} textAnchor="middle" fontSize="11" fontFamily="IBM Plex Mono, monospace" fill="#9C9186">{pt.month}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

// 精選 24 色的色盤,色調跟整體「復古紙本」風格一致(用完才會開始用下面的演算法備援色)。
const DONUT_PALETTE = [
  "#6E8577", "#A8607A", "#BFA054", "#7C8B54", "#8E9AAF", "#C97B63",
  "#5B7F95", "#9B7EDE", "#D98B5F", "#4F8A7B", "#B85C7A", "#7D9471",
  "#8C6E4F", "#5E7A8C", "#A67B9E", "#7B9A6B", "#C08552", "#647A9E",
  "#9E7B6E", "#6B9A8C", "#B88CA6", "#8A9E5B", "#A65B6E", "#5B8AA6",
];

// 產品代號的數量沒有上限,色盤用完之後,用 HSL 色相環演算法自動生成新顏色(黃金角度旋轉,確保彼此夠好分辨),
// 而不是讓顏色從頭循環重複——避免產品一多,兩個不同代號被畫成同一個顏色而看不出差異。
function colorForIndex(i) {
  if (i < DONUT_PALETTE.length) return DONUT_PALETTE[i];
  const hue = (i * 137.508) % 360; // 黃金角度,讓色相盡量分散
  return `hsl(${hue.toFixed(0)}, 46%, 48%)`;
}

// ROAS 效率分級,四級跟參考範例(行銷週報 PDF)的圖例一致。
const ROAS_TIERS = [
  { min: 5, label: "優秀", color: "#3F7D4F" },
  { min: 3, label: "穩健", color: "#3D6B92" },
  { min: 2, label: "待優化", color: "#B8860B" },
  { min: 0, label: "低效", color: "#A8607A" },
];
function roasTier(roas) {
  if (roas === null || roas === undefined || !isFinite(roas)) return null;
  return ROAS_TIERS.find((t) => roas >= t.min) || ROAS_TIERS[ROAS_TIERS.length - 1];
}

function HorizontalBarChart({ data, formatValue }) {
  const max = Math.max(...data.map((d) => Math.max(0, d.value)), 0.0001);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
      {data.map((d) => (
        <div key={d.label} style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 96, fontSize: 12.5, fontWeight: 600, flexShrink: 0, textAlign: "right", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={d.label}>
            {d.label}
          </div>
          <div style={{ flex: 1, background: "#F0ECE2", borderRadius: 4, height: 20, position: "relative", minWidth: 60 }}>
            <div style={{ width: `${Math.max(2, Math.min(100, (Math.max(0, d.value) / max) * 100))}%`, background: d.color, height: "100%", borderRadius: 4, transition: "width 0.2s ease" }} />
          </div>
          <div style={{ width: 56, fontSize: 12, fontFamily: "IBM Plex Mono, monospace", flexShrink: 0 }}>
            {formatValue ? formatValue(d.value) : d.value}
          </div>
        </div>
      ))}
    </div>
  );
}

// 規則式自動摘要——不是真的 AI(Claude)生成的文字,是根據數字用固定規則組句子,
// 風格模仿範例報表的 🏆/⚠️/📌 條列重點,但本質是統計規則,不是語言模型理解數據後寫出來的。
// 如果之後要換成真的 Claude 生成的分析,需要後台設定 Anthropic API 金鑰,現在還沒有。
// 固定產出「剛好4條」,順序、角色固定(對齊參考的週報格式,也對齊 AI 版prompt的結構),
// 不是原本那種依條件增減的做法——AI 失敗時退回這版,畫面看起來的結構要跟AI版一致,不會忽長忽短。
function generateAutoInsights(rows, totalRevenue, totalSpend, roasTarget) {
  if (!rows.length) return [];
  const overallRoas = totalSpend > 0 ? totalRevenue / totalSpend : null;
  const withRoas = rows.filter((r) => r.spend > 0).map((r) => ({ ...r, roas: r.revenue / r.spend }));
  const sortedByRoas = [...withRoas].sort((a, b) => b.roas - a.roas);
  const best = sortedByRoas[0];
  const worst = sortedByRoas[sortedByRoas.length - 1];
  const highestSpend = [...rows].sort((a, b) => b.spend - a.spend)[0];

  const insights = [];
  insights.push({
    icon: "🏆",
    text: best ? `${best.code} ROAS ${best.roas.toFixed(2)}x,本期**效率最高的系列**。` : "本期沒有可計算 ROAS 的系列資料。",
  });
  insights.push({
    icon: "💪",
    text: overallRoas !== null
      ? `整體 ROAS ${overallRoas.toFixed(2)}x,${overallRoas >= roasTarget ? `**達標**(目標 ${roasTarget}x)` : `**未達標**(目標 ${roasTarget}x)`}。`
      : "本期沒有足夠花費計算整體 ROAS。",
  });
  insights.push({
    icon: "⚠️",
    text: worst && (!best || worst.code !== best.code)
      ? `${worst.code} ROAS ${worst.roas.toFixed(2)}x,相對**最需要留意**,建議檢視素材或調整預算。`
      : "本期各系列表現相對平均,沒有特別需要留意的落後系列。",
  });
  insights.push({
    icon: "📌",
    text: highestSpend ? `${highestSpend.code} 花費佔比最高(${highestSpend.spendShare.toFixed(1)}%),是**本期主要花費項目**。` : "本期沒有花費資料。",
  });
  return insights;
}

// 匯出「投放成效」報告成 Word 檔——用瀏覽器版的 docx 套件(CDN載入,不用後端),
// 圖表(長條圖)在 Word 裡不好還原,所以匯出版本只保留卡片數字、明細表格、圖例文字、自動摘要,
// 這些才是會議上真的要看/要編輯的內容,長條圖本身在畫面上看就好。
async function exportAdPerformanceToWord({ rows, totalRevenue, totalSpend, totalConversions, overallRoas, roasTarget, periodLabel, currencyCode, brandName, insights, productNames = {} }) {
  const D = window.docx;
  if (!D || !window.saveAs) {
    window.alert("Word 匯出套件還沒載入完成,請重新整理頁面再試一次。");
    return;
  }
  const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, HeadingLevel, ShadingType } = D;

  // Word 的 TextRun 不支援行內 markdown,把 **粗體** 標記拆成多段 TextRun,標記的部分給 bold:true。
  function boldTextRuns(text, size) {
    return String(text || "")
      .split(/(\*\*[^*]+\*\*)/g)
      .filter(Boolean)
      .map((part) =>
        part.startsWith("**") && part.endsWith("**")
          ? new TextRun({ text: part.slice(2, -2), size, bold: true })
          : new TextRun({ text: part, size })
      );
  }

  function cardCell(label, value) {
    return new TableCell({
      width: { size: 25, type: WidthType.PERCENTAGE },
      shading: { type: ShadingType.CLEAR, fill: "F7F5EF" },
      margins: { top: 120, bottom: 120, left: 150, right: 150 },
      children: [
        new Paragraph({ children: [new TextRun({ text: label, size: 18, color: "6B6459" })] }),
        new Paragraph({ children: [new TextRun({ text: value, size: 26, bold: true })] }),
      ],
    });
  }
  function headerCell(text) {
    return new TableCell({
      shading: { type: ShadingType.CLEAR, fill: "1F3A3D" },
      children: [new Paragraph({ children: [new TextRun({ text, color: "FFFFFF", bold: true, size: 18 })] })],
    });
  }
  function dataCell(text, color) {
    return new TableCell({
      children: [new Paragraph({ children: [new TextRun({ text, size: 18, ...(color ? { color: color.replace("#", ""), bold: true } : {}) })] })],
    });
  }

  const doc = new Document({
    sections: [
      {
        children: [
          new Paragraph({ heading: HeadingLevel.HEADING_1, text: `投放成效${periodLabel ? `(${periodLabel})` : ""}` }),
          ...(brandName ? [new Paragraph({ text: brandName, spacing: { after: 200 } })] : []),
          new Table({
            width: { size: 100, type: WidthType.PERCENTAGE },
            rows: [
              new TableRow({
                children: [
                  cardCell("總花費", fmtMoney(totalSpend, currencyCode)),
                  cardCell("總業績", fmtMoney(totalRevenue, currencyCode)),
                  cardCell("成交筆數", fmtInt(totalConversions)),
                  cardCell("整體 ROAS", overallRoas !== null ? `${overallRoas.toFixed(2)}x(目標 ${roasTarget}x)` : "—"),
                ],
              }),
            ],
          }),
          new Paragraph({ text: "", spacing: { after: 200 } }),
          new Table({
            width: { size: 100, type: WidthType.PERCENTAGE },
            rows: [
              new TableRow({ children: ["系列", "業績", "花費", "ROAS", "廣告佔比", "平均CPA", "成交數"].map(headerCell) }),
              ...rows.map((r) => {
                const roas = r.spend > 0 ? r.revenue / r.spend : null;
                const cpa = r.conversions > 0 ? r.spend / r.conversions : null;
                const tier = roasTier(roas);
                const adRatioText = r.revenue > 0 ? `${((r.spend / r.revenue) * 100).toFixed(0)}%` : "—";
                return new TableRow({
                  children: [
                    dataCell(productNames[r.code] ? `${r.code}(${productNames[r.code]})` : r.code),
                    dataCell(fmtMoney(r.revenue, currencyCode)),
                    dataCell(fmtMoney(r.spend, currencyCode)),
                    dataCell(roas !== null ? `${roas.toFixed(2)}x` : "—", tier && tier.color),
                    dataCell(adRatioText),
                    dataCell(cpa !== null ? fmtMoney(cpa, currencyCode) : "—"),
                    dataCell(r.conversions !== null && r.conversions !== undefined ? fmtInt(r.conversions) : "—"),
                  ],
                });
              }),
            ],
          }),
          new Paragraph({ text: "", spacing: { after: 100 } }),
          new Paragraph({
            children: [new TextRun({ text: "圖例:ROAS ≥5 優秀 / 3-5 穩健 / 2-3 待優化 / <2 低效", size: 16, color: "8A8478", italics: true })],
            spacing: { after: 300 },
          }),
          new Paragraph({ heading: HeadingLevel.HEADING_2, text: "自動摘要重點" }),
          new Paragraph({
            children: [new TextRun({ text: "(依統計規則產生,不是 AI 生成的分析文字)", size: 16, color: "8A8478", italics: true })],
            spacing: { after: 150 },
          }),
          ...insights.map(
            (ins) => new Paragraph({
              bullet: { level: 0 },
              spacing: { after: 80 },
              children: [new TextRun({ text: `${ins.icon} `, size: 20 }), ...boldTextRuns(ins.text, 20)],
            })
          ),
        ],
      },
    ],
  });

  const blob = await Packer.toBlob(doc);
  window.saveAs(blob, `投放成效報告${periodLabel ? `_${periodLabel}` : ""}.docx`);
}

// 整體營運總表:本期/上期總營收比較+總廣告費+總淨利(單純營收減廣告費,不扣其他成本),
// 加上平台/通路補充明細(SHOPIFY官網、蝦皮、MOMO、門市、經銷…這些「Meta廣告代號對不到」的通路各自的營收/廣告費/帳面利潤)。
// 跟 AdPerformanceReport(投放成效)不一樣的地方:那邊為了不稀釋ROAS,故意排除沒花費的通路;
// 這裡要看的是「公司整體做多少生意」,所以不管有沒有花費,全部通路都算進去(用 grandTotalRevenue/grandTotalSpend)。
function OverallOpsSummary({ ads, ledgerAgg, prevAds, prevLedgerAgg, periodLabel, prevPeriodLabel, roasTarget = 3, currencyCode, minSpend = 500 }) {
  const meta = buildProductBreakdown(ads || [], minSpend);
  const merged = mergeChannelBreakdown(meta.rows, meta.totalRevenue, meta.totalSpend, ledgerAgg);
  const { grandTotalRevenue, grandTotalSpend, channelRevenueOnlyRows, rows } = merged;

  if (grandTotalRevenue === 0 && grandTotalSpend === 0) return null; // 這期完全沒資料,不顯示整個區塊

  const netProfit = grandTotalRevenue - grandTotalSpend;

  let prevGrandTotalRevenue = null;
  if (prevAds || prevLedgerAgg) {
    const prevMeta = buildProductBreakdown(prevAds || [], minSpend);
    const prevMerged = mergeChannelBreakdown(prevMeta.rows, prevMeta.totalRevenue, prevMeta.totalSpend, prevLedgerAgg);
    if (prevMerged.grandTotalRevenue > 0 || prevMerged.grandTotalSpend > 0) prevGrandTotalRevenue = prevMerged.grandTotalRevenue;
  }
  const growthAmount = prevGrandTotalRevenue !== null ? grandTotalRevenue - prevGrandTotalRevenue : null;
  const growthPct = prevGrandTotalRevenue !== null && prevGrandTotalRevenue > 0 ? (growthAmount / prevGrandTotalRevenue) * 100 : null;

  // 狀態標籤:跟投放成效同一套邏輯(整體ROAS對目標的比例),維持全站判定方式一致。
  const overallRoas = grandTotalSpend > 0 ? grandTotalRevenue / grandTotalSpend : null;
  const ratio = overallRoas !== null && roasTarget > 0 ? overallRoas / roasTarget : null;
  const status = ratio === null ? null : ratio >= 1.5 ? "超標" : ratio >= 1 ? "優於目標" : "未達標";
  const statusColor = { 超標: "var(--blue)", 優於目標: "var(--green)", 未達標: "var(--red)" };
  const allTags = ["超出預算", "超標", "未達標", "優於目標"];

  // 平台/通路清單:Meta對不到代號的所有通路(有花費的+沒花費的合在一起),依營收排序。
  const allChannelRows = [
    ...rows.filter((r) => r.isChannel),
    ...channelRevenueOnlyRows,
  ].sort((a, b) => b.revenue - a.revenue);

  return (
    <div className="mal-ops-summary">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10, marginBottom: 4 }}>
        <h2 className="mal-section-title" style={{ marginBottom: 0 }}>整體營運{periodLabel ? `(${periodLabel})` : ""}</h2>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {allTags.map((tag) => (
            <span
              key={tag}
              style={{
                fontSize: 12.5, padding: "2px 10px", borderRadius: 999,
                fontWeight: tag === status ? 700 : 400,
                background: tag === status ? statusColor[tag] : "transparent",
                color: tag === status ? "#fff" : "var(--ink-soft)",
              }}
            >
              {tag}
            </span>
          ))}
        </div>
      </div>
      <div className="mal-cards" style={{ marginBottom: 18 }}>
        <div className="mal-card">
          <div className="mal-card-label">總營收{periodLabel ? `(${periodLabel})` : ""}</div>
          <div className="mal-card-value">{fmtMoney(grandTotalRevenue, currencyCode)}</div>
        </div>
        {prevGrandTotalRevenue !== null && (
          <div className="mal-card">
            <div className="mal-card-label">上期總營收{prevPeriodLabel ? `(${prevPeriodLabel})` : ""}</div>
            <div className="mal-card-value">{fmtMoney(prevGrandTotalRevenue, currencyCode)}</div>
            {growthPct !== null && (
              <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 4 }}>
                較上期{growthPct >= 0 ? "成長約" : "下降約"}{" "}
                <span style={{ color: growthPct >= 0 ? "var(--green)" : "var(--red)", fontWeight: 700 }}>{Math.abs(growthPct).toFixed(1)}%</span>
                ,{growthAmount >= 0 ? "增加了" : "減少了"} {fmtMoney(Math.abs(growthAmount), currencyCode)}
              </div>
            )}
          </div>
        )}
        <div className="mal-card">
          <div className="mal-card-label">總廣告費</div>
          <div className="mal-card-value">{fmtMoney(grandTotalSpend, currencyCode)}</div>
        </div>
        <div className={`mal-card ${netProfit >= 0 ? "mal-card-highlight-good" : ""}`}>
          <div className="mal-card-label">總淨利(扣除廣告費後)</div>
          <div className="mal-card-value">{fmtMoney(netProfit, currencyCode)}</div>
        </div>
      </div>

      {allChannelRows.length > 0 && (
        <>
          <h3 className="mal-section-title" style={{ fontSize: 15, marginBottom: 10 }}>
            平台／通路補充明細<span style={{ fontWeight: 400, fontSize: 11.5, color: "var(--ink-soft)", marginLeft: 6 }}>(後台帳本裡Meta廣告代號對不到的通路)</span>
          </h3>
          <div className="mal-scroll-wrap" style={{ overflowX: "auto" }}>
            <table className="mal-table">
              <thead>
                <tr><th>平台/通路</th><th>營收</th><th>廣告費</th><th>帳面利潤</th></tr>
              </thead>
              <tbody>
                {allChannelRows.map((r) => (
                  <tr key={r.code}>
                    <td>{r.code}</td>
                    <td>{fmtMoney(r.revenue, currencyCode)}</td>
                    <td>{r.spend > 0 ? fmtMoney(r.spend, currencyCode) : "—"}</td>
                    <td>{r.profit !== null && r.profit !== undefined ? fmtMoney(r.profit, currencyCode) : "—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

// 這支元件原本(另一個對話 session)漏掉了函式宣告那一行,只有內文沒有包起來,會直接造成語法錯誤。
// 補回宣告——這支元件寫在最外層(跟 roasTier/HorizontalBarChart/exportAdPerformanceToWord 同一層),
// 不在主 App 元件裡面,所以拿不到 brands/activeBrandId 這些畫面狀態,要透過 props 傳進來,不能用 closure 讀。
function AdPerformanceReport({ ads, currencyCode, periodLabel, roasTarget = 3, brands, activeBrandId, onEditRoasTarget, minSpend = 500, productNames = {}, onEditProductName, ledgerAgg = null, adRatioThreshold, storageKey }) {
  const displayName = (code) => (productNames[code] ? `${code}(${productNames[code]})` : code);
  const reportRef = useRef(null);
  const [aiInsights, setAiInsights] = useState(null); // null = 還沒生成過(或還在讀取雲端存檔中),顯示規則統計版當預設
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState("");
  const [isEditingInsights, setIsEditingInsights] = useState(false);
  const [rowJudgments, setRowJudgments] = useState({}); // { 代號: {icon, label} } AI生成的逐代號短判斷,跟insights同一次呼叫產生
  const [editText, setEditText] = useState("");
  const [aiSaveStatus, setAiSaveStatus] = useState("");
  // AI分析結果存到雲端,不然重新整理/換裝置就不見了,跟speedingscs同一套機制。
  useEffect(() => {
    if (!storageKey) return;
    let cancelled = false;
    (async () => {
      try {
        const res = await storageGetStrict(storageKey);
        if (cancelled || !res || !res.value) return;
        const saved = JSON.parse(res.value);
        if (saved.insights) setAiInsights(saved.insights);
        if (saved.rowJudgments) setRowJudgments(saved.rowJudgments);
      } catch {
        /* 沒有存檔或讀取失敗,維持預設(規則統計版) */
      }
    })();
    return () => { cancelled = true; };
  }, [storageKey]);
  async function persistAiState(nextInsights, nextJudgments) {
    if (!storageKey) return;
    setAiSaveStatus("儲存中…");
    try {
      await storageSetStrict(storageKey, JSON.stringify({ insights: nextInsights, rowJudgments: nextJudgments }));
      setAiSaveStatus("已儲存 ✓");
      setTimeout(() => setAiSaveStatus(""), 2000);
    } catch (e) {
      setAiSaveStatus(`⚠ 存檔失敗:${e.message || "未知錯誤"}`);
    }
  }
  const { rows: metaRows, totalRevenue: metaTotalRevenue, totalSpend: metaTotalSpend } = buildProductBreakdown(ads, minSpend);
  const { rows, totalRevenue, totalSpend, channelRevenueOnlyRows, grandTotalRevenue } =
    mergeChannelBreakdown(metaRows, metaTotalRevenue, metaTotalSpend, ledgerAgg);
  if (!rows.length && !channelRevenueOnlyRows.length) {
    return <p style={{ color: "var(--ink-soft)", fontSize: 13.5 }}>目前還沒有足夠的資料可以產生投放成效報告。</p>;
  }
  const totalConversions = rows.reduce((s, r) => s + (r.conversions || 0), 0);
  const overallRoas = totalSpend > 0 ? totalRevenue / totalSpend : null;
  const chartRows = [...rows].sort((a, b) => (b.spend > 0 ? b.revenue / b.spend : 0) - (a.spend > 0 ? a.revenue / a.spend : 0));
  const chartData = chartRows.map((r) => {
    const roas = r.spend > 0 ? r.revenue / r.spend : 0;
    const tier = roasTier(roas);
    return { label: r.code, value: roas, color: tier ? tier.color : "var(--ink-soft)" };
  });
  const insights = generateAutoInsights(rows, totalRevenue, totalSpend, roasTarget);
  const displayInsights = aiInsights || insights; // 生成過AI版本就顯示AI版,不然退回規則統計版,永遠有東西可以看。

  async function generateAiInsights() {
    setAiLoading(true);
    setAiError("");
    try {
      const res = await fetch("/api/ai/analysis", {
        method: "POST",
        headers: { "Content-Type": "application/json", ...teamKeyHeaders() },
        body: JSON.stringify({
          brandName: (brands.find((b) => b.id === activeBrandId) || {}).name || "",
          periodLabel,
          roasTarget,
          totals: { spend: totalSpend, revenue: totalRevenue, conversions: totalConversions, roas: overallRoas },
          rows: chartRows.map((r) => ({
            code: r.code,
            spend: r.spend,
            revenue: r.revenue,
            roas: r.spend > 0 ? r.revenue / r.spend : null,
            conversions: r.conversions,
            spendShare: r.spendShare,
          })),
        }),
      });
      const data = await res.json().catch(() => null);
      if (!res.ok || !data || data.error) throw new Error((data && data.error) || `狀態碼 ${res.status}`);
      if (!Array.isArray(data.insights) || !data.insights.length) throw new Error("AI 沒有回傳有效的分析內容。");
      setAiInsights(data.insights);
      setRowJudgments(data.rowJudgments || {});
      setIsEditingInsights(false);
      persistAiState(data.insights, data.rowJudgments || {});
    } catch (e) {
      setAiError(e.message || String(e));
    } finally {
      setAiLoading(false);
    }
  }

  function startEditingInsights() {
    setEditText(displayInsights.map((ins) => `${ins.icon || ""} ${ins.text || ""}`.trim()).join("\n"));
    setIsEditingInsights(true);
  }
  function saveEditedInsights() {
    const lines = editText.split("\n").map((l) => l.trim()).filter(Boolean);
    const parsed = lines.map((line) => {
      const m = line.match(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F?)\s*(.*)$/u);
      return m ? { icon: m[1], text: m[2] } : { icon: "📌", text: line };
    });
    setAiInsights(parsed);
    setIsEditingInsights(false);
    persistAiState(parsed, rowJudgments);
  }
  function editRowJudgment(code) {
    const current = rowJudgments[code];
    const input = window.prompt(
      `設定「${code}」的判斷標籤(格式建議:emoji + 短標籤,例如「🟢 主力成交」「🔴 成本偏高,需重做素材」)。\n留空白會清除這個代號的判斷。`,
      current ? `${current.icon} ${current.label}` : ""
    );
    if (input === null) return;
    const trimmed = input.trim();
    if (!trimmed) {
      const updated = { ...rowJudgments };
      delete updated[code];
      setRowJudgments(updated);
      persistAiState(aiInsights, updated);
      return;
    }
    const m = trimmed.match(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F?)\s*(.*)$/u);
    const updated = { ...rowJudgments, [code]: m ? { icon: m[1], label: m[2] } : { icon: "🟢", label: trimmed } };
    setRowJudgments(updated);
    persistAiState(aiInsights, updated);
  }
  return (
    <div ref={reportRef} className="mal-ad-perf-report">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
        <h2 className="mal-section-title" style={{ marginBottom: 0 }}>
          投放成效{periodLabel ? `(${periodLabel})` : ""}
          {aiSaveStatus && (
            <span className={aiSaveStatus.startsWith("⚠") ? "mal-plan-savestatus mal-plan-savestatus-error" : "mal-plan-savestatus"}> · {aiSaveStatus}</span>
          )}
        </h2>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button className="mal-icon-btn" onClick={() => onEditRoasTarget && onEditRoasTarget(activeBrandId)}>
            ✎ ROAS目標
          </button>
          <button className="mal-icon-btn" onClick={generateAiInsights} disabled={aiLoading}>
            {aiLoading ? "🤖 生成中…" : "🤖 AI 分析"}
          </button>
          <button
            className="mal-icon-btn"
            onClick={() =>
              exportAdPerformanceToWord({
                rows, totalRevenue, totalSpend, totalConversions, overallRoas, roasTarget, periodLabel, currencyCode, insights: displayInsights,
                brandName: (brands.find((b) => b.id === activeBrandId) || {}).name || "",
                productNames,
              })
            }
          >
            📝 匯出 Word
          </button>
        </div>
      </div>
      {(() => {
        // 狀態標籤:比對整體ROAS對目標的比例,自動判定「超標/優於目標/未達標」——跟參考範例同一組標籤概念。
        // 「超出預算」這個標籤沒有對應的「預算上限」資料可以比對(現有資料只有實際花費,沒有預算目標本身),
        // 所以自動判定不會選到它,需要的話你自己看情況口頭補充,不強行套一個猜的結論上去。
        const ratio = overallRoas !== null && roasTarget > 0 ? overallRoas / roasTarget : null;
        const status = ratio === null ? null : ratio >= 1.5 ? "超標" : ratio >= 1 ? "優於目標" : "未達標";
        const statusColor = { 超標: "var(--blue)", 優於目標: "var(--green)", 未達標: "var(--red)" };
        const allTags = ["超出預算", "超標", "未達標", "優於目標"];
        return (
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", margin: "6px 0 4px" }}>
            {allTags.map((tag) => (
              <span
                key={tag}
                style={{
                  fontSize: 12.5,
                  padding: "2px 10px",
                  borderRadius: 999,
                  fontWeight: tag === status ? 700 : 400,
                  background: tag === status ? statusColor[tag] : "transparent",
                  color: tag === status ? "#fff" : "var(--ink-soft)",
                }}
              >
                {tag}
              </span>
            ))}
          </div>
        );
      })()}
      {aiError && (
        <p style={{ fontSize: 12, color: "var(--red)", margin: "8px 0 0" }}>
          AI 分析失敗:{aiError}(下面繼續顯示規則統計版,不影響其他功能)
        </p>
      )}
      <div className="mal-cards" style={{ marginBottom: 20 }}>
        <div className="mal-card">
          <div className="mal-card-label">總花費</div>
          <div className="mal-card-value">{fmtMoney(totalSpend, currencyCode)}</div>
        </div>
        <div className="mal-card">
          <div className="mal-card-label">總業績</div>
          <div className="mal-card-value">{fmtMoney(totalRevenue, currencyCode)}</div>
        </div>
        <div className="mal-card">
          <div className="mal-card-label">成交筆數</div>
          <div className="mal-card-value">{fmtInt(totalConversions)}</div>
        </div>
        <div className={`mal-card ${overallRoas !== null && overallRoas >= roasTarget ? "mal-card-highlight-good" : ""}`}>
          <div className="mal-card-label">整體 ROAS</div>
          <div className="mal-card-value">{overallRoas !== null ? `${overallRoas.toFixed(2)}x` : "—"}</div>
          <div style={{ fontSize: 11.5, color: "var(--ink-soft)", marginTop: 2 }}>目標 {roasTarget}x</div>
        </div>
      </div>

      <div style={{ marginBottom: 22 }}>
        <HorizontalBarChart data={chartData} formatValue={(v) => `${v.toFixed(1)}x`} />
      </div>

      <div className="mal-scroll-wrap" style={{ overflowX: "auto" }}>
        <table className="mal-table">
          <thead>
            <tr>
              <th>系列</th><th>業績</th><th>花費</th><th>ROAS</th><th>廣告佔比</th><th>平均CPA</th><th>成交數</th><th>判斷</th>
            </tr>
          </thead>
          <tbody>
            {chartRows.map((r) => {
              const roas = r.spend > 0 ? r.revenue / r.spend : null;
              const cpa = r.conversions > 0 ? r.spend / r.conversions : null;
              const tier = roasTier(roas);
              return (
                <tr key={r.code}>
                  <td
                    style={{ cursor: onEditProductName ? "pointer" : undefined }}
                    title={onEditProductName ? "點一下可以設定這個代號的顯示名稱" : undefined}
                    onClick={() => onEditProductName && onEditProductName(activeBrandId, r.code)}
                  >
                    {displayName(r.code)}
                  </td>
                  <td style={{ fontWeight: 700, fontSize: "1.08em" }}>{fmtMoney(r.revenue, currencyCode)}</td>
                  <td>{fmtMoney(r.spend, currencyCode)}</td>
                  <td style={tier ? { color: tier.color, fontWeight: 700 } : undefined}>{roas !== null ? `${roas.toFixed(2)}x` : "—"}</td>
                  <td>{adPct(r.spend, r.revenue, adRatioThreshold)}</td>
                  <td>{cpa !== null ? fmtMoney(cpa, currencyCode) : "—"}</td>
                  <td>{r.conversions !== null && r.conversions !== undefined ? fmtInt(r.conversions) : "—"}</td>
                  <td style={{ cursor: "pointer" }} title="點一下可以設定/編輯這個代號的判斷" onClick={() => editRowJudgment(r.code)}>
                    {rowJudgments[r.code] ? `${rowJudgments[r.code].icon} ${rowJudgments[r.code].label}` : <span style={{ color: "var(--ink-soft)", fontSize: 12 }}>+ 加判斷</span>}
                  </td>
                </tr>
              );
            })}
            <tr>
              <td className="mal-row-month">總計</td>
              <td className="mal-row-month">{fmtMoney(totalSpend, currencyCode)}</td>
              <td className="mal-row-month">{fmtMoney(totalRevenue, currencyCode)}</td>
              <td className="mal-row-month">{overallRoas !== null ? `${overallRoas.toFixed(2)}x` : "—"}</td>
              <td className="mal-row-month">{fmtInt(totalConversions)}</td>
              <td className="mal-row-month">{totalConversions > 0 ? fmtMoney(totalSpend / totalConversions, currencyCode) : "—"}</td>
              <td className="mal-row-month">100%</td>
              <td className="mal-row-month"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div className="mal-roas-legend">
        {ROAS_TIERS.map((t) => (
          <span key={t.label} className="mal-roas-legend-item">
            <i style={{ background: t.color }}></i>
            ROAS {t.label === "低效" ? "< 2" : t.label === "待優化" ? "2-3" : t.label === "穩健" ? "3-5" : "≥ 5"}({t.label})
          </span>
        ))}
      </div>

      {channelRevenueOnlyRows.length > 0 && (
        <>
          <h3 className="mal-section-title" style={{ fontSize: 15, marginTop: 22, marginBottom: 10 }}>
            🏪 其他通路<span style={{ fontWeight: 400, fontSize: 11.5, color: "var(--ink-soft)", marginLeft: 6 }}>(後台帳本沒有廣告費欄位,只列業績,不進上面的ROAS排行)</span>
          </h3>
          <div className="mal-scroll-wrap" style={{ overflowX: "auto" }}>
            <table className="mal-table">
              <thead>
                <tr><th>通路</th><th>業績</th><th>業績佔比</th><th>帳面利潤</th><th>真實利潤</th></tr>
              </thead>
              <tbody>
                {[...channelRevenueOnlyRows].sort((a, b) => b.revenue - a.revenue).map((r) => (
                  <tr key={r.code}>
                    <td>{r.code}</td>
                    <td>{fmtMoney(r.revenue, currencyCode)}</td>
                    <td>{grandTotalRevenue > 0 ? ((r.revenue / grandTotalRevenue) * 100).toFixed(1) : "0.0"}%</td>
                    <td>{r.profit !== null && r.profit !== undefined ? fmtMoney(r.profit, currencyCode) : "—"}</td>
                    <td>{r.netProfit !== null && r.netProfit !== undefined ? fmtMoney(r.netProfit, currencyCode) : "—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      )}

      {displayInsights.length > 0 && (
        <div className="mal-insight-box">
          <div className="mal-insight-box-title">
            📋 重點觀察
            <span style={{ fontWeight: 400, fontSize: 11, color: "var(--ink-soft)" }}>
              ({aiInsights ? "AI 生成" : "規則統計產生,非 AI 生成文字"})
            </span>
            <button
              className="mal-icon-btn"
              style={{ marginLeft: "auto", fontSize: 11, padding: "3px 10px" }}
              onClick={() => (isEditingInsights ? saveEditedInsights() : startEditingInsights())}
            >
              {isEditingInsights ? "💾 儲存" : "✎ 編輯"}

function DonutChart({ data, size = 176, thickness = 30 }) {
  const total = data.reduce((s, d) => s + Math.max(0, d.value), 0);
  const r = size / 2;
  const rInner = r - thickness;
  const toXY = (deg, radius) => {
    const rad = ((deg - 90) * Math.PI) / 180;
    return [r + radius * Math.cos(rad), r + radius * Math.sin(rad)];
  };
  function arcPath(startDeg, sweepDeg) {
    if (sweepDeg <= 0) return "";
    const endDeg = Math.min(startDeg + sweepDeg, startDeg + 359.999);
    const large = sweepDeg > 180 ? 1 : 0;
    const [x1, y1] = toXY(startDeg, r);
    const [x2, y2] = toXY(endDeg, r);
    const [x3, y3] = toXY(endDeg, rInner);
    const [x4, y4] = toXY(startDeg, rInner);
    return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${rInner} ${rInner} 0 ${large} 0 ${x4} ${y4} Z`;
  }
  let angle = 0;
  const arcs = data.map((d) => {
    const value = Math.max(0, d.value);
    const frac = total > 0 ? value / total : 0;
    const start = angle;
    const sweep = frac * 360;
    angle += sweep;
    return { ...d, start, sweep, frac };
  });
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
      {arcs.filter((a) => a.sweep > 0).map((a, i) => (
        <path key={i} d={arcPath(a.start, a.sweep)} fill={a.color}>
          <title>{a.label}：{(a.frac * 100).toFixed(1)}%</title>
        </path>
      ))}
      <circle cx={r} cy={r} r={rInner - 1} fill="var(--paper-raised)" />
    </svg>
  );
}

  // 把訂單的 utm 物件整理成一句話說明「這筆訂單從哪裡來的」,沒有 utm 資料就視為直接流量/非廣告帶來的訂單。
  function formatOrderSource(utm) {
    if (!utm || Object.keys(utm).length === 0) return "直接流量 / 無 UTM";
    const parts = [utm.utm_source, utm.utm_medium, utm.utm_campaign, utm.utm_content, utm.utm_term].filter(Boolean);
    return parts.length ? parts.join(" / ") : "有 UTM 但欄位皆為空";
  }

  // 把各種技術性的失敗原因(網路錯誤、JSON 解析失敗、Worker 狀態碼、Meta 頻率限制等)
  // 轉成看得懂的中文說明。原始技術訊息還是會印在瀏覽器 console 裡,真的要除錯可以按 F12 查看,
  // 但畫面上只顯示一般人看得懂的話。
  function friendlyMetaError(e) {
    console.error("[抓取失敗的原始錯誤]", e);
    const msg = String((e && e.message) || e || "");

    if (/正在更新|請稍等|請稍候/i.test(msg)) {
      return "目前有其他人正在更新同一個廣告帳號的資料,系統會自動重試,請稍候。";
    }
    if (
      /too many calls/i.test(msg) ||
      /rate.?limit/i.test(msg) ||
      /80004/.test(msg) ||
      /error_subcode 2446079/i.test(msg) ||
      (e && (e.code === 1 || e.code === 2))
    ) {
      return "太多人同時在抓取這個廣告帳號,Meta 暫時限制了存取。這不是設定錯誤,通常等 1~2 分鐘再試一次就會恢復。";
    }
    if (/failed to fetch/i.test(msg) || /networkerror/i.test(msg) || /load failed/i.test(msg)) {
      return "網路連線失敗,請確認手機或電腦有連上網路,再試一次。";
    }
    if (/timeout|timed out|abort/i.test(msg)) {
      return "連線逾時,請稍後再試一次。";
    }
    if (/unexpected token/i.test(msg) || (/json/i.test(msg) && /pars/i.test(msg))) {
      return "伺服器回應異常,可能是暫時性問題,請稍後再試一次。";
    }
    if (/token/i.test(msg) || /auth/i.test(msg) || /\b401\b/.test(msg) || /\b403\b/.test(msg) || /permission/i.test(msg)) {
      return "存取權限可能有問題(例如權杖過期),請聯繫管理員確認設定。";
    }
    if (/status 5\d\d/i.test(msg)) {
      return "伺服器暫時發生問題,請稍後再試一次;若持續發生,請聯繫管理員。";
    }
    if (/status 4\d\d/i.test(msg)) {
      return "請求被拒絕,可能是設定有誤,請聯繫管理員確認。";
    }
    return "抓取失敗,請稍後再試一次;若持續發生,請聯繫管理員。";
  }

  // ---------- Meta 廣告成效:透過 Worker 代理抓取,權杖完全不經過瀏覽器 ----------
  // 品牌方只需要按按鈕,不需要輸入任何權杖或帳號 ID——Worker 那邊已經鎖好了。
  //
  // 重試說明:如果有好幾個人(不同裝置)在差不多時間各自按更新,會同時打同一個 Meta 廣告帳號,
  // 疊加起來可能觸發 Meta 的頻率限制而失敗。這裡失敗時不會馬上放棄,而是等一段時間(隨機拉開,
  // 避免大家「同時失敗、同時重試」又撞在一起)再試一次,最多重試 2 次。這能讓大部分因為撞頻率
  // 限制造成的暫時性失敗自動修復,但無法徹底避免多人同時觸發,因為每支裝置各自獨立、彼此不知道
  // 對方也在更新——真正要做到「同時間只有一個人在更新」,需要在 Worker 那端做伺服器端的排隊/鎖定。
  async function callMetaWorker(path, params, retries = 2) {
    const url = new URL(`${shoplineWorkerUrl}${path}`);
    Object.entries(params || {}).forEach(([k, v]) => {
      if (v !== undefined && v !== null && v !== "") url.searchParams.set(k, v);
    });
    for (let attempt = 0; ; attempt++) {
      try {
        const res = await fetch(url.toString(), { headers: { "X-Proxy-Auth": SHOPLINE_PROXY_SECRET } });
        const data = await res.json();
        if (!res.ok || data.error) {
          throw new Error(data.error || `Worker 回應錯誤 (status ${res.status})`);
        }
        return data;
      } catch (e) {
        if (attempt >= retries) throw e;
        const waitMs = 3000 * (attempt + 1) + Math.random() * 2000;
        await new Promise((r) => setTimeout(r, waitMs));
      }
    }
  }

      const keys = ((listRes && listRes.keys) || []).filter((k) => {
        const rest = k.slice(LEDGER_STORAGE_PREFIX.length);
        return brandId ? rest.startsWith(brandId + "::") : !rest.includes("::");
      });
      const entries = {};
      for (const k of keys) {
        if (isStale && isStale()) return; // 迴圈裡每一輪都檢查,盡早中止
        const res = await storage.get(k);
        if (res && res.value) {

          const mk = brandId ? rest.slice((brandId + "::").length) : rest;

      if (isStale && isStale()) return;

  function handlePrintClick() {
    // 跟匯出 PDF 一樣,列印前先展開所有收合中的「廣告成效分類」區塊,避免收合的內容沒有印出來。

  // PDF 匯出用到的 html2canvas / jsPDF 只在真的按下「匯出 PDF」時才動態載入,
  // 避免每次開頁都要多下載、多解析這兩個不小的函式庫。載入一次後會快取,之後匯出不會重複載入。
  let pdfLibsLoadingPromise = null;
  function loadPdfLibsOnce() {
    if (window.html2canvas && window.jspdf) return Promise.resolve();
    if (pdfLibsLoadingPromise) return pdfLibsLoadingPromise;
    const loadScript = (src) =>
      new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error(`無法載入 ${src}`));
        document.head.appendChild(s);
      });
    pdfLibsLoadingPromise = Promise.all([
      loadScript("https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"),
      loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"),
    ]).catch((e) => {
      pdfLibsLoadingPromise = null; // 失敗的話下次還能重試
      throw e;
    });
    return pdfLibsLoadingPromise;
  }

  async function exportPDF() {
    setPdfExporting(true);
    setError(null);
    try {
      await loadPdfLibsOnce();
    } catch (e) {
      setError("PDF 匯出工具載入失敗,請確認網路連線後再試一次。");
      setPdfExporting(false);
      return;
    }
    if (!window.html2canvas || !window.jspdf) {
      setError("PDF 匯出工具還沒載入完成,請確認網路連線後再試一次。");
      setPdfExporting(false);
      return;
    }
    // 先展開所有收合中的「廣告成效分類」區塊,不然收合的內容不會被截進 PDF 裡。
    window.dispatchEvent(new Event(PERF_EXPAND_ALL_EVENT));
    await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    document.body.classList.add("mal-exporting");
    try {
      const target = document.querySelector(".mal-shell");
      const canvas = await window.html2canvas(target, { scale: 2, backgroundColor: "#F5F2EC", useCORS: true });
      if (!canvas || !canvas.width || !canvas.height) {
        throw new Error("畫面擷取結果是空的(可能是字型或圖片跨網域限制導致),請重新整理頁面、等待字型與圖片都載入完成後再試一次。");
      }
      // 保險做法:不完全依賴 html2canvas 的 backgroundColor 選項——它在某些情況下沒有確實生效,
      // 導致畫布底層是透明的。而 JPEG 格式不支援透明,轉檔時瀏覽器會把透明的地方補成純黑色,
      // 這就是「匯出後整頁全黑」的真正原因。這裡用 destination-over 手動把背景色畫到畫布最底層,
      // 蓋住任何透明的縫隙,確保不管 html2canvas 那邊有沒有成功套用背景色,最後一定是不透明的。
      const ctx = canvas.getContext("2d");
      ctx.globalCompositeOperation = "destination-over";
      ctx.fillStyle = "#FAF7F2";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const { jsPDF } = window.jspdf;

      // 改成標準 A4(直向),內容太長就自動分頁——不是像之前那樣塞成一張自訂尺寸的超長頁面。
      // 做法:把整份報表的截圖,依 A4 版面的高度切成好幾段,每段各自貼一頁,靠 jsPDF 頁面本身的邊界自然裁切。
      // 已知的取捨:這是圖片式分頁,不會刻意避開資料列被硬生生切在兩頁中間的情況(要完全避免需要更複雜的版面量測邏輯,
      // 這裡先採用業界常見的做法,大部分情況可以接受,如果切點正好卡在重要資料列中間,可以微調瀏覽器縮放比例後重新匯出試試)。
      const A4_WIDTH_PT = 595.28;
      const A4_HEIGHT_PT = 841.89;
      const MARGIN_PT = 24;
      const contentWidthPt = A4_WIDTH_PT - MARGIN_PT * 2;
      const contentHeightPt = (canvas.height * contentWidthPt) / canvas.width; // 整份報表等比縮放到 A4 版寬後的總高度
      const pdf = new jsPDF({ orientation: "p", unit: "pt", format: "a4" });
      const imgData = canvas.toDataURL("image/jpeg", 0.95);

      let renderedHeightPt = 0; // 已經畫到第幾個 pt 高度了
      let isFirstPage = true;
      while (renderedHeightPt < contentHeightPt) {
        if (!isFirstPage) pdf.addPage();
        isFirstPage = false;
        // 用同一張完整截圖,每頁只是把它往上位移,讓 jsPDF 頁面邊界自然裁出這一頁該顯示的那一段。
        pdf.addImage(imgData, "JPEG", MARGIN_PT, MARGIN_PT - renderedHeightPt, contentWidthPt, contentHeightPt);
        renderedHeightPt += A4_HEIGHT_PT - MARGIN_PT * 2;
      }

      const label =
        viewMode === "week"
          ? focusWeek
            ? `週報-${weekLabel(focusWeek).replace("~", "至")}`
            : "全部週份"
          : focusMonth
          ? monthLabel(focusMonth).replace("/", "-")
          : "全部月份";
      pdf.save(`品牌成效分析-${label}.pdf`);
    } catch (e) {
      setError("匯出 PDF 失敗:" + e.message);
    } finally {
      document.body.classList.remove("mal-exporting");
      setPdfExporting(false);
    }
  }

  // 每個品牌各自的「CPA 過高」標準是各品牌獨立設定、互不影響,存起來之後下次打開網頁還會記得,
  // 也隨時可以重新設定或修改。輸入空白表示清除這個品牌的標準(改回「尚未設定」,不會顯示過高警示)。
  // 已經拿掉「預設帳本」,所以只要抓到資料,就一定要掛在一個看得到的品牌底下——
  // 如果這個帳號 ID 還沒存成常用品牌,就先用帳號 ID 當名稱自動建立一個(之後可以用「存為常用」改成正式名稱)。
  async function ensureBrandRegistered(cleanId) {

  function editCpaThreshold(brandId) {
    const brandName = (brands.find((b) => b.id === brandId) || {}).name || brandId;
    const current = cpaThresholds[brandId];
    const input = window.prompt(
      `設定「${brandName}」的 CPA 過高標準——每筆訂單成本(CPA)超過這個金額,系統會標示為「CPA 過高」。\n留空白可以清除這個品牌的標準。`,
      current != null ? String(current) : ""
    );
    if (input === null) return; // 使用者按取消
    const trimmed = input.trim();
    const updated = { ...cpaThresholds };
    if (!trimmed) {
      delete updated[brandId];
    } else {
      const num = parseFloat(trimmed);
      if (isNaN(num) || num <= 0) {
        setApiError("CPA 標準請輸入一個大於 0 的數字。");
        return;
      }
      updated[brandId] = num;
    }
    setCpaThresholds(updated);
    storage.set("meta-api-cpa-thresholds", JSON.stringify(updated)).catch(() => {});
  }

  // 跟 editCpaThreshold 同一套模式:每個品牌各自的「廣告費佔比過高」標準(百分比),
  // 超過這個比例,每日報表(選一天/矩陣總覽)裡的廣告費佔比欄位會標紅提醒。
  function editAdRatioThreshold(brandId) {
